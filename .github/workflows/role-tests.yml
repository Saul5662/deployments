# Role test workflow for haidra.deployments collection.
#
# Division of responsibility (see also: test.yml):
#   - role-tests.yml (this file): policy-contract enforcement, explicit
#     render-only checks, and daemon-backed runtime smoke tests.
#   - test.yml: Collection-level lint plus safe PR syntax-check gates.
#
# Security model:
#   - policy-contract: always-on semantic checks (no Docker).
#   - package-manager-smoke: generic package module smoke across distro containers.
#   - render-pr-trusted (same-repo PRs): render-only playbooks via run_tests.sh
#     across Ubuntu and Fedora systemd target containers.
#   - render (push/dispatch): same render-only matrix on trusted events.
#   - runtime-daemon: opt-in docker-daemon tests, restricted to trusted events.
#   - integration-smoke: cross-role render smoke after render gates pass.
#   - integration-live: manual workflow_dispatch only.
#   - Enable "Require approval for all outside collaborators" in repo
#     Settings → Actions for defense-in-depth.
---
name: Role Tests

on:
  pull_request:
    paths:
      - "roles/**"
      - "tests/**"
      - ".github/workflows/role-tests.yml"
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Always-on fast semantic checks for reproducibility and example contracts.
  policy-contract:
    name: "policy-contract / ${{ matrix.suite }}"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: ai_horde
            playbook: tests/ai_horde/test_ai_horde_policy_contracts.yml
          - suite: model_reference
            playbook: >-
              tests/model_reference/test_model_reference_policy_contracts.yml

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: pip install ansible

      - name: Run policy/contract checks
        env:
          ANSIBLE_CONFIG: ${{ github.workspace }}/tests/ansible.cfg
        run: ansible-playbook "${{ matrix.playbook }}" -i localhost, -c local

  package-manager-smoke:
    name: "package-manager-smoke / ${{ matrix.distro }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu
            container_image: ubuntu:22.04
            install_deps: >-
              apt-get update && apt-get install -y
              git python3 python3-apt python3-pip python3-venv
          - distro: fedora
            container_image: fedora:40
            install_deps: >-
              dnf install -y
              git python3 python3-pip python3-virtualenv
    container:
      image: ${{ matrix.container_image }}

    steps:
      - name: Install job dependencies
        run: ${{ matrix.install_deps }}

      - uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          python3 -m venv .ci-venv
          . .ci-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install ansible

      - name: Run generic package module smoke test
        run: |
          . .ci-venv/bin/activate
          ansible localhost \
            -i localhost, \
            -c local \
            -m ansible.builtin.package \
            -a "name=git state=present"

  # Render-only checks for trusted same-repo PRs.
  render-pr-trusted:
    name: >-
      render-pr-trusted / ${{ matrix.suite.name }} / ${{ matrix.distro.name }}
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        distro:
          - name: ubuntu
            base_image: ubuntu:22.04
          - name: fedora
            base_image: fedora:40
        suite:
          - name: monitoring
            target: monitoring
            jobs: 3
            timeout_minutes: 20
          - name: ai_horde
            target: ai_horde/test_ai_horde_render
            jobs: 1
            timeout_minutes: 20
          - name: regen_worker
            target: regen_worker/test_regen_worker_render
            jobs: 1
            timeout_minutes: 10
          - name: artbot
            target: artbot/test_artbot_render
            jobs: 1
            timeout_minutes: 10
          - name: frontpage
            target: frontpage/test_frontpage_render
            jobs: 1
            timeout_minutes: 10
          - name: full_stack
            target: full_stack/test_fullstack_render
            jobs: 1
            timeout_minutes: 10
          - name: model_reference
            target: model_reference/test_model_reference_render
            jobs: 1
            timeout_minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: pip install ansible

      - name: Install galaxy dependencies
        run: ansible-galaxy collection install -r requirements.yml

      - name: Log in to Docker Hub
        if: vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run render tests
        env:
          HORDE_TEST_DISTRO: ${{ matrix.distro.name }}
          HORDE_TEST_BASE_IMAGE: ${{ matrix.distro.base_image }}
        run: >-
          ./tests/run_tests.sh --jobs "${{ matrix.suite.jobs }}"
          "${{ matrix.suite.target }}"
        timeout-minutes: ${{ matrix.suite.timeout_minutes }}

  # Render-only checks on trusted push/dispatch events.
  render:
    name: "render / ${{ matrix.suite.name }} / ${{ matrix.distro.name }}"
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        distro:
          - name: ubuntu
            base_image: ubuntu:22.04
          - name: fedora
            base_image: fedora:40
        suite:
          - name: monitoring
            target: monitoring
            jobs: 3
            timeout_minutes: 20
          - name: ai_horde
            target: ai_horde/test_ai_horde_render
            jobs: 1
            timeout_minutes: 20
          - name: regen_worker
            target: regen_worker/test_regen_worker_render
            jobs: 1
            timeout_minutes: 10
          - name: artbot
            target: artbot/test_artbot_render
            jobs: 1
            timeout_minutes: 10
          - name: frontpage
            target: frontpage/test_frontpage_render
            jobs: 1
            timeout_minutes: 10
          - name: full_stack
            target: full_stack/test_fullstack_render
            jobs: 1
            timeout_minutes: 10
          - name: model_reference
            target: model_reference/test_model_reference_render
            jobs: 1
            timeout_minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: pip install ansible

      - name: Install galaxy dependencies
        run: ansible-galaxy collection install -r requirements.yml

      - name: Log in to Docker Hub
        if: vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run render tests
        env:
          HORDE_TEST_DISTRO: ${{ matrix.distro.name }}
          HORDE_TEST_BASE_IMAGE: ${{ matrix.distro.base_image }}
        run: >-
          ./tests/run_tests.sh --jobs "${{ matrix.suite.jobs }}"
          "${{ matrix.suite.target }}"
        timeout-minutes: ${{ matrix.suite.timeout_minutes }}

  runtime-daemon:
    name: "runtime-daemon / ${{ matrix.suite }}"
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: ai_horde
            target: ai_horde/test_ai_horde_integration
            timeout_minutes: 25
          - suite: monitoring-systemd
            target: monitoring/test_runtime_services
            timeout_minutes: 25
          - suite: monitoring-external-s3
            target: monitoring/test_s3_external_runtime_garage
            timeout_minutes: 20
          - suite: model_reference
            target: model_reference/test_model_reference_integration
            timeout_minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: pip install ansible

      - name: Install galaxy dependencies
        run: ansible-galaxy collection install -r requirements.yml

      - name: Log in to Docker Hub
        if: vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run daemon-backed runtime tests
        run: ./tests/run_tests.sh --docker-daemon-tests "${{ matrix.target }}"
        timeout-minutes: ${{ matrix.timeout_minutes }}

  integration-smoke:
    name: integration / smoke
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - render
      - policy-contract

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: pip install ansible

      - name: Install galaxy dependencies
        run: ansible-galaxy collection install -r requirements.yml

      - name: Log in to Docker Hub
        if: vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run integration smoke test
        run: ./tests/run_tests.sh integration/test_integration_smoke
        timeout-minutes: 15

  integration-live:
    name: integration / live
    runs-on: ubuntu-latest
    needs:
      - render
      - policy-contract
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: pip install ansible

      - name: Install galaxy dependencies
        run: ansible-galaxy collection install -r requirements.yml

      - name: Log in to Docker Hub
        if: vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy AI-Horde + probe
        run: ./tests/integration/local_deploy.sh up
        timeout-minutes: 20

      - name: Tear down
        if: always()
        run: ./tests/integration/local_deploy.sh down
