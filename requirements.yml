---
# Collection dependencies for CI and local development.
# Mirrors the 'dependencies' section of galaxy.yml so ansible-galaxy
# collection install -r requirements.yml works correctly.
# (galaxy.yml is the collection manifest and cannot be used as a requirements file.)
collections:
  - name: prometheus.prometheus
    version: ">=0.16.0,<1.0.0"
  - name: grafana.grafana
    version: ">=6.0.0,<7.0.0"
  - name: community.postgresql
    version: ">=3.4.0,<4.0.0"

roles:
  - name: geerlingguy.nodejs
    version: "7.1.0"
