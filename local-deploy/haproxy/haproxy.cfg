# HAProxy configuration for the local Horde stack.
# Derived from haproxy.example.nocommit with local-deploy adaptations:
#   - HTTP only (no TLS)
#   - Docker container hostnames instead of real IPs
#   - Single server per backend
#   - Stdout logging (Docker-friendly)
#   - No Let's Encrypt, OAI API, caching, or host header rewrites

global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client  60000
    timeout server  60000
    maxconn 2000

frontend horde_local
    bind *:80
    maxconn 4096

    # ── ACL definitions ──────────────────────────────────────────
    acl worker_pop path -i -m end /pop
    acl worker_submit path -i -m end /submit
    acl aihorde_app_stats path_reg ^/(appstats)(/.*)?$
    acl root path /
    acl url_with_slash path_reg ^/(terms|privacy|news|faq|guis|v2-transfer|mission)/$
    acl url_without_slash path_reg ^/(terms|privacy|news|faq|guis|v2-transfer|mission)$
    acl spa_routes path_reg ^/(admin|details|contribute|profile)(/.*)?$
    acl assets path_reg ^/?(assets|styles|favicon\.ico).*$
    acl webapp_js path_reg [A-Z0-9][A-Z0-9][A-Z0-9][A-Z0-9]\.js
    acl api_without_slash path /api
    acl spa_routes_noslash path_reg ^/(admin|details|contribute|profile)(/.*)?[^/]$

    # ── Slash redirects (must precede use_backend) ───────────────
    redirect code 301 prefix / drop-query append-slash if spa_routes_noslash
    redirect code 301 prefix / drop-query append-slash if url_without_slash || api_without_slash

    # ── Routing ──────────────────────────────────────────────────
    use_backend horde_worker_api if worker_pop || worker_submit
    use_backend ai_horde_app_stats if aihorde_app_stats
    use_backend aihorde_frontend if root || url_with_slash || assets || webapp_js || spa_routes

    # ── Default: API backend ─────────────────────────────────────
    default_backend horde_client_api

# ── Backends ─────────────────────────────────────────────────────

backend aihorde_frontend
    balance leastconn
    timeout queue 60s
    retries 3
    option forwardfor if-none
    option httpchk
    http-check expect ! rstatus ^5
    server frontpage aihorde-frontpage:8006 check observe layer7 init-addr last,libc,none

backend horde_client_api
    balance leastconn
    timeout queue 60s
    retries 3
    option forwardfor if-none
    option httpchk
    http-check expect ! rstatus ^5
    server aihorde aihorde:7001 check observe layer7 init-addr last,libc,none

backend horde_worker_api
    balance leastconn
    timeout queue 60s
    retries 3
    option forwardfor if-none
    server aihorde aihorde:7001 check init-addr last,libc,none

backend ai_horde_app_stats
    timeout queue 60s
    retries 3
    option forwardfor if-none
    option httpchk
    server exporter horde-exporter:9109 check init-addr last,libc,none

# ── Stats ────────────────────────────────────────────────────────

frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if LOCALHOST
