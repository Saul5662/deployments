---
# Prometheus Backup Alert Rules
# Monitors backup health and triggers alerts on failures
# Deployed by Ansible - haidra.deployments.horde_monitoring role

groups:
  - name: prometheus_backup
    interval: 60s
    rules:
      # CRITICAL: Backup completely failed or hasn't run recently
      - alert: PrometheusBackupFailed
        expr: |
          time() - prometheus_backup_last_success_timestamp{job="prometheus_backup"} > 90000
        for: 5m
        labels:
          severity: critical
          component: backup
        annotations:
          summary: "Prometheus backup has not succeeded recently on {{ $labels.instance }}"
          description: |
            Last successful backup was {{ $value | humanizeDuration }} ago.
            Daily backups should complete within 25 hours.
            Check backup logs: journalctl -u prometheus-backup.service

      # CRITICAL: Backup failed (success metric = 0)
      - alert: PrometheusBackupExecutionFailed
        expr: |
          prometheus_backup_success{job="prometheus_backup"} == 0
        for: 5m
        labels:
          severity: critical
          component: backup
        annotations:
          summary: "Prometheus backup execution failed on {{ $labels.instance }}"
          description: |
            The backup script reported a failure.
            Check logs: journalctl -u prometheus-backup.service -n 100

      # CRITICAL: No backups exist
      - alert: PrometheusBackupMissing
        expr: |
          prometheus_backup_daily_count{job="prometheus_backup"} == 0 and
          prometheus_backup_monthly_count{job="prometheus_backup"} == 0
        for: 30m
        labels:
          severity: critical
          component: backup
        annotations:
          summary: "No Prometheus backups found on {{ $labels.instance }}"
          description: |
            Backup directory contains no backup files.
            Verify backup configuration and run manual backup.

      # WARNING: Backups getting old
      - alert: PrometheusBackupStale
        expr: |
          time() - prometheus_backup_last_success_timestamp{job="prometheus_backup"} > 93600
        for: 10m
        labels:
          severity: warning
          component: backup
        annotations:
          summary: "Prometheus backup is becoming stale on {{ $labels.instance }}"
          description: |
            Last successful backup was {{ $value | humanizeDuration }} ago.
            Expected: < 26 hours.

      # WARNING: Backup took too long
      - alert: PrometheusBackupSlow
        expr: |
          prometheus_backup_duration_seconds{job="prometheus_backup"} > 3600
        labels:
          severity: warning
          component: backup
        annotations:
          summary: "Prometheus backup taking too long on {{ $labels.instance }}"
          description: |
            Backup took {{ $value | humanizeDuration }} to complete.
            This may indicate performance issues or growing dataset size.

      # WARNING: Backup validation failed
      - alert: PrometheusBackupValidationFailed
        expr: |
          prometheus_backup_validation_passed{job="prometheus_backup"} == 0
        for: 5m
        labels:
          severity: warning
          component: backup
        annotations:
          summary: "Prometheus backup validation failed on {{ $labels.instance }}"
          description: |
            Backup completed but failed validation checks.
            The backup may be corrupted or incomplete.

      # WARNING: Backup size anomaly
      - alert: PrometheusBackupSizeAnomaly
        expr: |
          abs(
            prometheus_backup_size_bytes{job="prometheus_backup",type="latest"} -
            avg_over_time(prometheus_backup_size_bytes{job="prometheus_backup",type="latest"}[7d])
          ) /
          avg_over_time(prometheus_backup_size_bytes{job="prometheus_backup",type="latest"}[7d]) > 0.5
        for: 30m
        labels:
          severity: warning
          component: backup
        annotations:
          summary: "Prometheus backup size anomaly on {{ $labels.instance }}"
          description: |
            Backup size differs by >50% from 7-day average.
            Current: {{ $value | humanize1024 }}B
            This could indicate data loss or corruption.

      # INFO: Low backup count
      - alert: PrometheusBackupCountLow
        expr: |
          prometheus_backup_daily_count{job="prometheus_backup"} < 3
        for: 2h
        labels:
          severity: info
          component: backup
        annotations:
          summary: "Low number of daily backups on {{ $labels.instance }}"
          description: |
            Only {{ $value }} daily backups exist.
            Expected: at least 3 days of backups for proper retention.

      # INFO: Backup storage growing
      - alert: PrometheusBackupStorageGrowing
        expr: |
          rate(prometheus_backup_total_size_bytes{job="prometheus_backup"}[7d]) > 0 and
          predict_linear(prometheus_backup_total_size_bytes{job="prometheus_backup"}[7d], 30*86400) >
          prometheus_backup_total_size_bytes{job="prometheus_backup"} * 2
        for: 1h
        labels:
          severity: info
          component: backup
        annotations:
          summary: "Prometheus backup storage growing rapidly on {{ $labels.instance }}"
          description: |
            Backup storage is projected to double in the next 30 days.
            Current: {{ $value | humanize1024 }}B
            Consider adjusting retention or storage capacity.
