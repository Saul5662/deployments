---
# Deploy alerting rules for the monitoring stack
# These Prometheus rules monitor Mimir, S3-compatible storage, and alerting pipeline health.
#
# The rendered rules file is placed in the Prometheus rules directory where
# it is automatically loaded by Prometheus via the rule_files glob.

- name: Fail when host disk alerts are enabled without host filesystem metrics
  ansible.builtin.fail:
    msg: >-
      horde_monitoring_install_host_disk_alerts=true requires
      node_filesystem_* metrics in Prometheus.
      Set horde_monitoring_host_filesystem_metrics_available=true only when
      host filesystem metrics are actually ingested (node_exporter or Alloy),
      or disable host disk alerts with horde_monitoring_install_host_disk_alerts=false.
  when:
    - horde_monitoring_start_services | bool
    - horde_monitoring_install_host_disk_alerts | default(true) | bool
    - not (horde_monitoring_host_filesystem_metrics_available | default(false) | bool)

- name: Ensure Mimir rules templating directory exists
  ansible.builtin.file:
    path: "{{ horde_monitoring_alerting_rules_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Template monitoring stack alerting rules
  ansible.builtin.template:
    src: alerting-rules.yml.j2
    dest: "{{ horde_monitoring_alerting_rules_dir }}/{{ horde_monitoring_alerting_rules_file }}"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart monitoring stack

- name: Template monitoring stack recording rules
  ansible.builtin.template:
    src: recording-rules.yml.j2
    dest: "{{ horde_monitoring_alerting_rules_dir }}/{{ horde_monitoring_recording_rules_file }}"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart monitoring stack
  when: horde_monitoring_install_recording_rules | default(true) | bool

- name: Remove recording rules file when disabled
  ansible.builtin.file:
    path: "{{ horde_monitoring_alerting_rules_dir }}/{{ horde_monitoring_recording_rules_file }}"
    state: absent
  become: true
  notify: Restart monitoring stack
  when: not (horde_monitoring_install_recording_rules | default(true) | bool)

- name: Publish alerting rules to Mimir Ruler API
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ horde_monitoring_mimir_port }}/config/v1/rules/{{ horde_monitoring_infrastructure_tenant_id }}"
    method: POST
    headers:
      X-Scope-OrgID: "{{ horde_monitoring_infrastructure_tenant_id }}"
    src: "{{ horde_monitoring_alerting_rules_dir }}/{{ horde_monitoring_alerting_rules_file }}"
    status_code: [202, 200]
  become: true
  when: horde_monitoring_start_services | bool

- name: Publish recording rules to Mimir Ruler API
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ horde_monitoring_mimir_port }}/config/v1/rules/{{ horde_monitoring_infrastructure_tenant_id }}"
    method: POST
    headers:
      X-Scope-OrgID: "{{ horde_monitoring_infrastructure_tenant_id }}"
    src: "{{ horde_monitoring_alerting_rules_dir }}/{{ horde_monitoring_recording_rules_file }}"
    status_code: [202, 200]
  become: true
  when: 
    - horde_monitoring_install_recording_rules | default(true) | bool
    - horde_monitoring_start_services | bool
