---
# Deploy Loki log aggregation backend via Docker Compose
# Loki runs as part of the monitoring Docker Compose stack

# Docker auto-creates missing bind-mount sources as directories.  If a
# previous run started compose before configs were templated, the config
# path is a directory instead of a file and the container crash-loops.
- name: Check for stale Loki config directory-as-file
  ansible.builtin.stat:
    path: "{{ horde_monitoring_loki_config_dir }}/loki.yaml"
  register: horde_monitoring__loki_config_stat
  become: true

- name: Remove stale Loki config directory-as-file
  ansible.builtin.file:
    path: "{{ horde_monitoring_loki_config_dir }}/loki.yaml"
    state: absent
  become: true
  when:
    - horde_monitoring__loki_config_stat.stat.exists
    - horde_monitoring__loki_config_stat.stat.isdir

- name: Create Loki config directory
  ansible.builtin.file:
    path: "{{ horde_monitoring_loki_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Create Loki data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "10001"
    group: "10001"
    mode: "0755"
  become: true
  loop:
    - "{{ horde_monitoring_loki_data_dir }}"
    - "{{ horde_monitoring_loki_data_dir }}/index"
    - "{{ horde_monitoring_loki_data_dir }}/index_cache"
    - "{{ horde_monitoring_loki_data_dir }}/retention"
    - "{{ horde_monitoring_loki_data_dir }}/chunks"
    - "{{ horde_monitoring_loki_data_dir }}/rules"

- name: Template Loki configuration
  ansible.builtin.template:
    src: loki.yaml.j2
    dest: "{{ horde_monitoring_loki_config_dir }}/loki.yaml"
    owner: root
    group: "10001"
    mode: "0640"
    backup: true
  become: true
  notify: Restart monitoring stack

# Loki ruler rules — log-derived alerts on the AI-Horde stream.
# Templated locally for reproducibility, then pushed via the Loki ruler API
# (mirrors the Mimir ruler upload pattern in tasks/alerting.yml). The local
# copy is also useful for `promtool`-style validation.
- name: Template Loki ruler rules for AI-Horde log alerts
  ansible.builtin.template:
    src: loki-rules.yml.j2
    dest: "{{ horde_monitoring_loki_config_dir }}/loki-rules.yml"
    owner: root
    group: "10001"
    mode: "0640"
  become: true
  when: horde_monitoring_install_loki_app_log_alerts | default(true) | bool

- name: Read rendered Loki rules for ruler API push
  ansible.builtin.slurp:
    path: "{{ horde_monitoring_loki_config_dir }}/loki-rules.yml"
  register: horde_monitoring__loki_rules_payload
  become: true
  when:
    - horde_monitoring_start_services | bool
    - horde_monitoring_install_loki_app_log_alerts | default(true) | bool

- name: Parse Loki rule groups for ruler API push
  ansible.builtin.set_fact:
    horde_monitoring__loki_rule_groups: >-
      {{
        ((horde_monitoring__loki_rules_payload.content | b64decode | from_yaml).groups | default([]))
      }}
  when:
    - horde_monitoring_start_services | bool
    - horde_monitoring_install_loki_app_log_alerts | default(true) | bool

- name: Publish Loki rule groups to ruler API
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ horde_monitoring_loki_port }}/loki/api/v1/rules/{{ horde_monitoring_application_tenant_id }}"
    method: POST
    headers:
      X-Scope-OrgID: "{{ horde_monitoring_application_tenant_id }}"
      Content-Type: application/yaml
    body_format: raw
    body: "{{ item | to_nice_yaml(indent=2) }}"
    status_code: [202, 200]
    return_content: true
  loop: "{{ horde_monitoring__loki_rule_groups | default([]) }}"
  loop_control:
    label: "{{ item.name | default('unnamed-loki-group') }}"
  become: true
  when:
    - horde_monitoring_start_services | bool
    - horde_monitoring_install_loki_app_log_alerts | default(true) | bool
