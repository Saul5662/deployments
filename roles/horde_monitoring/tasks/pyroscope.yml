---
# Deploy Pyroscope continuous profiling backend via Docker Compose
# Pyroscope runs as part of the monitoring Docker Compose stack

- name: Check for stale Pyroscope config directories-as-files
  ansible.builtin.stat:
    path: "{{ horde_monitoring_pyroscope_config_dir }}/{{ item }}"
  register: horde_monitoring__pyroscope_config_stats
  become: true
  loop:
    - pyroscope.yaml
    - runtime-overrides.yaml

- name: Remove stale Pyroscope config directories-as-files
  ansible.builtin.file:
    path: "{{ horde_monitoring_pyroscope_config_dir }}/{{ item.item }}"
    state: absent
  become: true
  loop: "{{ horde_monitoring__pyroscope_config_stats.results }}"
  loop_control:
    label: "{{ item.item }}"
  when:
    - item.stat.exists
    - item.stat.isdir

- name: Create Pyroscope config directory
  ansible.builtin.file:
    path: "{{ horde_monitoring_pyroscope_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Create Pyroscope data directory
  ansible.builtin.file:
    path: "{{ horde_monitoring_pyroscope_data_dir }}"
    state: directory
    owner: "10001"
    group: "10001"
    mode: "0755"
  become: true

- name: Template Pyroscope configuration
  ansible.builtin.template:
    src: pyroscope.yaml.j2
    dest: "{{ horde_monitoring_pyroscope_config_dir }}/pyroscope.yaml"
    owner: root
    group: "10001"
    mode: "0640"
    backup: true
  become: true
  notify: Restart monitoring stack

- name: Template Pyroscope runtime overrides
  ansible.builtin.template:
    src: pyroscope-runtime-overrides.yaml.j2
    dest: "{{ horde_monitoring_pyroscope_config_dir }}/runtime-overrides.yaml"
    owner: root
    group: "10001"
    mode: "0640"
    backup: true
  become: true
  notify: Restart monitoring stack
