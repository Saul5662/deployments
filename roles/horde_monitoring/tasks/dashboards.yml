---
# Fetch Grafana dashboards and deploy them into per-org directories
# with patched datasource UIDs.
#
# Source mode: git | release | local
#   git     – shallow-clone horde-exporters at a pinned ref
#   release – download a pre-built tarball from a GitHub Release
#   local   – copy from a local filesystem path on the target host
#
# Layout on disk:
#   {{ horde_monitoring_grafana_dashboard_dir }}/app/        -> app dashboards for Org 1 (uid: mimir-app)
#   {{ horde_monitoring_grafana_dashboard_dir }}/app-public/  -> app dashboards for Org 2 (uid: mimir-public)
#   {{ horde_monitoring_grafana_dashboard_dir }}/infra/       -> infra dashboards for Org 1 (uid: mimir-infra)

- name: Validate dashboard source mode
  ansible.builtin.assert:
    that:
      - horde_monitoring_grafana_dashboards_source in ['git', 'release', 'local']
    fail_msg: >-
      horde_monitoring_grafana_dashboards_source must be one of: git, release, local.
      Got '{{ horde_monitoring_grafana_dashboards_source }}'.

- name: Create dashboard subdirectories
  ansible.builtin.file:
    path: "{{ horde_monitoring_grafana_dashboard_dir }}/{{ item }}"
    state: directory
    owner: "472"
    group: "472"
    mode: "0755"
  become: true
  loop: "{{ ['app', 'app-public'] + (['infra'] if horde_monitoring_grafana_provision_infra_dashboards | bool else []) }}"
- name: Install git (needed for dashboard checkout)
  ansible.builtin.apt:
    name: git
    state: present
  become: true
  when: horde_monitoring_grafana_dashboards_source == 'git'

- name: Clone horde-exporters repository (shallow)
  ansible.builtin.git:
    repo: "{{ horde_monitoring_grafana_dashboards_repo_url }}"
    dest: /tmp/horde-exporters-dashboards
    version: "{{ horde_monitoring_grafana_dashboards_repo_ref }}"
    depth: >-
      {{
        1
        if not (horde_monitoring_grafana_dashboards_repo_ref is regex('^[0-9a-f]{40}$'))
        else omit
      }}
    force: true
  become: true
  register: horde_monitoring__dashboards_clone
  when: horde_monitoring_grafana_dashboards_source == 'git'

- name: Set git-mode source paths
  ansible.builtin.set_fact:
    horde_monitoring__dashboard_app_src: "/tmp/horde-exporters-dashboards/{{ horde_monitoring_grafana_dashboards_git_app_path }}"
    horde_monitoring__dashboard_infra_src: "/tmp/horde-exporters-dashboards/{{ horde_monitoring_grafana_dashboards_git_infra_path }}"
  when: horde_monitoring_grafana_dashboards_source == 'git'

# ── release mode ─────────────────────────────────────────────

- name: Validate release mode settings
  ansible.builtin.assert:
    that:
      - >-
        (horde_monitoring_grafana_dashboards_release_url | length > 0) or
        (horde_monitoring_grafana_dashboards_release_version | length > 0)
    fail_msg: >-
      In release mode, either horde_monitoring_grafana_dashboards_release_url or
      horde_monitoring_grafana_dashboards_release_version must be set.
  when: horde_monitoring_grafana_dashboards_source == 'release'

# ── manifest resolution (release mode, no explicit URL) ──────
- name: Download release manifest for dashboard resolution
  ansible.builtin.get_url:
    url: >-
      https://github.com/{{ horde_monitoring_grafana_dashboards_release_repo
      }}/releases/download/{{ horde_monitoring_grafana_dashboards_release_version
      }}/release-manifest.json
    dest: /tmp/horde-dashboard-manifest.json
    mode: "0644"
  become: true
  when:
    - horde_monitoring_grafana_dashboards_source == 'release'
    - horde_monitoring_grafana_dashboards_release_url | length == 0

- name: Read release manifest
  ansible.builtin.slurp:
    src: /tmp/horde-dashboard-manifest.json
  register: horde_monitoring__manifest_raw
  become: true
  when:
    - horde_monitoring_grafana_dashboards_source == 'release'
    - horde_monitoring_grafana_dashboards_release_url | length == 0

- name: Parse release manifest
  ansible.builtin.set_fact:
    horde_monitoring__dashboard_manifest: "{{ horde_monitoring__manifest_raw.content | b64decode | from_json }}"
  when:
    - horde_monitoring_grafana_dashboards_source == 'release'
    - horde_monitoring_grafana_dashboards_release_url | length == 0

- name: Resolve dashboard URL and checksum from manifest
  ansible.builtin.set_fact:
    horde_monitoring__dashboard_resolved_url: >-
      {{
        'https://github.com/'
        ~ horde_monitoring_grafana_dashboards_release_repo
        ~ '/releases/download/'
        ~ horde_monitoring_grafana_dashboards_release_version
        ~ '/'
        ~ horde_monitoring__dashboard_manifest.artifacts.dashboards.filename
      }}
    horde_monitoring__dashboard_resolved_checksum: >-
      sha256:{{ horde_monitoring__dashboard_manifest.artifacts.dashboards.sha256 }}
  when:
    - horde_monitoring_grafana_dashboards_source == 'release'
    - horde_monitoring_grafana_dashboards_release_url | length == 0

- name: Use explicit dashboard URL and checksum when provided
  ansible.builtin.set_fact:
    horde_monitoring__dashboard_resolved_url: "{{ horde_monitoring_grafana_dashboards_release_url }}"
    horde_monitoring__dashboard_resolved_checksum: "{{ horde_monitoring_grafana_dashboards_release_checksum }}"
  when:
    - horde_monitoring_grafana_dashboards_source == 'release'
    - horde_monitoring_grafana_dashboards_release_url | length > 0

- name: Download dashboard release tarball
  ansible.builtin.get_url:
    url: "{{ horde_monitoring__dashboard_resolved_url }}"
    dest: /tmp/horde-dashboards.tar.gz
    checksum: "{{ horde_monitoring__dashboard_resolved_checksum | default(omit, true) }}"
    mode: "0644"
  become: true
  when: horde_monitoring_grafana_dashboards_source == 'release'

- name: Create release unpack directory
  ansible.builtin.file:
    path: /tmp/horde-dashboards-release
    state: directory
    mode: "0755"
  become: true
  when: horde_monitoring_grafana_dashboards_source == 'release'

- name: Unpack dashboard tarball
  ansible.builtin.unarchive:
    src: /tmp/horde-dashboards.tar.gz
    dest: /tmp/horde-dashboards-release
    remote_src: true
  become: true
  when: horde_monitoring_grafana_dashboards_source == 'release'

- name: Set release-mode source paths
  ansible.builtin.set_fact:
    horde_monitoring__dashboard_app_src: /tmp/horde-dashboards-release/app
    horde_monitoring__dashboard_infra_src: /tmp/horde-dashboards-release/infra
  when: horde_monitoring_grafana_dashboards_source == 'release'

# ── local mode ───────────────────────────────────────────────

- name: Validate local mode settings
  ansible.builtin.assert:
    that:
      - horde_monitoring_grafana_dashboards_local_path | length > 0
    fail_msg: >-
      horde_monitoring_grafana_dashboards_local_path must be set when
      dashboards_source is 'local'.
  when: horde_monitoring_grafana_dashboards_source == 'local'

- name: Set local-mode source paths
  ansible.builtin.set_fact:
    horde_monitoring__dashboard_app_src: "{{ horde_monitoring_grafana_dashboards_local_path }}/{{ horde_monitoring_grafana_dashboards_local_app_path }}"
    horde_monitoring__dashboard_infra_src: "{{ horde_monitoring_grafana_dashboards_local_path }}/{{ horde_monitoring_grafana_dashboards_local_infra_path }}"
  when: horde_monitoring_grafana_dashboards_source == 'local'

# ── common: verify source directories ────────────────────────

- name: Verify expected dashboard source directories exist
  ansible.builtin.stat:
    path: "{{ item }}"
  loop: >-
    {{
      [horde_monitoring__dashboard_app_src]
      + ([horde_monitoring__dashboard_infra_src] if horde_monitoring_grafana_provision_infra_dashboards | bool else [])
    }}
  register: horde_monitoring__dashboard_dirs
  become: true

- name: Fail if dashboard source directories are missing
  ansible.builtin.fail:
    msg: >-
      Expected dashboard directory {{ item.item }} not found.
      Source mode: {{ horde_monitoring_grafana_dashboards_source }}.
      Check your source configuration variables.
  when: not item.stat.exists
  loop: "{{ horde_monitoring__dashboard_dirs.results }}"
  loop_control:
    label: "{{ item.item }}"

# ── common: discover and copy dashboards ─────────────────────

- name: Find app dashboard JSON files
  ansible.builtin.find:
    paths: "{{ horde_monitoring__dashboard_app_src }}"
    patterns: "*.json"
  register: horde_monitoring__app_dashboard_files
  become: true

- name: Find infra dashboard JSON files
  ansible.builtin.find:
    paths: "{{ horde_monitoring__dashboard_infra_src }}"
    patterns: "*.json"
    recurse: true
  register: horde_monitoring__infra_dashboard_files
  become: true
  when: horde_monitoring_grafana_provision_infra_dashboards | bool

- name: Default empty infra dashboard list when provisioning is disabled
  ansible.builtin.set_fact:
    horde_monitoring__infra_dashboard_files: { files: [] }
  when: not (horde_monitoring_grafana_provision_infra_dashboards | bool)

# --- Copy dashboards into their target directories -----------------------

- name: Copy app dashboards for Org 1 (admin)
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ horde_monitoring_grafana_dashboard_dir }}/app/{{ item.path | basename }}"
    remote_src: true
    owner: "472"
    group: "472"
    mode: "0644"
    directory_mode: "0755"
  become: true
  loop: "{{ horde_monitoring__app_dashboard_files.files }}"
  loop_control:
    label: "{{ item.path | basename }}"

- name: Copy app dashboards for Org 2 (public)
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ horde_monitoring_grafana_dashboard_dir }}/app-public/{{ item.path | basename }}"
    remote_src: true
    owner: "472"
    group: "472"
    mode: "0644"
    directory_mode: "0755"
  become: true
  loop: "{{ horde_monitoring__app_dashboard_files.files }}"
  loop_control:
    label: "{{ item.path | basename }}"

- name: Copy infra dashboards for Org 1 (admin)
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ horde_monitoring_grafana_dashboard_dir }}/infra/{{ item.path | basename }}"
    remote_src: true
    owner: "472"
    group: "472"
    mode: "0644"
    directory_mode: "0755"
  become: true
  loop: "{{ horde_monitoring__infra_dashboard_files.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when: horde_monitoring_grafana_provision_infra_dashboards | bool

# --- Patch datasource UIDs in each set of dashboards --------------------

- name: Deploy dashboard UID patching script
  ansible.builtin.copy:
    src: patch_dashboard_uid.py
    dest: /tmp/patch_dashboard_uid.py
    mode: "0755"
  become: true

- name: Patch datasource UIDs in all dashboard sets
  ansible.builtin.command: >
    python3 /tmp/patch_dashboard_uid.py
    "{{ horde_monitoring_grafana_dashboard_dir }}/{{ item.0 }}/{{ item.1.path | basename }}"
    "{{ item.2 }}"
    "{{ item.3 }}"
  become: true
  loop: "{{ _patch_targets }}"
  loop_control:
    label: "{{ item.0 }}/{{ item.1.path | basename }}"
  vars:
    _patch_targets: >-
      {{
        (horde_monitoring__app_dashboard_files.files | product(['app']) | map('reverse') | map('list')
         | product([['mimir-app', horde_monitoring_application_datasource_name]]) | map('flatten') | list)
        +
        (horde_monitoring__app_dashboard_files.files | product(['app-public']) | map('reverse') | map('list')
         | product([['mimir-public', horde_monitoring_public_datasource_name]]) | map('flatten') | list)
        +
        (horde_monitoring__infra_dashboard_files.files | product(['infra']) | map('reverse') | map('list')
         | product([['mimir-infra', horde_monitoring_infrastructure_datasource_name]]) | map('flatten') | list)
      }}
  changed_when: false

- name: Remove temporary patching script
  ansible.builtin.file:
    path: /tmp/patch_dashboard_uid.py
    state: absent
  become: true

# ── cleanup: remove source-mode-specific temp files ─────────

- name: Clean up cloned repository (git mode)
  ansible.builtin.file:
    path: /tmp/horde-exporters-dashboards
    state: absent
  become: true
  when: horde_monitoring_grafana_dashboards_source == 'git'

- name: Clean up release tarball and unpack directory (release mode)
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  become: true
  loop:
    - /tmp/horde-dashboards.tar.gz
    - /tmp/horde-dashboards-release
  when: horde_monitoring_grafana_dashboards_source == 'release'
