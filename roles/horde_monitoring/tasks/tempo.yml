---
# Deploy Tempo distributed tracing backend via Docker Compose
# Tempo runs as part of the monitoring Docker Compose stack

- name: Check for stale Tempo config directory-as-file
  ansible.builtin.stat:
    path: "{{ horde_monitoring_tempo_config_dir }}/tempo.yaml"
  register: horde_monitoring__tempo_config_stat
  become: true

- name: Remove stale Tempo config directory-as-file
  ansible.builtin.file:
    path: "{{ horde_monitoring_tempo_config_dir }}/tempo.yaml"
    state: absent
  become: true
  when:
    - horde_monitoring__tempo_config_stat.stat.exists
    - horde_monitoring__tempo_config_stat.stat.isdir

- name: Create Tempo config directory
  ansible.builtin.file:
    path: "{{ horde_monitoring_tempo_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Create Tempo data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "10001"
    group: "10001"
    mode: "0755"
  become: true
  loop:
    - "{{ horde_monitoring_tempo_data_dir }}"
    - "{{ horde_monitoring_tempo_data_dir }}/wal"
    - "{{ horde_monitoring_tempo_data_dir }}/blocks"
    - "{{ horde_monitoring_tempo_data_dir }}/generator"
    - "{{ horde_monitoring_tempo_data_dir }}/generator/wal"
    - "{{ horde_monitoring_tempo_data_dir }}/generator/traces"

- name: Template Tempo configuration
  ansible.builtin.template:
    src: tempo.yaml.j2
    dest: "{{ horde_monitoring_tempo_config_dir }}/tempo.yaml"
    owner: root
    group: "10001"
    mode: "0640"
    backup: true
  become: true
  notify: Restart monitoring stack
