---
# Grafana provisioning (datasources and dashboards)
# Grafana runs as part of the Mimir Docker Compose stack
#
# The public-org dashboard provider references orgId 2 which the role
# creates via the Grafana API.  On a fresh DB (first deploy or after a
# data wipe), org 2 doesn't exist yet, and Grafana fatally errors if
# the dashboard provisioning config references a nonexistent org.
#
# To break the chicken-and-egg cycle:
#   Phase 1 — Probe whether the public org already exists.
#             Template the dashboard provider *without* the public
#             section if it doesn't, flush handlers so Grafana restarts
#             with a safe config, then create the org via the API.
#   Phase 2 — Re-template the dashboard provider with the public
#             section now that the org is guaranteed to exist.
#             The restart handler fires at end-of-role.
#
# On idempotent re-runs where org 2 already exists, Phase 1 detects it,
# includes the public section from the start, and Phase 2 is a no-op.

- name: Template Grafana datasource provisioning
  ansible.builtin.template:
    src: grafana-datasources.yml.j2
    dest: "{{ horde_monitoring_grafana_provisioning_dir }}/datasources/mimir.yml"
    owner: "472"
    group: "472"
    # 0600: secureJsonData contains Mimir tenant IDs which control write
    # access to tenant data. Grafana (UID 472) is the owner so can still
    # read the file.
    mode: "0600"
  become: true
  notify: Restart monitoring stack

# Grafana scans every provisioning subdirectory on startup AND on each
# poll interval. If a subdir is missing it logs an error every cycle:
#
#   Failed to read plugin provisioning files from directory
#       path=/etc/grafana/provisioning/plugins
#       error="open ...: no such file or directory"
#
# We don't ship plugin or alerting provisioning files, but we still
# create the directories so the scanner finds an empty (valid) provider
# set instead of an open() error. Cheap; eliminates per-poll log noise.
- name: Ensure optional Grafana provisioning subdirs exist
  ansible.builtin.file:
    path: "{{ horde_monitoring_grafana_provisioning_dir }}/{{ item }}"
    state: directory
    owner: "472"
    group: "472"
    mode: "0755"
  become: true
  loop:
    - plugins
    - alerting
    - notifiers
    - access-control

# ── Phase 1: probe public org, template safe config, create org ──

- name: Probe Grafana health (failure is expected on fresh installs)
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ horde_monitoring_grafana_port }}/api/health"
    method: GET
    status_code: 200
  register: horde_monitoring__grafana_probe
  failed_when: false
  changed_when: false
  when:
    - horde_monitoring_grafana_anonymous_enabled | bool
    - horde_monitoring_start_services | bool

- name: Check if public org already exists in Grafana
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ horde_monitoring_grafana_port }}/api/orgs/{{ horde_monitoring_grafana_public_org_id }}"
    method: GET
    user: "{{ horde_monitoring_grafana_admin_user }}"
    password: "{{ horde_monitoring_grafana_admin_password }}"
    force_basic_auth: true
    status_code: [200, 404]
  register: horde_monitoring__public_org_probe
  failed_when: false
  changed_when: false
  no_log: true
  when:
    - horde_monitoring_grafana_anonymous_enabled | bool
    - horde_monitoring_start_services | bool
    - horde_monitoring__grafana_probe.status | default(0) == 200

- name: Set public org existence flag
  ansible.builtin.set_fact:
    horde_monitoring__public_org_exists: >-
      {{ (not (horde_monitoring_start_services | bool) and
          horde_monitoring_grafana_anonymous_enabled | bool) or
         (horde_monitoring__public_org_probe.status | default(0) == 200) }}

- name: Template Grafana dashboard provider (Phase 1)
  ansible.builtin.template:
    src: grafana-dashboards.yml.j2
    dest: "{{ horde_monitoring_grafana_provisioning_dir }}/dashboards/default.yml"
    owner: "472"
    group: "472"
    mode: "0600"
  become: true
  notify: Restart monitoring stack

# If dashboard directories from a previous run lost their execute bit
# (e.g. mode 0644 instead of 0755), Grafana cannot traverse them and
# fatally errors on startup with "permission denied".  Ensure all
# directories under the dashboard root are traversable before the
# restart handler fires.
- name: Ensure existing dashboard directories are traversable by Grafana
  ansible.builtin.command:
    cmd: find {{ horde_monitoring_grafana_dashboard_dir }} -type d -exec chmod 0755 {} +
  become: true
  changed_when: false

- name: Ensure existing dashboard files are owned by Grafana
  ansible.builtin.command:
    cmd: find {{ horde_monitoring_grafana_dashboard_dir }} -not -user 472 -exec chown 472:472 {} +
  become: true
  changed_when: false

- name: Flush handlers to restart Grafana with safe config
  ansible.builtin.meta: flush_handlers

# --- Public org creation (requires running Grafana) ---
- name: Wait for Grafana to be healthy
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ horde_monitoring_grafana_port }}/api/health"
    method: GET
    status_code: 200
  register: horde_monitoring_grafana_health
  until: horde_monitoring_grafana_health.status == 200
  retries: 30
  delay: 2
  when:
    - horde_monitoring_grafana_anonymous_enabled | bool
    - horde_monitoring_start_services | bool

- name: Create public Grafana organization
  when:
    - horde_monitoring_grafana_anonymous_enabled | bool
    - horde_monitoring_start_services | bool
  block:
    - name: Create public Grafana organization via API
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ horde_monitoring_grafana_port }}/api/orgs"
        method: POST
        user: "{{ horde_monitoring_grafana_admin_user }}"
        password: "{{ horde_monitoring_grafana_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          name: "{{ horde_monitoring_grafana_public_org_name }}"
        status_code: [200, 409]
      register: horde_monitoring_org_create_result
      changed_when: horde_monitoring_org_create_result.status == 200
      no_log: true
  rescue:
    - name: Show Grafana org creation failure details (password redacted)
      ansible.builtin.fail:
        msg: >-
          Failed to create public Grafana organization '{{ horde_monitoring_grafana_public_org_name }}'.
          Status: {{ horde_monitoring_org_create_result.status | default('N/A') }}.
          Body: {{ horde_monitoring_org_create_result.json | default(horde_monitoring_org_create_result.msg | default('unknown error')) }}.
          Common causes: wrong admin password (stale Grafana DB), Grafana not
          reachable, or authentication misconfiguration. If migrating from a
          manual install, remove the old Grafana data directory and re-run.

# ── Phase 2: re-template with public org now guaranteed to exist ──

- name: Update public org existence flag after creation
  ansible.builtin.set_fact:
    horde_monitoring__public_org_exists: true
  when:
    - horde_monitoring_grafana_anonymous_enabled | bool
    - horde_monitoring_start_services | bool

- name: Template Grafana dashboard provider (Phase 2 — public org ready)
  ansible.builtin.template:
    src: grafana-dashboards.yml.j2
    dest: "{{ horde_monitoring_grafana_provisioning_dir }}/dashboards/default.yml"
    owner: "472"
    group: "472"
    mode: "0600"
  become: true
  notify: Restart monitoring stack
  when:
    - horde_monitoring_grafana_anonymous_enabled | bool

- name: Template Grafana datasource provisioning (Phase 2 — public org ready)
  ansible.builtin.template:
    src: grafana-datasources.yml.j2
    dest: "{{ horde_monitoring_grafana_provisioning_dir }}/datasources/mimir.yml"
    owner: "472"
    group: "472"
    mode: "0600"
  become: true
  notify: Restart monitoring stack
  when:
    - horde_monitoring_grafana_anonymous_enabled | bool
