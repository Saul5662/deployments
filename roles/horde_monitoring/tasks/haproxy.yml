---
# HAProxy safe configuration management for monitoring backends.
# Delegates the copy → blockinfile → validate → promote pipeline to
# the shared _haproxy_safe_edit micro-role.

# ── Build monitoring backends block ────────────────────────
- name: Build monitoring backends block content
  ansible.builtin.set_fact:
    _haproxy_backends_lines: >-
      {{
        (
        [
          'backend grafana_backend',
          '    balance leastconn',
          '    option forwardfor if-none',
          '    server grafana_local 127.0.0.1:' ~ grafana_port ~ ' check',
          '',
          'backend mimir_backend',
          '    balance leastconn',
          '    timeout queue 30s',
          '    retries 3',
          '    option httpchk',
          '    option forwardfor if-none',
          '    server mimir_local 127.0.0.1:' ~ mimir_port ~ ' check observe layer7',
          '    http-check expect ! rstatus ^5',
        ]
        + (
          [
            '',
            'backend loki_backend',
            '    balance leastconn',
            '    timeout queue 30s',
            '    retries 3',
            '    option httpchk',
            '    option forwardfor if-none',
            '    server loki_local 127.0.0.1:' ~ loki_port ~ ' check observe layer7',
            '    http-check expect ! rstatus ^5',
          ] if (monitoring_install_loki | bool) else []
        )
        + (
          [
            '',
            'backend tempo_otlp_backend',
            '    balance leastconn',
            '    timeout queue 30s',
            '    retries 3',
            '    option forwardfor if-none',
            '    server tempo_local 127.0.0.1:' ~ tempo_otlp_http_port ~ ' check',
          ] if (monitoring_install_tempo | bool) else []
        )
        ) }}

- name: Join backends into multi-line block
  ansible.builtin.set_fact:
    _haproxy_backends_block: "{{ _haproxy_backends_lines | join('\n') }}"

# ── Delegate to shared safe-edit pipeline ──────────────────
- name: Apply monitoring backends via shared safe-edit pipeline
  ansible.builtin.include_role:
    name: _haproxy_safe_edit
  vars:
    _hse_config_path: "{{ haproxy_config_path }}"
    _hse_backup_dir: "{{ haproxy_backup_dir }}"
    _hse_marker: "MONITORING BACKENDS"
    _hse_block: "{{ _haproxy_backends_block }}"
    _hse_backup_retention: "{{ haproxy_backup_retention_count | default(20) }}"
    _hse_apply: "{{ monitoring_start_services | default(true) | bool }}"
