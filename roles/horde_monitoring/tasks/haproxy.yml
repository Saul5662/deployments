---
# HAProxy safe configuration management for monitoring backends via conf.d drop-ins.

- name: Bootstrap HAProxy conf.d systemd override
  ansible.builtin.include_role:
    name: _haproxy_confd_bootstrap

- name: Configure monitoring HAProxy backends in conf.d
  ansible.builtin.template:
    src: horde-monitoring-haproxy.cfg.j2
    dest: /etc/haproxy/conf.d/horde-monitoring.cfg
    owner: root
    group: root
    mode: '0644'
    validate: "/usr/sbin/haproxy -c -f /etc/haproxy/haproxy.cfg -f %s"
  notify:
    - Restart HAProxy
