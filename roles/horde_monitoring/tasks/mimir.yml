---
# Deploy Mimir + Grafana monitoring stack via Docker Compose
# Grafana connects to Mimir via the shared Docker monitoring network

- name: Verify Docker is available
  ansible.builtin.command: docker --version
  changed_when: false
  failed_when: false
  register: horde_monitoring__docker_check
  become: true

- name: Fail if Docker is not installed
  ansible.builtin.fail:
    msg: "Docker is required for the monitoring stack. Please install Docker first."
  when: horde_monitoring__docker_check.rc != 0

- name: Verify Docker Compose V2 is available
  ansible.builtin.command: docker compose version
  changed_when: false
  failed_when: false
  register: horde_monitoring__compose_check
  become: true

- name: Fail if Docker Compose V2 is not available
  ansible.builtin.fail:
    msg: >-
      Docker Compose V2 plugin is required but 'docker compose version' failed.
      The standalone docker-compose (V1) is end-of-life. Please install the
      Docker Compose V2 plugin: https://docs.docker.com/compose/install/
  when: horde_monitoring__compose_check.rc != 0

- name: Validate S3 backend endpoint settings
  ansible.builtin.assert:
    that:
      - (horde_monitoring_s3_endpoint | string | length) > 0
      - (horde_monitoring_s3_internal_url | string) is match('^https?://')
      - (horde_monitoring_s3_api_url | string) is match('^https?://')
    fail_msg: >-
      Invalid S3 endpoint configuration. Set all of:
      horde_monitoring_s3_endpoint (host:port),
      horde_monitoring_s3_internal_url (http[s]://... reachable from Docker containers), and
      horde_monitoring_s3_api_url (http[s]://... reachable from host/systemd context).
  when: horde_monitoring_mimir_enable_s3 | bool

# Prevents deploying with default placeholder credentials when services
# would actually start. Skipped when horde_monitoring_start_services is false
# (CI/test environments) since passwords are irrelevant without running services.

- name: Fail if default S3 secret key is unchanged
  ansible.builtin.fail:
    msg: >-
      horde_monitoring_s3_secret_key is still set to the default placeholder
      'changeme-s3-secret'. Override it in your inventory or vault.
      See examples/horde_monitoring_stack.yml for a reference.
  when:
    - horde_monitoring_start_services | bool
    - horde_monitoring_mimir_enable_s3 | bool
    - horde_monitoring_s3_secret_key == "changeme-s3-secret"

- name: Fail if default Grafana password is unchanged
  ansible.builtin.fail:
    msg: >-
      horde_monitoring_grafana_admin_password is still set to the default placeholder
      'changeme'. Override it in your inventory or vault.
  when:
    - horde_monitoring_start_services | bool
    - horde_monitoring_install_grafana | bool
    - horde_monitoring_grafana_admin_password == "changeme"

- name: Create S3 data directory
  ansible.builtin.file:
    path: "{{ horde_monitoring_s3_data_dir }}"
    state: directory
    owner: "{{ horde_monitoring_s3_embedded_uid | string }}"
    group: "{{ horde_monitoring_s3_embedded_gid | string }}"
    mode: "0755"
  become: true
  when:
    - horde_monitoring_mimir_enable_s3 | bool
    - horde_monitoring_s3_deployment_mode == 'embedded'

- name: Create Mimir directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  loop:
    - "{{ horde_monitoring_mimir_config_dir }}"
    - "{{ horde_monitoring_mimir_data_dir }}"
    - "{{ horde_monitoring_mimir_data_dir }}/tsdb"
    - "{{ horde_monitoring_mimir_data_dir }}/data"
    - "{{ horde_monitoring_mimir_data_dir }}/data/tsdb-sync"
    - "{{ horde_monitoring_mimir_data_dir }}/data/compactor"
    - "{{ horde_monitoring_mimir_compose_dir }}"

- name: Create Mimir filesystem-only directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  loop:
    - "{{ horde_monitoring_mimir_data_dir }}/data/tsdb"
    - "{{ horde_monitoring_mimir_data_dir }}/data/rules"
  when: not (horde_monitoring_mimir_enable_s3 | bool)

- name: Create Grafana directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "472"
    group: "472"
    mode: "0755"
  become: true
  loop:
    - "{{ horde_monitoring_grafana_data_dir }}"
    - "{{ horde_monitoring_grafana_provisioning_dir }}"
    - "{{ horde_monitoring_grafana_provisioning_dir }}/datasources"
    - "{{ horde_monitoring_grafana_provisioning_dir }}/dashboards"
    - "{{ horde_monitoring_grafana_dashboard_dir }}"
  when: horde_monitoring_install_grafana | bool

# Docker auto-creates missing bind-mount sources as directories.  If a
# previous run started compose before configs were templated, the config
# path is a directory instead of a file and the container crash-loops.
- name: Check for stale Mimir config directories-as-files
  ansible.builtin.stat:
    path: "{{ horde_monitoring_mimir_config_dir }}/{{ item }}"
  register: horde_monitoring__mimir_config_stats
  become: true
  loop:
    - mimir.yaml
    - runtime-overrides.yaml

- name: Remove stale Mimir config directories-as-files
  ansible.builtin.file:
    path: "{{ horde_monitoring_mimir_config_dir }}/{{ item.item }}"
    state: absent
  become: true
  loop: "{{ horde_monitoring__mimir_config_stats.results }}"
  loop_control:
    label: "{{ item.item }}"
  when:
    - item.stat.exists
    - item.stat.isdir

- name: Template Mimir configuration
  ansible.builtin.template:
    src: mimir.yaml.j2
    dest: "{{ horde_monitoring_mimir_config_dir }}/mimir.yaml"
    owner: root
    group: root
    mode: "0600"
    backup: true
  become: true
  notify: Restart monitoring stack

- name: Template Mimir runtime overrides
  ansible.builtin.template:
    src: mimir-runtime-overrides.yaml.j2
    dest: "{{ horde_monitoring_mimir_config_dir }}/runtime-overrides.yaml"
    owner: root
    group: root
    mode: "0600"
    backup: true
  become: true
  notify: Restart monitoring stack

- name: Template Docker Compose for monitoring stack
  ansible.builtin.template:
    src: docker-compose.monitoring.yml.j2
    dest: "{{ horde_monitoring_mimir_compose_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0600"
    backup: true
  become: true
  no_log: true
  notify: Restart monitoring stack

- name: Template systemd service for monitoring stack
  ansible.builtin.template:
    src: mimir-monitoring.service.j2
    dest: /etc/systemd/system/mimir-monitoring.service
    mode: "0644"
  become: true
  notify:
    - Reload systemd

# --- Offsite backup via S3 mirror (mc mirror) ---

- name: Fail if backup enabled but no target configured
  ansible.builtin.fail:
    msg: >-
      horde_monitoring_mimir_backup_enabled is true but horde_monitoring_mimir_backup_target_endpoint is empty.
      Configure a backup target endpoint, or disable backup with
      horde_monitoring_mimir_backup_enabled: false.
      Embedded mode defaults to strict backup enforcement because local storage is single-drive.
  when:
    - horde_monitoring_mimir_backup_enabled | bool
    - horde_monitoring_mimir_enable_s3 | bool
    - horde_monitoring_s3_deployment_mode == 'embedded' or (horde_monitoring_mimir_backup_external_mode_enabled | default(false) | bool)
    - horde_monitoring_mimir_backup_target_endpoint | length == 0
    - horde_monitoring_start_services | bool

- name: Warn if backup is disabled in embedded mode
  ansible.builtin.debug:
    msg: >-
      WARNING: S3 backup is disabled. S3 storage is running in single-drive
      mode with no redundancy. A disk failure will result in permanent
      data loss of all historical metrics. Set horde_monitoring_mimir_backup_enabled: true
      and configure a remote S3 target.
  when:
    - not (horde_monitoring_mimir_backup_enabled | bool)
    - horde_monitoring_mimir_enable_s3 | bool
    - horde_monitoring_s3_deployment_mode == 'embedded'

- name: Inform that external S3 backup management is opt-in and currently disabled
  ansible.builtin.debug:
    msg: >-
      horde_monitoring_s3_deployment_mode=external and
      horde_monitoring_mimir_backup_external_mode_enabled=false:
      skipping local backup unit rendering.
      Set horde_monitoring_mimir_backup_external_mode_enabled=true to manage
      backup units for external S3 from this role.
  when:
    - horde_monitoring_mimir_backup_enabled | bool
    - horde_monitoring_mimir_enable_s3 | bool
    - horde_monitoring_s3_deployment_mode == 'external'
    - not (horde_monitoring_mimir_backup_external_mode_enabled | default(false) | bool)

- name: Create backup state directory
  ansible.builtin.file:
    path: "{{ horde_monitoring_mimir_backup_state_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  when:
    - horde_monitoring_mimir_backup_enabled | bool
    - horde_monitoring_mimir_enable_s3 | bool
    - horde_monitoring_s3_deployment_mode == 'embedded' or (horde_monitoring_mimir_backup_external_mode_enabled | default(false) | bool)

- name: Template S3 backup environment file
  ansible.builtin.template:
    src: mimir-backup.env.j2
    dest: "{{ horde_monitoring_mimir_config_dir }}/mimir-backup.env"
    owner: root
    group: root
    mode: "0600"
    backup: true
  become: true
  no_log: true
  notify: Reload systemd
  when:
    - horde_monitoring_mimir_backup_enabled | bool
    - horde_monitoring_mimir_enable_s3 | bool
    - horde_monitoring_s3_deployment_mode == 'embedded' or (horde_monitoring_mimir_backup_external_mode_enabled | default(false) | bool)

- name: Template S3 backup service
  ansible.builtin.template:
    src: mimir-backup.service.j2
    dest: /etc/systemd/system/mimir-backup.service
    owner: root
    group: root
    mode: "0600"
  become: true
  notify: Reload systemd
  when:
    - horde_monitoring_mimir_backup_enabled | bool
    - horde_monitoring_mimir_enable_s3 | bool
    - horde_monitoring_s3_deployment_mode == 'embedded' or (horde_monitoring_mimir_backup_external_mode_enabled | default(false) | bool)

- name: Template S3 backup timer
  ansible.builtin.template:
    src: mimir-backup.timer.j2
    dest: /etc/systemd/system/mimir-backup.timer
    mode: "0644"
  become: true
  notify: Reload systemd
  when:
    - horde_monitoring_mimir_backup_enabled | bool
    - horde_monitoring_mimir_enable_s3 | bool
    - horde_monitoring_s3_deployment_mode == 'embedded' or (horde_monitoring_mimir_backup_external_mode_enabled | default(false) | bool)

- name: Enable and start S3 backup timer
  ansible.builtin.systemd:
    name: mimir-backup.timer
    enabled: true
    state: started
    daemon_reload: true
  become: true
  when:
    - horde_monitoring_mimir_backup_enabled | bool
    - horde_monitoring_mimir_enable_s3 | bool
    - horde_monitoring_s3_deployment_mode == 'embedded' or (horde_monitoring_mimir_backup_external_mode_enabled | default(false) | bool)
    - horde_monitoring_start_services | bool

- name: Verify backup target is reachable
  ansible.builtin.command: >
    docker run --rm --network host
    -e MC_HOST_remote
    {{ horde_monitoring_s3_mc_image }}
    mc ls remote/{{ horde_monitoring_mimir_backup_target_bucket }}-blocks
  environment:
    MC_HOST_remote: >-
      {{ 'https' if not (horde_monitoring_mimir_backup_target_insecure | bool) else 'http' }}://{{
      horde_monitoring_mimir_backup_target_access_key }}:{{ horde_monitoring_mimir_backup_target_secret_key }}@{{
      horde_monitoring_mimir_backup_target_endpoint | regex_replace('^https?://', '') }}
  become: true
  changed_when: false
  no_log: true
  register: horde_monitoring__backup_target_check
  failed_when: false
  when:
    - horde_monitoring_mimir_backup_enabled | bool
    - horde_monitoring_mimir_enable_s3 | bool
    - horde_monitoring_s3_deployment_mode == 'embedded' or (horde_monitoring_mimir_backup_external_mode_enabled | default(false) | bool)
    - horde_monitoring_start_services | bool
    - horde_monitoring_mimir_backup_target_endpoint | length > 0

- name: Warn if backup target is unreachable
  ansible.builtin.debug:
    msg: >-
      WARNING: Backup target connectivity check failed. The backup timer
      is enabled but the first backup run may fail. Verify that
      horde_monitoring_mimir_backup_target_endpoint ({{ horde_monitoring_mimir_backup_target_endpoint }})
      is reachable and credentials are correct. Error:
      {{ horde_monitoring__backup_target_check.stderr | default('(no error output)') }}
  when:
    - horde_monitoring_mimir_backup_enabled | bool
    - horde_monitoring_mimir_enable_s3 | bool
    - horde_monitoring_s3_deployment_mode == 'embedded' or (horde_monitoring_mimir_backup_external_mode_enabled | default(false) | bool)
    - horde_monitoring_start_services | bool
    - horde_monitoring_mimir_backup_target_endpoint | length > 0
    - horde_monitoring__backup_target_check.rc | default(0) != 0
