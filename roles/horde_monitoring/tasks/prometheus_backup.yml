---
# Deploy Prometheus backup solution
# This task file is part of the horde_monitoring role

- name: Create backup directories
  file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: '0755'
  loop:
    - "{{ prometheus_backup_dir }}"
    - "{{ prometheus_backup_dir }}/daily"
    - "{{ prometheus_backup_dir }}/monthly"
  become: yes

- name: Create textfile collector directory for backup metrics
  file:
    path: "{{ prometheus_backup_metrics_file | dirname }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: '0755'
  become: yes

- name: Deploy backup script
  template:
    src: prometheus_backup.sh.j2
    dest: /usr/local/bin/prometheus_backup.sh
    owner: root
    group: root
    mode: '0755'
  become: yes

- name: Deploy restore script
  template:
    src: prometheus_restore.sh.j2
    dest: /usr/local/bin/prometheus_restore.sh
    owner: root
    group: root
    mode: '0755'
  become: yes

- name: Deploy backup verification script
  template:
    src: prometheus_verify_backup.sh.j2
    dest: /usr/local/bin/prometheus_verify_backup.sh
    owner: root
    group: root
    mode: '0755'
  become: yes

- name: Deploy backup systemd service
  template:
    src: prometheus-backup.service.j2
    dest: /etc/systemd/system/prometheus-backup.service
    owner: root
    group: root
    mode: '0644'
  become: yes
  notify: reload systemd

- name: Deploy backup systemd timer
  template:
    src: prometheus-backup.timer.j2
    dest: /etc/systemd/system/prometheus-backup.timer
    owner: root
    group: root
    mode: '0644'
  become: yes
  notify: reload systemd

- name: Ensure systemd is reloaded
  systemd:
    daemon_reload: yes
  become: yes

- name: Enable and start backup timer
  systemd:
    name: prometheus-backup.timer
    enabled: yes
    state: started
  become: yes

- name: Create logrotate configuration for backup logs
  copy:
    content: |
      {{ prometheus_backup_log_file }} {
          daily
          rotate 30
          compress
          delaycompress
          missingok
          notifempty
          create 0644 prometheus prometheus
      }
    dest: /etc/logrotate.d/prometheus-backup
    owner: root
    group: root
    mode: '0644'
  become: yes

- name: Ensure Prometheus rules directory exists
  file:
    path: /etc/prometheus/rules
    state: directory
    owner: prometheus
    group: prometheus
    mode: '0755'
  become: yes

- name: Deploy Prometheus alert rules for backups
  copy:
    src: prometheus_backup_alerts.yml
    dest: /etc/prometheus/rules/prometheus_backup_alerts.yml
    owner: prometheus
    group: prometheus
    mode: '0644'
  become: yes
  notify: reload prometheus

- name: Create doc directory for runbook
  file:
    path: /usr/local/share/doc
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: yes

- name: Deploy backup runbook documentation
  copy:
    src: prometheus_backup_runbook.md
    dest: /usr/local/share/doc/prometheus_backup_runbook.md
    owner: root
    group: root
    mode: '0644'
  become: yes

- name: Display backup information
  debug:
    msg:
      - "Prometheus backup has been configured with monitoring:"
      - "  Backup directory: {{ prometheus_backup_dir }}"
      - "  Schedule: {{ prometheus_backup_schedule }}"
      - "  Daily retention: {{ prometheus_backup_daily_retention }} days"
      - "  Monthly retention: {{ prometheus_backup_monthly_retention }} months"
      - "  Compression: {{ prometheus_backup_compression }}"
      - ""
      - "Monitoring enabled:"
      - "  Metrics: {{ prometheus_backup_metrics_file }}"
      - "  Alert rules: /etc/prometheus/rules/prometheus_backup_alerts.yml"
      - "  Runbook: /usr/local/share/doc/prometheus_backup_runbook.md"
      - ""
      - "Available commands:"
      - "  Manual backup: sudo -u prometheus /usr/local/bin/prometheus_backup.sh"
      - "  Verify backups: sudo /usr/local/bin/prometheus_verify_backup.sh"
      - "  Restore backup: sudo /usr/local/bin/prometheus_restore.sh <backup-file>"
      - "  Check timer: systemctl status prometheus-backup.timer"
      - "  View logs: journalctl -u prometheus-backup.service"
      - "  View runbook: cat /usr/local/share/doc/prometheus_backup_runbook.md"
