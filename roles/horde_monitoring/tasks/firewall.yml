---
# Firewall configuration for monitoring stack
# Note: Mimir and Grafana bind to 127.0.0.1 by default.
# Only open ports if you need external access (not recommended without a reverse proxy).
#
# WARNING: These rules allow traffic from ANY source. If you change service
# bind addresses from 127.0.0.1 to 0.0.0.0 (e.g. for multi-host access),
# add source IP restrictions (ufw: from_addr) to avoid exposing unauthenticated
# services to the internet.

- name: Allow Grafana port
  community.general.ufw:
    rule: allow
    port: "{{ horde_monitoring_grafana_port | string }}"
    proto: tcp
  become: true
  when: horde_monitoring_install_grafana | bool

- name: Allow Mimir port
  community.general.ufw:
    rule: allow
    port: "{{ horde_monitoring_mimir_port | string }}"
    proto: tcp
  become: true
  when: horde_monitoring_install_mimir | bool
