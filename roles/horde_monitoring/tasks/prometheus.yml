---
# Deploy Prometheus via the prometheus.prometheus.prometheus community role
# Prometheus scrapes local exporters and remote-writes to Mimir for long-term storage

- name: Build default scrape configs
  set_fact:
    _monitoring_scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets:
              - "localhost:{{ prometheus_port }}"
      - job_name: "mimir"
        static_configs:
          - targets:
              - "localhost:{{ mimir_port }}"
      - job_name: "horde-exporter"
        scrape_interval: 15s
        static_configs:
          - targets:
              - "localhost:9100"
      - job_name: "node"
        static_configs:
          - targets:
              - "localhost:9300"

- name: Append extra scrape configs
  set_fact:
    _monitoring_scrape_configs: "{{ _monitoring_scrape_configs + monitoring_extra_scrape_configs }}"
  when: monitoring_extra_scrape_configs | length > 0

- name: Deploy Prometheus via community role
  include_role:
    name: prometheus.prometheus.prometheus
  vars:
    prometheus_web_listen_address: "127.0.0.1:{{ prometheus_port }}"
    prometheus_storage_retention: "{{ prometheus_retention_time }}"
    prometheus_storage_retention_size: "{{ prometheus_retention_size | default(omit) }}"
    prometheus_global:
      scrape_interval: "{{ prometheus_scrape_interval }}"
      evaluation_interval: "{{ prometheus_evaluation_interval }}"
    prometheus_scrape_configs: "{{ _monitoring_scrape_configs }}"
    prometheus_remote_write:
      - url: "http://localhost:{{ mimir_port }}/api/v1/push"
        headers:
          X-Scope-OrgID: "{{ monitoring_application_tenant_id }}"
      - url: "http://localhost:{{ mimir_port }}/api/v1/push"
        headers:
          X-Scope-OrgID: "{{ monitoring_public_tenant_id }}"
        write_relabel_configs:
          - source_labels: [job]
            regex: horde-exporter
            action: keep
