---
# AI Horde Monitoring Stack Deployment
# Deploys Grafana Mimir + Grafana via Docker Compose (managed by systemd)
# Prometheus is NOT part of this role — deploy it directly in your playbook
# using the prometheus.prometheus.prometheus community role.

# ── Flag-combination validation ────────────────────────────
- name: Warn when backup is enabled but S3 storage is disabled
  ansible.builtin.debug:
    msg: >-
      horde_monitoring_mimir_backup_enabled=true has no effect because horde_monitoring_mimir_enable_s3=false.
      Backups require S3-compatible storage as the object-storage backend.
      Set horde_monitoring_mimir_backup_enabled=false to silence this warning,
      or enable S3 storage with horde_monitoring_mimir_enable_s3=true.
  when:
    - horde_monitoring_mimir_backup_enabled | default(false) | bool
    - not (horde_monitoring_mimir_enable_s3 | default(true) | bool)

- name: Warn when Grafana anonymous access is enabled but Grafana is disabled
  ansible.builtin.debug:
    msg: >-
      horde_monitoring_grafana_anonymous_enabled=true has no effect because
      horde_monitoring_install_grafana=false. Either enable Grafana or
      set horde_monitoring_grafana_anonymous_enabled=false.
  when:
    - horde_monitoring_grafana_anonymous_enabled | default(false) | bool
    - not (horde_monitoring_install_grafana | default(true) | bool)

- name: Warn when Tempo metrics generator is enabled but Tempo is disabled
  ansible.builtin.debug:
    msg: >-
      horde_monitoring_tempo_metrics_generator_enabled=true has no effect because
      horde_monitoring_install_tempo=false. Either enable Tempo or
      set horde_monitoring_tempo_metrics_generator_enabled=false.
  when:
    - horde_monitoring_tempo_metrics_generator_enabled | default(false) | bool
    - not (horde_monitoring_install_tempo | default(true) | bool)

- name: Fail when S3 deployment mode is invalid
  ansible.builtin.fail:
    msg: >-
      horde_monitoring_s3_deployment_mode must be either 'embedded' or 'external'.
      Got: {{ horde_monitoring_s3_deployment_mode }}
  when:
    - horde_monitoring_mimir_enable_s3 | default(true) | bool
    - horde_monitoring_s3_deployment_mode not in ['embedded', 'external']

- name: Warn when automatic S3 bucket management is disabled in embedded mode
  ansible.builtin.debug:
    msg: >-
      horde_monitoring_s3_manage_buckets=false: the role will not run the s3-init
      bucket bootstrap job. Ensure required buckets already exist and credentials
      permit read/write access.
  when:
    - horde_monitoring_mimir_enable_s3 | default(true) | bool
    - horde_monitoring_s3_deployment_mode == 'embedded'
    - not (horde_monitoring_s3_manage_buckets | default(true) | bool)

- name: Warn when automatic S3 bucket management is enabled in external mode
  ansible.builtin.debug:
    msg: >-
      horde_monitoring_s3_deployment_mode=external and horde_monitoring_s3_manage_buckets=true:
      the role will run the s3-init bucket bootstrap job against your external backend.
      Ensure the configured credentials have bucket-admin permissions.
  when:
    - horde_monitoring_mimir_enable_s3 | default(true) | bool
    - horde_monitoring_s3_deployment_mode == 'external'
    - horde_monitoring_s3_manage_buckets | default(false) | bool

- name: Deploy Mimir + Grafana monitoring stack
  ansible.builtin.include_tasks: mimir.yml
  when: horde_monitoring_install_mimir | bool

- name: Deploy Loki log aggregation backend
  ansible.builtin.include_tasks: loki.yml
  when: horde_monitoring_install_loki | bool

- name: Deploy Tempo distributed tracing backend
  ansible.builtin.include_tasks: tempo.yml
  when: horde_monitoring_install_tempo | bool

- name: Deploy Pyroscope continuous profiling backend
  ansible.builtin.include_tasks: pyroscope.yml
  when: horde_monitoring_install_pyroscope | bool

# Start compose AFTER all config files are templated.  Starting earlier
# causes Docker to auto-create missing bind-mount sources as empty
# directories, which corrupt the config paths and crash containers.
- name: Start monitoring stack and wait for health
  ansible.builtin.include_tasks: service.yml
  when: horde_monitoring_install_mimir | bool

- name: Configure Grafana provisioning
  ansible.builtin.include_tasks: grafana.yml
  when:
    - horde_monitoring_install_mimir | bool
    - horde_monitoring_install_grafana | bool

- name: Provision Grafana dashboards from horde-exporters
  ansible.builtin.include_tasks: dashboards.yml
  when:
    - horde_monitoring_install_grafana | bool
    - horde_monitoring_grafana_provision_dashboards | bool

- name: Deploy monitoring stack alerting rules
  ansible.builtin.include_tasks: alerting.yml
  when: horde_monitoring_install_alerting_rules | bool

- name: Configure HAProxy for monitoring
  ansible.builtin.include_tasks: haproxy.yml
  when: horde_monitoring_configure_haproxy | bool

- name: Configure firewall rules
  ansible.builtin.include_tasks: firewall.yml
  when: horde_monitoring_configure_firewall | bool
