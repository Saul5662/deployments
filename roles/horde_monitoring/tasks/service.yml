---
# Start the monitoring Docker Compose stack and wait for health.
#
# This file is included from main.yml AFTER all config templates
# (mimir, loki, tempo, pyroscope) have been written.  Starting compose
# only after configs exist avoids Docker auto-creating bind-mount
# sources as empty directories when the target files are missing.

- name: Flush pending handlers before starting services
  ansible.builtin.meta: flush_handlers

# Embedded Garage requires several CLI bootstrap steps (layout assign /
# apply, key import, bucket create, bucket allow) that can only run once
# the s3-store container is up.  If we bring up the FULL compose stack
# first, tempo / pyroscope / mimir / loki will start before those steps
# finish and crash-loop with "Bucket not found" / "No such key" /
# "Operation not allowed for this key" until the bootstrap catches up.
# To avoid that startup race, bring up only s3-store here when running
# in embedded mode; the full stack is brought up further down (after
# bucket bootstrap) by the mimir-monitoring systemd unit, whose
# `docker compose up -d` is idempotent and will leave s3-store alone.
- name: Pre-start s3-store before bucket bootstrap (embedded Garage)
  ansible.builtin.command:
    cmd: docker compose up -d s3-store
    chdir: "{{ horde_monitoring_mimir_compose_dir }}"
  register: horde_monitoring__garage_prestart
  changed_when: "'Started' in (horde_monitoring__garage_prestart.stderr | default('')) or 'Created' in (horde_monitoring__garage_prestart.stderr | default(''))"
  become: true
  when:
    - horde_monitoring_start_services | bool
    - horde_monitoring_mimir_enable_s3 | bool
    - horde_monitoring_s3_deployment_mode == 'embedded'

# --- Embedded Garage cluster initialization via CLI ---
# Uses docker exec to run the /garage CLI binary inside the running container.
# This replaces the fragile curl/JSON-parsing sidecar approach.

- name: Wait for embedded Garage to accept CLI commands
  ansible.builtin.command:
    cmd: docker exec s3-store /garage -c /etc/garage.toml status
  register: horde_monitoring__garage_cli_ready
  changed_when: false
  until: horde_monitoring__garage_cli_ready.rc == 0
  retries: 15
  delay: 3
  become: true
  when:
    - horde_monitoring_start_services | bool
    - horde_monitoring_mimir_enable_s3 | bool
    - horde_monitoring_s3_deployment_mode == 'embedded'

- name: Get embedded Garage node ID
  ansible.builtin.command:
    cmd: docker exec s3-store /garage -c /etc/garage.toml node id
  register: horde_monitoring__garage_node_id_raw
  changed_when: false
  become: true
  when:
    - horde_monitoring_start_services | bool
    - horde_monitoring_mimir_enable_s3 | bool
    - horde_monitoring_s3_deployment_mode == 'embedded'

- name: Parse embedded Garage node ID for layout assignment
  ansible.builtin.set_fact:
    horde_monitoring__garage_node_id: >-
      {{ (horde_monitoring__garage_node_id_raw.stdout
          | regex_findall('([0-9a-f]{16,64})@') | first)
         | default('', true) }}
  when:
    - horde_monitoring_start_services | bool
    - horde_monitoring_mimir_enable_s3 | bool
    - horde_monitoring_s3_deployment_mode == 'embedded'

- name: Check if embedded Garage layout is already applied
  ansible.builtin.uri:
    url: "{{ horde_monitoring_s3_healthcheck_url }}"
    method: GET
    status_code: [200, 503]
  register: horde_monitoring__garage_health_precheck
  become: true
  when:
    - horde_monitoring_start_services | bool
    - horde_monitoring_mimir_enable_s3 | bool
    - horde_monitoring_s3_deployment_mode == 'embedded'

- name: Assign embedded Garage single-node layout
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - s3-store
      - /garage
      - -c
      - /etc/garage.toml
      - layout
      - assign
      - "{{ horde_monitoring__garage_node_id }}"
      - --zone
      - dc1
      - --capacity
      - "{{ horde_monitoring_s3_capacity | human_to_bytes }}"
  become: true
  changed_when: true
  when:
    - horde_monitoring_start_services | bool
    - horde_monitoring_mimir_enable_s3 | bool
    - horde_monitoring_s3_deployment_mode == 'embedded'
    - horde_monitoring__garage_health_precheck.status | default(503) == 503

- name: Apply embedded Garage layout (version 1)
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - s3-store
      - /garage
      - -c
      - /etc/garage.toml
      - layout
      - apply
      - --version
      - "1"
  become: true
  changed_when: true
  when:
    - horde_monitoring_start_services | bool
    - horde_monitoring_mimir_enable_s3 | bool
    - horde_monitoring_s3_deployment_mode == 'embedded'
    - horde_monitoring__garage_health_precheck.status | default(503) == 503

- name: Import embedded Garage S3 access key
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - s3-store
      - /garage
      - -c
      - /etc/garage.toml
      - key
      - import
      - --yes
      - -n
      - "{{ horde_monitoring_s3_access_key_name }}"
      - "{{ horde_monitoring_s3_access_key }}"
      - "{{ horde_monitoring_s3_secret_key }}"
  register: horde_monitoring__garage_key_import
  changed_when: horde_monitoring__garage_key_import.rc == 0
  failed_when: >-
    horde_monitoring__garage_key_import.rc != 0 and
    ('KeyAlreadyExists' not in
      ((horde_monitoring__garage_key_import.stdout | default('')) ~ ' ' ~ (horde_monitoring__garage_key_import.stderr | default(''))))
  become: true
  no_log: true
  when:
    - horde_monitoring_start_services | bool
    - horde_monitoring_mimir_enable_s3 | bool
    - horde_monitoring_s3_deployment_mode == 'embedded'

- name: Build list of embedded Garage buckets to create
  ansible.builtin.set_fact:
    horde_monitoring__garage_buckets: >-
      {{
        [horde_monitoring_s3_blocks_bucket, horde_monitoring_s3_ruler_bucket]
        + ((horde_monitoring_install_loki | bool) | ternary([horde_monitoring_loki_chunks_bucket], []))
        + ((horde_monitoring_install_tempo | bool) | ternary([horde_monitoring_tempo_traces_bucket], []))
        + ((horde_monitoring_install_pyroscope | bool) | ternary([horde_monitoring_pyroscope_blocks_bucket], []))
      }}
  when:
    - horde_monitoring_start_services | bool
    - horde_monitoring_mimir_enable_s3 | bool
    - horde_monitoring_s3_deployment_mode == 'embedded'

- name: Create embedded Garage buckets
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - s3-store
      - /garage
      - -c
      - /etc/garage.toml
      - bucket
      - create
      - "{{ item }}"
  register: horde_monitoring__garage_bucket_create
  changed_when: horde_monitoring__garage_bucket_create.rc == 0
  failed_when: >-
    horde_monitoring__garage_bucket_create.rc != 0 and
    ('BucketAlreadyExists' not in
      ((horde_monitoring__garage_bucket_create.stdout | default('')) ~ ' ' ~ (horde_monitoring__garage_bucket_create.stderr | default(''))))
  become: true
  loop: "{{ horde_monitoring__garage_buckets }}"
  when:
    - horde_monitoring_start_services | bool
    - horde_monitoring_mimir_enable_s3 | bool
    - horde_monitoring_s3_deployment_mode == 'embedded'

- name: Grant embedded Garage bucket permissions
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - s3-store
      - /garage
      - -c
      - /etc/garage.toml
      - bucket
      - allow
      - --read
      - --write
      - --owner
      - "{{ item }}"
      - --key
      - "{{ horde_monitoring_s3_access_key_name }}"
  register: horde_monitoring__garage_bucket_allow
  changed_when: horde_monitoring__garage_bucket_allow.rc == 0
  failed_when: horde_monitoring__garage_bucket_allow.rc != 0
  become: true
  loop: "{{ horde_monitoring__garage_buckets }}"
  when:
    - horde_monitoring_start_services | bool
    - horde_monitoring_mimir_enable_s3 | bool
    - horde_monitoring_s3_deployment_mode == 'embedded'

# Now that the embedded Garage cluster is fully bootstrapped (layout
# applied, key imported, buckets created and granted), bring up the
# rest of the compose stack.  In external-S3 mode, this is the first
# `up` call and brings up everything including the s3-init sidecar.
- name: Enable and start monitoring stack
  ansible.builtin.systemd:
    name: mimir-monitoring
    enabled: true
    state: started
    daemon_reload: true
  become: true
  when: horde_monitoring_start_services | bool

# The systemd unit is Type=oneshot + RemainAfterExit=yes.  After manual
# "docker compose down", a host reboot that killed containers, or a
# failed previous run, systemd still reports "active (exited)" while the
# actual containers are gone.  "state: started" above is a no-op in that
# situation.  Detect this and force a restart so health checks don't fail.
- name: Check if Mimir container is actually running
  ansible.builtin.command: docker inspect --format '{{ '{{' }}.State.Running{{ '}}' }}' mimir
  register: horde_monitoring__mimir_container_state
  changed_when: false
  failed_when: false
  become: true
  when: horde_monitoring_start_services | bool

- name: Restart monitoring stack if containers are not running
  ansible.builtin.systemd:
    name: mimir-monitoring
    state: restarted
  become: true
  when:
    - horde_monitoring_start_services | bool
    - horde_monitoring__mimir_container_state.stdout | default('false') != 'true'

- name: Wait for S3 storage health endpoint when enabled
  ansible.builtin.uri:
    url: "{{ horde_monitoring_s3_healthcheck_url }}"
    method: GET
    status_code: 200
  register: horde_monitoring__s3_ready
  until: horde_monitoring__s3_ready.status == 200
  when:
    - horde_monitoring_start_services | bool
    - horde_monitoring_mimir_enable_s3 | bool
    - horde_monitoring_s3_wait_for_ready | default(horde_monitoring_s3_deployment_mode == 'embedded') | bool
    - horde_monitoring_s3_healthcheck_url | default('') | length > 0
  retries: 15
  delay: 3
  become: true

- name: Wait for Mimir to become ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ horde_monitoring_mimir_port }}/ready"
    method: GET
    status_code: 200
  register: horde_monitoring__mimir_ready
  until: horde_monitoring__mimir_ready.status == 200
  when: horde_monitoring_start_services | bool
  retries: 20
  delay: 5
  become: true
