---
# Handlers for horde_monitoring role

- name: reload systemd
  systemd:
    daemon_reload: yes
  become: true
  when: monitoring_start_services | bool

- name: restart monitoring stack
  shell: >
    docker compose pull --quiet &&
    docker compose up -d
  args:
    chdir: "{{ mimir_compose_dir }}"
  become: true
  when: monitoring_start_services | bool

# Prometheus is deployed by a separate role (prometheus.prometheus) and may
# not be installed or running when this handler fires.  failed_when: false
# prevents the handler from breaking plays where Prometheus isn't present yet.
- name: reload prometheus
  systemd:
    name: prometheus
    state: reloaded
  become: true
  register: _reload_prometheus
  failed_when: false
  changed_when: _reload_prometheus.status is defined and _reload_prometheus.status.ActiveState == 'active'

- name: reload haproxy
  systemd:
    name: haproxy
    state: reloaded
  become: true
