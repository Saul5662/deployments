---
# Handlers for horde_monitoring role

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  become: true
  when: horde_monitoring_start_services | bool

- name: Restart monitoring stack
  ansible.builtin.shell: >
    docker compose up -d
  args:
    chdir: "{{ horde_monitoring_mimir_compose_dir }}"
  become: true
  changed_when: true
  when: horde_monitoring_start_services | bool

# Prometheus is deployed by a separate role (prometheus.prometheus) and may
# not be installed or running when this handler fires.  failed_when: false
# prevents the handler from breaking plays where Prometheus isn't present yet.
- name: Reload prometheus
  ansible.builtin.systemd:
    name: prometheus
    state: reloaded
  become: true
  register: horde_monitoring__reload_prometheus
  failed_when: false
  changed_when: horde_monitoring__reload_prometheus.status is defined and horde_monitoring__reload_prometheus.status.ActiveState == 'active'
