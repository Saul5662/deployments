---
# Handlers for horde_monitoring role

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  become: true
  when: monitoring_start_services | bool

- name: Restart monitoring stack
  ansible.builtin.shell: >
    docker compose pull --quiet &&
    docker compose up -d
  args:
    chdir: "{{ mimir_compose_dir }}"
  become: true
  changed_when: true
  when: monitoring_start_services | bool

# Prometheus is deployed by a separate role (prometheus.prometheus) and may
# not be installed or running when this handler fires.  failed_when: false
# prevents the handler from breaking plays where Prometheus isn't present yet.
- name: Reload prometheus
  ansible.builtin.systemd:
    name: prometheus
    state: reloaded
  become: true
  register: _reload_prometheus
  failed_when: false
  changed_when: _reload_prometheus.status is defined and _reload_prometheus.status.ActiveState == 'active'

- name: Reload haproxy
  ansible.builtin.systemd:
    name: haproxy
    state: reloaded
  become: true

- name: Validate and promote HAProxy config
  block:
    - name: Validate working copy with HAProxy config checker
      ansible.builtin.command: haproxy -c -f {{ _haproxy_working_file.path }}
      become: true
      register: _haproxy_validation
      changed_when: false
      failed_when:
        - _haproxy_validation.rc != 0
        - "'has no error' not in (_haproxy_validation.stdout | default(''))"

    - name: Promote validated config to live
      ansible.builtin.copy:
        src: "{{ _haproxy_working_file.path }}"
        dest: "{{ haproxy_config_path }}"
        remote_src: true
        mode: "0644"
      become: true
      notify: Reload haproxy
