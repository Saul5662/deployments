---
# Handlers for horde_monitoring role

- name: reload systemd
  systemd:
    daemon_reload: yes
  become: true

- name: restart prometheus
  systemd:
    name: prometheus
    state: restarted
  become: true

- name: reload prometheus
  systemd:
    name: prometheus
    state: reloaded
  become: true

- name: restart grafana
  systemd:
    name: grafana-server
    state: restarted
  become: true

- name: restart influxdb
  systemd:
    name: influxdb
    state: restarted
  become: true
