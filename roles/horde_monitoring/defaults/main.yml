---
# Default variables for horde_monitoring role
#
# This role deploys Mimir + Grafana (and optionally Loki, Tempo, Pyroscope)
# via Docker Compose. Prometheus is NOT managed by this role — deploy it
# directly in your playbook using the prometheus.prometheus.prometheus
# community role.
#
# See roles/horde_monitoring/README.md for full documentation.

# Component flags
horde_monitoring_install_mimir: true
horde_monitoring_install_grafana: true
horde_monitoring_configure_firewall: false
horde_monitoring_configure_haproxy: false

# Set to false in CI/test environments to skip Docker Compose service startup
# and health-check waits. All configs are still rendered and can be asserted on.
horde_monitoring_start_services: true

# Mimir configuration (Docker-based, monolithic mode, S3-compatible object storage)
horde_monitoring_mimir_port: 9009
horde_monitoring_mimir_image: "grafana/mimir:2.15.0"
horde_monitoring_mimir_config_dir: "/etc/mimir"
horde_monitoring_mimir_data_dir: "/var/lib/mimir"
horde_monitoring_mimir_compose_dir: "/opt/mimir"
horde_monitoring_mimir_log_level: "warn"
# Global compactor block retention. Empty string = leave unset and rely on tenant overrides.
horde_monitoring_mimir_blocks_retention: ""
horde_monitoring_mimir_runtime_config_period: "10s"

# S3-compatible object storage backend
# Provides the long-term block storage backend for Mimir, Loki, Tempo, and Pyroscope.
#
# Deployment modes:
# - embedded: role deploys a local Garage container (default; convenient for local dev)
# - external: role does not deploy storage; point endpoint vars at an existing S3 backend
#
# The role explicitly supports any Mimir-compatible S3 backend by configuring
# endpoint/auth/path-style/insecure options via these variables.
horde_monitoring_mimir_enable_s3: true
horde_monitoring_s3_deployment_mode: "embedded"

# Operator-managed S3 flag.
# When true, the monitoring role assumes the operator manages S3 lifecycle
# externally (e.g. via the standalone garage role on another host). The role:
# - Skips S3 reachability pre-flight checks at deploy time
# - Still configures Mimir/Loki/Tempo/Pyroscope to point at the endpoint
# - Does not deploy any S3 containers (same as external mode)
#
# Use this when S3 is deployed to a different host (e.g. via the garage role)
# and you want to avoid false failures if S3 is deployed in a separate play
# or is temporarily unreachable during the monitoring deploy.
horde_monitoring_s3_operator_managed: false

# S3 endpoint used by Mimir/Loki/Tempo/Pyroscope configs (host:port, no scheme).
# Embedded default resolves via Docker network service name.
horde_monitoring_s3_endpoint: "s3-store:3900"

# Full URLs used by health checks and mc alias operations.
# - internal_url: endpoint as seen from compose-network containers
# - api_url: endpoint as seen from the host/systemd context
horde_monitoring_s3_internal_url: "http://s3-store:3900"
horde_monitoring_s3_api_url: "http://127.0.0.1:{{ horde_monitoring_s3_api_port }}"
# Garage health is on the admin API port, not the S3 API port.
horde_monitoring_s3_healthcheck_url: "http://127.0.0.1:{{ horde_monitoring_s3_admin_port }}/health"
# Wait for S3 health endpoint before checking Mimir readiness.
# Default is mode-aware:
# - embedded: true (local Garage exposes /health on admin port)
# - external: false (many providers do not expose a compatible /health endpoint)
horde_monitoring_s3_wait_for_ready: "{{ horde_monitoring_s3_deployment_mode == 'embedded' }}"

# S3 client behavior flags for all backends.
horde_monitoring_s3_insecure: true
horde_monitoring_s3_force_path_style: true
# S3 region — must match the s3_region configured in the Garage toml.
horde_monitoring_s3_region: "garage"

# Embedded Garage S3 image defaults
horde_monitoring_s3_image: "dxflrs/garage:v2.1.0"
# mc (MinIO client) image used for external mode bucket management.
horde_monitoring_s3_mc_image: "minio/mc:RELEASE.2025-08-13T08-35-41Z"
horde_monitoring_s3_api_port: 3900
# Admin API port — used for health checks and embedded mode bootstrap.
horde_monitoring_s3_admin_port: 3903
horde_monitoring_s3_rpc_port: 3901
# Persistent directories for Garage object and metadata storage.
horde_monitoring_s3_data_dir: "/var/lib/garage/data"
horde_monitoring_s3_metadata_dir: "/var/lib/garage/meta"
horde_monitoring_s3_config_dir: "/etc/garage"
# Garage admin token — used for admin API auth (required for embedded mode bootstrap).
horde_monitoring_s3_admin_token: "changeme-s3-admin-token"
# Garage RPC secret — 32-byte hex for inter-node RPC authentication.
horde_monitoring_s3_rpc_secret: "changeme-s3-rpc-secret"
# Node capacity for embedded mode layout assignment.
horde_monitoring_s3_capacity: "1 TB"
# Garage key ID used by embedded Garage mode S3 clients (GK + 24 hex chars).
# In external mode, this can be any provider-compatible access key format.
horde_monitoring_s3_access_key: "CHANGE_ME_GARAGE_ACCESS_KEY_ID"
# Human-readable embedded Garage key name used by bucket grant commands.
horde_monitoring_s3_access_key_name: "mimir"
horde_monitoring_s3_secret_key: "changeme-s3-secret"
# Automatically create required buckets via mc init job.
# Default is mode-aware:
# - embedded: true (bootstrap local buckets)
# - external: false (opt-in; avoids requiring admin permissions on shared backends)
horde_monitoring_s3_manage_buckets: "{{ horde_monitoring_s3_deployment_mode == 'embedded' }}"
horde_monitoring_s3_blocks_bucket: "mimir-blocks"
horde_monitoring_s3_ruler_bucket: "mimir-ruler"
horde_monitoring_s3_alertmanager_bucket: "mimir-alertmanager"
horde_monitoring_s3_memory_limit: "512m"

# External S3 metrics scraping (used when horde_monitoring_s3_deployment_mode == 'external').
# In external mode, the standalone garage role exposes metrics through an
# authenticated HAProxy proxy (basic-auth → Bearer translation).
# These defaults are intentionally empty/safe so that an operator must
# explicitly wire them (typically via hostvars lookups in inventory/group_vars).
horde_monitoring_external_s3_host: ""
horde_monitoring_external_s3_port: 3900
horde_monitoring_external_s3_metrics_port: 3910
horde_monitoring_external_s3_metrics_username: "prometheus"
horde_monitoring_external_s3_metrics_password: ""
# Computed scrape target — resolves to the HAProxy proxy in external mode,
# or the local Garage admin API in embedded mode.
horde_monitoring_s3_metrics_target: >-
  {{
    (
      horde_monitoring_external_s3_host
      ~ ':'
      ~ (horde_monitoring_external_s3_metrics_port | string)
    )
    if horde_monitoring_s3_deployment_mode == 'external'
    else 'localhost:' ~ ((horde_monitoring_s3_admin_port | default(3903)) | string)
  }}

# Offsite backup via S3 client (mc) mirror.
# Only applies when horde_monitoring_mimir_enable_s3 is true.
# Embedded mode defaults to strict backup behavior because local storage is
# single-drive with no redundancy.
# External mode backup management is opt-in via
# horde_monitoring_mimir_backup_external_mode_enabled.
horde_monitoring_mimir_backup_enabled: true
# In external S3 mode, backup management is opt-in by default.
# When false, backup units/env are not rendered in external mode even if
# horde_monitoring_mimir_backup_enabled is true.
horde_monitoring_mimir_backup_external_mode_enabled: false
horde_monitoring_mimir_backup_schedule: "*-*-* 02:00:00"
horde_monitoring_mimir_backup_target_endpoint: ""
horde_monitoring_mimir_backup_target_bucket: ""
horde_monitoring_mimir_backup_target_access_key: ""
horde_monitoring_mimir_backup_target_secret_key: ""
horde_monitoring_mimir_backup_target_insecure: false
# Local path for backup state tracking (timestamp marker).
horde_monitoring_mimir_backup_state_dir: "/var/lib/mimir-backup"
# Controls whether `mc mirror --remove` is passed, which deletes objects
# from the remote that were deleted locally (e.g. by the compactor after
# retention expires). Default: false (append-only — safer, remote retains
# data beyond local retention). Set to true for parity mode (space-efficient
# but propagates accidental deletions).
horde_monitoring_mimir_backup_remove_deleted: false
# Include Grafana's SQLite database (grafana.db) in the backup scope.
# When true, grafana.db is copied into the S3 ruler bucket before the
# mirror runs, so it is included in the offsite backup. Provisioned
# resources (orgs, datasources, dashboards) are re-created by the playbook,
# but user preferences, annotations, API keys, and manual edits are not.
horde_monitoring_mimir_backup_grafana_db: false

# Default two-tenant retention model. Mimir requires X-Scope-OrgID on writes and queries
# when multitenancy is enabled, so keep these tenant IDs aligned with Prometheus remote_write
# headers and Grafana datasource provisioning.
horde_monitoring_application_tenant_id: "ai-horde-app"
# ⚠ Infinite retention: blocks accumulate indefinitely.  This tenant receives
# only application-level metrics (horde-stats-exporter) — roughly ~2 GB/month
# at steady state.  High-volume telemetry (Tempo span metrics, OTLP metrics)
# is routed to the telemetry tenant with short retention.
# If growth becomes a problem, change to a bounded value
# (e.g. "365d") — the compactor will garbage-collect blocks beyond the window.
horde_monitoring_application_retention: "0"
horde_monitoring_application_datasource_name: "AI Horde App"

horde_monitoring_infrastructure_tenant_id: "infrastructure"
horde_monitoring_infrastructure_retention: "30d"
horde_monitoring_infrastructure_datasource_name: "Infrastructure"

# Telemetry tenant — receives high-volume, high-churn derived metrics:
#   • Tempo span metrics (service graphs + RED metrics)
#   • OTLP-sourced metrics forwarded by Alloy from instrumented applications
# Short retention keeps disk usage bounded; these metrics are most valuable
# for recent debugging and are reproducible from traces.
horde_monitoring_telemetry_tenant_id: "ai-horde-telemetry"
horde_monitoring_telemetry_retention: "3d"
horde_monitoring_telemetry_datasource_name: "Telemetry"

# Public tenant — receives real-time data via dual remote_write plus downsampled
# historical data.  Strict query limits protect Mimir from expensive anonymous queries.
horde_monitoring_public_tenant_id: "ai-horde-public"
horde_monitoring_public_retention: "90d"
horde_monitoring_public_datasource_name: "AI Horde"
horde_monitoring_public_max_query_length: "7d"
horde_monitoring_public_max_fetched_series: 50000

# Additional runtime override entries keyed by tenant ID.
horde_monitoring_mimir_extra_tenant_overrides: {}
# Mimir performance tuning
horde_monitoring_mimir_grpc_max_msg_size: 104857600
horde_monitoring_mimir_max_global_series_per_user: 1000000
horde_monitoring_mimir_ingestion_rate: 10000
horde_monitoring_mimir_ingestion_burst_size: 200000
horde_monitoring_mimir_compaction_interval: "1h"
horde_monitoring_mimir_compactor_deletion_delay: "12h"
horde_monitoring_mimir_split_queries_interval: "24h"

# Enable Prometheus native (exponential) histogram ingestion per tenant.
# Required for OTLP exponential histograms (e.g. emitted by Pydantic Logfire,
# which installs an ExponentialBucketHistogramAggregation View that overrides
# the exporter's explicit-bucket preference). Without this, Mimir silently
# drops exponential histograms during OTLP ingestion.
horde_monitoring_mimir_native_histograms_enabled: true

# TSDB early head compaction (experimental in Mimir 2.15).
# When in-memory series reach this threshold the ingester compacts the TSDB
# head, evicting stale series older than active_series_metrics_idle_timeout
# (default 20m).  This prevents high-churn tenants (e.g. infrastructure) from
# hitting max_global_series_per_user due to stale series accumulation.
# Set to 0 to disable.
horde_monitoring_mimir_early_head_compaction_min_in_memory_series: 200000
horde_monitoring_mimir_early_head_compaction_min_estimated_series_reduction_percentage: 15

# Per-tenant series limits applied via runtime overrides.  These supplement
# the global default (max_global_series_per_user) and allow right-sizing each
# tenant independently.  0 means inherit the global default.
horde_monitoring_mimir_app_tenant_max_series: 0
horde_monitoring_mimir_infra_tenant_max_series: 300000
horde_monitoring_mimir_telemetry_tenant_max_series: 500000
horde_monitoring_mimir_public_tenant_max_series: 200000

# Memcached caching layer (chunks, metadata, and query results)
horde_monitoring_mimir_enable_memcached: true
horde_monitoring_mimir_memcached_image: "memcached:1.6.41-alpine"
horde_monitoring_mimir_memcached_port: 11211
horde_monitoring_mimir_memcached_memory_mb: 512
horde_monitoring_mimir_memcached_max_item_size: "5m"
horde_monitoring_mimir_memcached_max_connections: 1024
horde_monitoring_mimir_memcached_timeout: "500ms"
horde_monitoring_mimir_memcached_max_idle: 100
horde_monitoring_mimir_memcached_memory_limit: "768m"

# Container resource limits
horde_monitoring_mimir_memory_limit: "3g"
horde_monitoring_grafana_memory_limit: "512m"

# Grafana configuration (Docker-based, part of the Mimir compose stack)
horde_monitoring_grafana_image: "grafana/grafana:12.4.1"
horde_monitoring_grafana_port: 3000
horde_monitoring_grafana_admin_user: "admin"
horde_monitoring_grafana_admin_password: "changeme"
# Set to external URL when behind a reverse proxy (e.g. https://grafana.example.com)
horde_monitoring_grafana_root_url: ""
horde_monitoring_grafana_data_dir: "/var/lib/grafana"
horde_monitoring_grafana_provisioning_dir: "/etc/grafana/provisioning"
horde_monitoring_grafana_dashboard_dir: "/etc/grafana/dashboards"

# Multi-org: anonymous public organization for AI Horde application dashboards
horde_monitoring_grafana_public_org_name: "AI Horde Public"
horde_monitoring_grafana_public_org_id: 2
horde_monitoring_grafana_anonymous_enabled: true
horde_monitoring_grafana_anonymous_org_role: "Viewer"
# Dashboard refresh floor and dataproxy timeout protect against expensive queries
# (primary query protection is at the Mimir tenant limits level)
horde_monitoring_grafana_min_refresh_interval: "5s"
horde_monitoring_grafana_dataproxy_timeout: 30

# Dashboard provisioning
#
# Source mode determines how dashboards are obtained:
#   release - download a pre-built tarball from a GitHub Release (recommended)
#   git     - shallow-clone from a git repo at a pinned ref (legacy)
#   local   - copy from a local filesystem path (useful for development)
horde_monitoring_grafana_dashboards_source: "release"
horde_monitoring_grafana_provision_dashboards: true

# Collapse exporter source-label drift in app dashboards by rewriting PromQL
# selectors to dedupe across these labels. This smooths migration windows where
# historical blocks may have mismatched instance/environment labels.
# Applied only to app/app-public dashboards; infra dashboards are untouched.
horde_monitoring_grafana_dashboard_dedupe_enabled: true
horde_monitoring_grafana_dashboard_dedupe_labels:
  - "environment"
  - "instance"
  - "job"

# Provision the infra dashboard subset (node_exporter, pm2, postgres) shipped
# in horde-exporters/dashboards/.  These JSONs are Grafana v2beta1 exports
# (apiVersion: dashboard.grafana.app/v2beta1) which retain server-managed
# bookkeeping (metadata.managedFields, resourceVersion, …) the file-based
# provisioner refuses to apply.  patch_dashboard_uid.py strips those fields
# alongside the datasource UID rewrite so the classic provisioner accepts
# them.  Set to false to disable infra dashboards entirely (no provider
# entry will be rendered, no infra/ subdir created).
horde_monitoring_grafana_provision_infra_dashboards: true

# Pinned release tag for the horde-exporters project.
# In release mode the role downloads the release manifest from this tag and
# resolves the actual dashboard tarball filename and checksum automatically.
horde_monitoring_grafana_dashboards_release_version: "v0.2.0"

# --- release mode settings ---
# GitHub repository that hosts the releases.
horde_monitoring_grafana_dashboards_release_repo: "Haidra-Org/horde-exporters"
# Override: set a full URL to skip manifest resolution for the tarball.
# When empty, the role derives the URL from the manifest.
horde_monitoring_grafana_dashboards_release_url: ""
# Override: set a sha256 checksum to skip manifest resolution for checksum.
# When empty, the role takes the checksum from the manifest.
horde_monitoring_grafana_dashboards_release_checksum: ""

# --- git mode settings (legacy) ---
horde_monitoring_grafana_dashboards_repo_url: "https://github.com/Haidra-Org/horde-exporters.git"
# Pin to a full SHA for reproducible deployments.
horde_monitoring_grafana_dashboards_repo_ref: "af550545a7b6421a1720b7cd03ef59abac0367c6"
# Paths inside the cloned repo where dashboard JSON files live.
# Override if the upstream repo restructures.
horde_monitoring_grafana_dashboards_git_app_path: "packages/ai-horde-stats-exporter/src/ai_horde_stats_exporter/dashboards"
horde_monitoring_grafana_dashboards_git_infra_path: "dashboards"

# --- local mode settings ---
# Filesystem path on the target host that is the base for local dashboard sources.
horde_monitoring_grafana_dashboards_local_path: ""
# Sub-paths under local_path for app and infra dashboards.
# Override when the local checkout does not use the default app/ / infra/ layout.
# e.g. for a horde-exporters checkout set local_app_path to:
#   packages/ai-horde-stats-exporter/src/ai_horde_stats_exporter/dashboards
horde_monitoring_grafana_dashboards_local_app_path: "app"
horde_monitoring_grafana_dashboards_local_infra_path: "infra"

# Alertmanager datasource in Grafana
# When set to a non-empty URL, provisions an Alertmanager datasource in Grafana
# so alerts are visible in the Grafana Alerting UI. This URL is also used as
# the default Mimir ruler notification target when
# horde_monitoring_ruler_alertmanager_url is not set.
# In production (Alertmanager native on host, Grafana in Docker), use
# "http://host.docker.internal:9093".
# Leave empty to skip provisioning this datasource.
horde_monitoring_alertmanager_url: ""

# Optional explicit Alertmanager URL used by Mimir ruler notifications.
# Default behavior: if unset/empty, falls back to horde_monitoring_alertmanager_url.
# If both are empty, falls back to Mimir's internal alertmanager URL
# (http://127.0.0.1:9009/alertmanager).
horde_monitoring_ruler_alertmanager_url: ""

# Alerting rules for monitoring stack self-monitoring
# Renders a Prometheus alerting rules file for Mimir, S3 storage, and pipeline health.
# The rules file is placed in the Prometheus rules directory and auto-loaded.
# Set to false if you provide your own rules or don't use Prometheus alerting.
horde_monitoring_install_alerting_rules: true
# Host-level disk alerts (HostDiskUsageCritical, HostDiskUsageHigh) depend on
# node_filesystem_* metrics being present in Prometheus. If your Prometheus
# setup does not ingest host filesystem metrics, set this to false.
horde_monitoring_install_host_disk_alerts: true
# Explicit contract flag: set true only when Prometheus ingests node_filesystem_*
# for the monitored host(s). The role fails fast when host disk alerts are enabled
# but this flag is false and services are started.
horde_monitoring_host_filesystem_metrics_available: false
horde_monitoring_alerting_rules_dir: "{{ horde_monitoring_mimir_config_dir }}/rules"
horde_monitoring_alerting_rules_file: "monitoring-stack.rules"

# Recording rules — pre-compute aggregations used by
# dashboards and alerts. Disabling them does not break anything; dashboards
# will fall back to on-the-fly queries.
horde_monitoring_install_recording_rules: true
horde_monitoring_recording_rules_file: "monitoring-stack.recording.rules"
# Job names must match the job_name in your Prometheus scrape_configs
horde_monitoring_mimir_job_name: "mimir"
horde_monitoring_s3_job_name: "s3"
horde_monitoring_loki_job_name: "loki"
horde_monitoring_tempo_job_name: "tempo"
horde_monitoring_pyroscope_job_name: "pyroscope"
horde_monitoring_prometheus_job_name: "prometheus"
horde_monitoring_horde_exporter_job_name: "horde-exporter"
horde_monitoring_postgres_job_name: "postgres"

# Application-level alerts (AI Horde API health via the stats exporter).
# Requires the horde-exporter scrape target in Prometheus.
horde_monitoring_install_app_alerts: true

# OTLP-sourced application alerts (AI Horde API latency & webhook reliability,
# via application-instrumented histograms/counters in the telemetry tenant).
# Requires the ai-horde service to be running with OTEL_SDK_DISABLED="false"
# and the Alloy OTLP-metrics forwarder enabled.
horde_monitoring_install_otlp_app_alerts: true
# Thresholds used by the OTLP app alerts (seconds, p95).
horde_monitoring_otlp_generate_p95_threshold_seconds: 2.0
horde_monitoring_otlp_pop_p95_threshold_seconds: 1.0
# Submit fault ratio threshold (0..1). HordeSubmitFaultRate fires when
# rate(faulted) / rate(total) exceeds this for 15 minutes.
horde_monitoring_otlp_submit_fault_ratio: 0.05
# Censored submissions per second. HordeSubmitCensoredSpike fires when
# the absolute rate exceeds this for 10 minutes (cross-check raid mode).
horde_monitoring_otlp_submit_censored_per_sec: 0.5

# Loki ruler — log-derived alerts on the AI-Horde application stream.
# Requires Loki to be deployed and ingesting AI-Horde logs (via Alloy).
# Rules are pushed to the application tenant via the Loki ruler API.
horde_monitoring_install_loki_app_log_alerts: true

# Prometheus self-monitoring alerts (remote write, rule evaluation, targets).
horde_monitoring_install_prometheus_alerts: true

# PostgreSQL alerts (via postgres_exporter).
# Set to true when postgres_exporter is deployed and scraped by Prometheus.
horde_monitoring_install_postgres_alerts: false

# When postgres alerts are enabled, fail fast if Prometheus has no series for
# pg_stat_activity_max_tx_duration on horde_monitoring_postgres_job_name.
# HordePostgresLongRunningTx is based on this built-in postgres_exporter metric
# and does not require extend.query-path custom query files.
horde_monitoring_require_postgres_tx_duration_metric: true

# ---------------------------------------------------------------------------
# Loki (log aggregation — Docker-based, monolithic mode, S3-compatible storage)
# ---------------------------------------------------------------------------
# Deploy Loki alongside Mimir in the Docker Compose stack.
# When enabled, Loki stores logs in S3-compatible storage and is accessible at localhost:3100.
# Set to false to skip Loki deployment (e.g. metrics-only monitoring).
horde_monitoring_install_loki: true

horde_monitoring_loki_image: "grafana/loki:3.4.2"
horde_monitoring_loki_port: 3100
horde_monitoring_loki_grpc_port: 9095
horde_monitoring_loki_config_dir: "/etc/loki"
horde_monitoring_loki_data_dir: "/var/lib/loki"
horde_monitoring_loki_memory_limit: "2g"
horde_monitoring_loki_log_level: "warn"

# Multi-tenancy (aligns with Mimir's model — requires X-Scope-OrgID on all requests)
horde_monitoring_loki_auth_enabled: true

# S3 bucket for Loki log chunks and index data
horde_monitoring_loki_chunks_bucket: "loki-chunks"

# Retention via the compactor. Set to "0" to disable (infinite retention).
# Uses Go duration format: "2160h" = 90 days.
horde_monitoring_loki_retention_enabled: true
horde_monitoring_loki_retention_period: "2160h"

# Per-tenant limit overrides (keyed by tenant ID). Example:
#   horde_monitoring_loki_tenant_overrides:
#     ai-horde-app:
#       retention_period: "8760h"
horde_monitoring_loki_tenant_overrides: {}
# Ingestion rate limits (per-tenant defaults)
horde_monitoring_loki_ingestion_rate_mb: 10
horde_monitoring_loki_ingestion_burst_size_mb: 20
horde_monitoring_loki_max_streams_per_user: 10000

# Query limits
horde_monitoring_loki_max_query_length: "721h"
horde_monitoring_loki_max_query_lookback: "2160h"

# Structured metadata (enables trace_id/span_id on log lines from OTLP sources)
horde_monitoring_loki_allow_structured_metadata: true

# ---------------------------------------------------------------------------
# Tempo (distributed tracing — Docker-based, monolithic mode, S3-compatible storage)
# ---------------------------------------------------------------------------
# Opt-in: set to true to deploy Tempo alongside Mimir in the Docker Compose stack.
# When enabled, Tempo receives OTLP traces and stores them in S3-compatible storage.
horde_monitoring_install_tempo: true

horde_monitoring_tempo_image: "grafana/tempo:2.7.1"
horde_monitoring_tempo_http_port: 3200
horde_monitoring_tempo_otlp_grpc_port: 4317
horde_monitoring_tempo_otlp_http_port: 4318
# Whether Tempo publishes OTLP ports to the host.  Set to false when Alloy
# is the external OTLP receiver (recommended) so the ports are only
# reachable inside the Docker network.
horde_monitoring_tempo_publish_otlp_ports: false
horde_monitoring_tempo_config_dir: "/etc/tempo"
horde_monitoring_tempo_data_dir: "/var/lib/tempo"
horde_monitoring_tempo_memory_limit: "2g"
horde_monitoring_tempo_log_level: "warn"

# S3 bucket for Tempo trace blocks
horde_monitoring_tempo_traces_bucket: "tempo-traces"

# Trace retention — the compactor removes blocks older than this.
# Uses Go duration format: "168h" = 7 days.
horde_monitoring_tempo_trace_retention: "168h"

# Metrics generator — derives RED metrics from traces and remote_writes them
# to Mimir. Enables service graph and span metrics visualisations in Grafana.
horde_monitoring_tempo_metrics_generator_enabled: true
# Tenant ID used when the metrics generator writes to Mimir via remote_write.
horde_monitoring_tempo_metrics_generator_tenant_id: "ai-horde-telemetry"
# Processors to enable (service-graphs provides service map, span-metrics provides RED).
horde_monitoring_tempo_metrics_generator_processors:
  - "service-graphs"
  - "span-metrics"
  - "local-blocks"

# OTLP receiver bind address inside Docker.
# 0.0.0.0 within the container — external access is controlled by Docker port
# mapping (127.0.0.1 by default) and HAProxy for remote ingest.
horde_monitoring_tempo_otlp_bind_address: "0.0.0.0"

# Ingester tuning (conservative for ≤10 host deployments)
horde_monitoring_tempo_ingester_trace_idle_period: "10s"
horde_monitoring_tempo_ingester_max_block_bytes: 1000000
horde_monitoring_tempo_ingester_max_block_duration: "5m"

# ---------------------------------------------------------------------------
# Pyroscope (continuous profiling — Docker-based, monolithic mode, S3-compatible storage)
# ---------------------------------------------------------------------------
# Opt-in: set to true to deploy Pyroscope alongside Mimir in the Docker Compose stack.
# When enabled, Pyroscope receives profiling data and stores it in S3-compatible storage.
horde_monitoring_install_pyroscope: true

horde_monitoring_pyroscope_image: "grafana/pyroscope:1.19.0"
horde_monitoring_pyroscope_port: 4040
horde_monitoring_pyroscope_memberlist_port: 7946
horde_monitoring_pyroscope_config_dir: "/etc/pyroscope"
horde_monitoring_pyroscope_data_dir: "/var/lib/pyroscope"
horde_monitoring_pyroscope_memory_limit: "2g"
horde_monitoring_pyroscope_log_level: "warn"

# Multi-tenancy (aligns with Mimir's model — requires X-Scope-OrgID on all requests)
horde_monitoring_pyroscope_auth_enabled: true

# S3 bucket for Pyroscope profile data
horde_monitoring_pyroscope_blocks_bucket: "pyroscope-data"

# Global retention default (applies to tenants without overrides).
# Uses Go duration format: "0s" = infinite retention.
horde_monitoring_pyroscope_retention_period: "0s"

# Per-tenant retention (matches Mimir's multi-tenant model).
horde_monitoring_pyroscope_application_retention: "0"
horde_monitoring_pyroscope_infrastructure_retention: "30d"
horde_monitoring_pyroscope_telemetry_retention: "3d"
horde_monitoring_pyroscope_public_retention: "90d"

# The telemetry tenant is reserved for Tempo span metrics + OTLP-sourced
# Mimir metrics; Pyroscope profiles do not currently flow there.  Leave the
# override out by default to keep config aligned with what's actually used,
# and flip this on when/if you start pushing profiles to that tenant.
horde_monitoring_pyroscope_telemetry_enabled: false

# Additional per-tenant override entries (dict). Merged into runtime-overrides.yaml.
horde_monitoring_pyroscope_extra_tenant_overrides: {}
# Self-profiling: Pyroscope profiles itself for debugging/monitoring
horde_monitoring_pyroscope_self_profiling: true

# Ingestion rate limit (MB/s per tenant)
horde_monitoring_pyroscope_ingestion_rate_mb: 4
horde_monitoring_pyroscope_ingestion_burst_size_mb: 8

# Backend port overrides for services not directly managed by this role.
# These allow the HAProxy backends block to proxy to alertmanager and the
# stats exporter without coupling this role to their install logic.
horde_monitoring_alertmanager_port: 9093
horde_monitoring_stats_exporter_port: 9150

# Opt-in flags — set to true in group_vars when the corresponding service
# is deployed alongside the monitoring stack.
horde_monitoring_configure_alertmanager_backend: false
horde_monitoring_configure_stats_exporter_backend: false

# Loki ingestion frontend — exposes Loki's push API to remote Alloy agents
# behind HAProxy basic auth.  Requires horde_monitoring_install_loki: true.
# The frontend forwards to the horde_monitoring_loki_backend defined above.
horde_monitoring_configure_loki_ingestion_frontend: false
# Port HAProxy listens on for remote Alloy log pushes (distinct from Loki's
# internal port to avoid conflicts with the localhost-only Docker mapping).
horde_monitoring_loki_ingestion_port: 3101
# Basic auth credentials — override in vault.  These must match the
# horde_alloy_basic_auth_username / password on remote Alloy agents.
horde_monitoring_loki_ingestion_auth_user: "alloy"
horde_monitoring_loki_ingestion_auth_password: "changeme-loki-ingestion"

# Tempo ingestion frontend — exposes Tempo's OTLP HTTP API to remote Alloy
# agents behind HAProxy basic auth.  Requires horde_monitoring_install_tempo: true.
# The frontend forwards to the horde_monitoring_tempo_otlp_backend defined above.
horde_monitoring_configure_tempo_ingestion_frontend: false
# Port HAProxy listens on for remote Alloy trace pushes (distinct from Tempo's
# internal OTLP port to avoid conflicts with the localhost-only Docker mapping).
horde_monitoring_tempo_ingestion_port: 4320
# Basic auth credentials — override in vault.  These must match the
# horde_alloy_basic_auth_username / password on remote Alloy agents.
horde_monitoring_tempo_ingestion_auth_user: "alloy"
horde_monitoring_tempo_ingestion_auth_password: "changeme-tempo-ingestion"

# Service-alerts egress frontend — exposes Alertmanager + Mimir read API to
# a remote ai-horde-service-alerts middleman behind HAProxy basic auth.
# Path routing: /prometheus/* -> Mimir, /api/v2/* and /-/* -> Alertmanager.
# When enabled, the Alertmanager backend is rendered automatically (no need
# to also set horde_monitoring_configure_alertmanager_backend).
horde_monitoring_configure_service_alerts_egress_frontend: false
# Bind address + port for the egress frontend. Default 127.0.0.1 keeps the
# frontend loopback-only; override to 0.0.0.0 for off-host service-alerts.
horde_monitoring_service_alerts_egress_listen: "127.0.0.1"
horde_monitoring_service_alerts_egress_port: 9494
# Basic auth credentials — override in vault. Must match
# horde_service_alerts_upstream_basic_auth_user / password on the consumer.
horde_monitoring_service_alerts_egress_auth_user: "service-alerts"
horde_monitoring_service_alerts_egress_auth_password: "changeme-service-alerts-egress"

# HAProxy configuration (conf.d architecture via _haproxy_confd_bootstrap)
horde_monitoring_haproxy_config_path: "/etc/haproxy/haproxy.cfg"
horde_monitoring_haproxy_backup_dir: "/var/backups/haproxy"
horde_monitoring_haproxy_backup_retention_count: 20
