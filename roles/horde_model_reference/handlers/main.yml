---
# Handlers for horde_model_reference role

- name: Restart horde-model-reference Docker stack
  community.docker.docker_compose_v2:
    project_src: "{{ horde_model_reference_base_dir }}"
    state: present
    pull: always
    build: never
  become: true
  when: horde_model_reference_start_services | bool

- name: Restart HAProxy
  ansible.builtin.service:
    name: haproxy
    state: restarted
  become: true
