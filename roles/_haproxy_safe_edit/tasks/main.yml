---
# Shared HAProxy safe-edit pipeline.
#
# Injects a marker-bounded block into an existing HAProxy config using
# a copy → blockinfile → validate → promote pattern.  Both the ai_horde
# and horde_monitoring roles delegate here via include_role.
#
# Required caller variables:
#   _haproxy_safe_edit_config_path          – path to the live haproxy.cfg
#   _haproxy_safe_edit_backup_dir           – directory for timestamped backups
#   _haproxy_safe_edit_marker               – blockinfile marker label (e.g. "AI-HORDE BACKENDS")
#   _haproxy_safe_edit_block                – rendered block content to inject
#   _haproxy_safe_edit_backup_retention     – number of backups to keep (0 = no pruning)
#   _haproxy_safe_edit_apply                – true to mutate live config, false to skip
#
# Handler contract:
#   This role carries its own "Reload HAProxy" handler.  Callers do not
#   need to define one — the micro-role's handler is resolved first when
#   included via include_role.

# ── Preflight ───────────────────────────────────────────────
- name: "Safe-edit — Check HAProxy config exists [{{ _haproxy_safe_edit_marker }}]"  # noqa: var-naming[no-role-prefix]
  ansible.builtin.stat:
    path: "{{ _haproxy_safe_edit_config_path }}"
  register: _haproxy_safe_edit_config_stat
  become: true
  when: _haproxy_safe_edit_apply | bool

- name: "Safe-edit — Fail if config missing [{{ _haproxy_safe_edit_marker }}]"
  ansible.builtin.fail:
    msg: >-
      safe-edit requires {{ _haproxy_safe_edit_config_path }} to exist.
      Install HAProxy and create the base config first.
  when:
    - _haproxy_safe_edit_apply | bool
    - not (_haproxy_safe_edit_config_stat.stat.exists | default(false))

- name: "Safe-edit — Check haproxy binary [{{ _haproxy_safe_edit_marker }}]"  # noqa: var-naming[no-role-prefix]
  ansible.builtin.command: which haproxy
  changed_when: false
  failed_when: false
  register: _haproxy_safe_edit_haproxy_binary
  become: true
  when: _haproxy_safe_edit_apply | bool

- name: "Safe-edit — Fail if haproxy binary missing [{{ _haproxy_safe_edit_marker }}]"
  ansible.builtin.fail:
    msg: >-
      safe-edit requires the haproxy binary for config validation.
      Ensure HAProxy is installed.
  when:
    - _haproxy_safe_edit_apply | bool
    - _haproxy_safe_edit_haproxy_binary.rc | default(1) != 0

- name: "Safe-edit — Require gathered facts [{{ _haproxy_safe_edit_marker }}]"
  ansible.builtin.assert:
    that:
      - ansible_date_time is defined
    fail_msg: >-
      safe-edit requires Ansible gathered facts (ansible_date_time) for
      timestamped backups. Add gather_facts: true to your play or run
      the setup module before including this role.
  when: _haproxy_safe_edit_apply | bool

# ── Backup directory ────────────────────────────────────────
- name: "Safe-edit — Ensure backup directory [{{ _haproxy_safe_edit_marker }}]"
  ansible.builtin.file:
    path: "{{ _haproxy_safe_edit_backup_dir }}"
    state: directory
    mode: "0755"
  become: true
  when: _haproxy_safe_edit_apply | bool

# ── Working-copy → blockinfile → validate → promote ────────
- name: "Safe-edit — Apply block [{{ _haproxy_safe_edit_marker }}]"
  when: _haproxy_safe_edit_apply | bool
  block:
    - name: "Safe-edit — Create working copy [{{ _haproxy_safe_edit_marker }}]"  # noqa: var-naming[no-role-prefix]
      ansible.builtin.tempfile:
        state: file
        path: /tmp
        prefix: "haproxy_{{ _haproxy_safe_edit_marker | lower | regex_replace('[^a-z0-9]', '_') }}_."
        suffix: .cfg
      register: _haproxy_safe_edit_working_file
      become: true

    - name: "Safe-edit — Copy live config to working file [{{ _haproxy_safe_edit_marker }}]"
      ansible.builtin.copy:
        src: "{{ _haproxy_safe_edit_config_path }}"
        dest: "{{ _haproxy_safe_edit_working_file.path }}"
        remote_src: true
        mode: "0644"
      become: true

    - name: "Safe-edit — Insert block via blockinfile [{{ _haproxy_safe_edit_marker }}]"
      ansible.builtin.blockinfile:
        path: "{{ _haproxy_safe_edit_working_file.path }}"
        marker: "# {mark} ANSIBLE MANAGED - {{ _haproxy_safe_edit_marker }}"
        block: "{{ _haproxy_safe_edit_block }}"
      become: true

    - name: "Safe-edit — Checksum live config [{{ _haproxy_safe_edit_marker }}]"  # noqa: var-naming[no-role-prefix]
      ansible.builtin.stat:
        path: "{{ _haproxy_safe_edit_config_path }}"
        checksum_algorithm: sha256
      register: _haproxy_safe_edit_live_stat
      become: true

    - name: "Safe-edit — Checksum candidate [{{ _haproxy_safe_edit_marker }}]"  # noqa: var-naming[no-role-prefix]
      ansible.builtin.stat:
        path: "{{ _haproxy_safe_edit_working_file.path }}"
        checksum_algorithm: sha256
      register: _haproxy_safe_edit_candidate_stat
      become: true

    - name: "Safe-edit — Determine promotion required [{{ _haproxy_safe_edit_marker }}]"  # noqa: var-naming[no-role-prefix]
      ansible.builtin.set_fact:
        _haproxy_safe_edit_requires_promotion: >-
          {{
            (_haproxy_safe_edit_live_stat.stat.checksum | default(''))
            !=
            (_haproxy_safe_edit_candidate_stat.stat.checksum | default(''))
          }}

    - name: "Safe-edit — Validate candidate config [{{ _haproxy_safe_edit_marker }}]"
      ansible.builtin.command: haproxy -c -f {{ _haproxy_safe_edit_working_file.path }}
      become: true
      changed_when: false
      when: _haproxy_safe_edit_requires_promotion | bool

    - name: "Safe-edit — Timestamped backup [{{ _haproxy_safe_edit_marker }}]"
      ansible.builtin.copy:
        src: "{{ _haproxy_safe_edit_config_path }}"
        dest: "{{ _haproxy_safe_edit_backup_dir }}/haproxy.cfg.{{ ansible_date_time.iso8601_basic_short }}"
        remote_src: true
        mode: "0644"
      become: true
      when: _haproxy_safe_edit_requires_promotion | bool

    - name: "Safe-edit — Promote candidate to live [{{ _haproxy_safe_edit_marker }}]"
      ansible.builtin.copy:
        src: "{{ _haproxy_safe_edit_working_file.path }}"
        dest: "{{ _haproxy_safe_edit_config_path }}"
        remote_src: true
        mode: "0644"
      become: true
      when: _haproxy_safe_edit_requires_promotion | bool
      notify: Reload HAProxy

    - name: "Safe-edit — Discover backups for pruning [{{ _haproxy_safe_edit_marker }}]"  # noqa: var-naming[no-role-prefix]
      ansible.builtin.find:
        paths: "{{ _haproxy_safe_edit_backup_dir }}"
        patterns: "haproxy.cfg.*"
        file_type: file
      register: _haproxy_safe_edit_backups
      become: true
      when:
        - _haproxy_safe_edit_requires_promotion | bool
        - _haproxy_safe_edit_backup_retention | int > 0

    - name: "Safe-edit — Build prune list [{{ _haproxy_safe_edit_marker }}]"  # noqa: var-naming[no-role-prefix]
      ansible.builtin.set_fact:
        _haproxy_safe_edit_backups_to_prune: >-
          {{
            (
              _haproxy_safe_edit_backups.files
              | sort(attribute='mtime', reverse=true)
            )[_haproxy_safe_edit_backup_retention | int:]
            | map(attribute='path')
            | list
          }}
      when:
        - _haproxy_safe_edit_requires_promotion | bool
        - _haproxy_safe_edit_backup_retention | int > 0

    - name: "Safe-edit — Prune old backups [{{ _haproxy_safe_edit_marker }}]"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      become: true
      loop: "{{ _haproxy_safe_edit_backups_to_prune | default([]) }}"
      when:
        - _haproxy_safe_edit_requires_promotion | bool
        - _haproxy_safe_edit_backup_retention | int > 0

  always:
    - name: "Safe-edit — Clean up working copy [{{ _haproxy_safe_edit_marker }}]"
      ansible.builtin.file:
        path: "{{ _haproxy_safe_edit_working_file.path }}"
        state: absent
      become: true
      when:
        - _haproxy_safe_edit_working_file is defined
        - _haproxy_safe_edit_working_file.path is defined
