---
# AI Horde Stats Exporter Deployment
# Installs ai-horde-stats-exporter from the horde-exporters monorepo via uv

- name: Install system dependencies for Ansible modules
  ansible.builtin.apt:
    name:
      - python3
    state: present
    update_cache: true
  become: true

- name: Bootstrap uv (Python package manager)  # noqa: var-naming[no-role-prefix]
  ansible.builtin.include_role:
    name: _uv_bootstrap
  vars:
    _uv_bootstrap_version: "{{ exporter_uv_version }}"
    _uv_bootstrap_installer_checksum: "{{ exporter_uv_installer_checksum }}"
    _uv_bootstrap_allow_unverified: false
  when: not ansible_check_mode

- name: Create exporter user
  ansible.builtin.user:
    name: "{{ exporter_user }}"
    system: true
    shell: /usr/sbin/nologin
    createhome: false
  become: true

- name: Create exporter directory
  ansible.builtin.file:
    path: "{{ exporter_install_dir }}"
    state: directory
    owner: "{{ exporter_user }}"
    group: "{{ exporter_user }}"
    mode: "0755"
  become: true

- name: Create log directory
  ansible.builtin.file:
    path: /var/log/horde-stats
    state: directory
    owner: "{{ exporter_user }}"
    group: "{{ exporter_user }}"
    mode: "0755"
  become: true

- name: Create virtual environment with uv
  ansible.builtin.command: /usr/local/bin/uv venv {{ exporter_install_dir }}/venv --python 3.12 --managed-python
  args:
    creates: "{{ exporter_install_dir }}/venv"
  become: true
  register: _exporter_venv_create
  notify: Set venv ownership

- name: Read installed exporter ref marker
  ansible.builtin.slurp:
    src: "{{ exporter_install_dir }}/.exporter_ref"
  register: _exporter_ref_marker
  failed_when: false
  changed_when: false
  become: true

- name: Compute installed exporter ref
  ansible.builtin.set_fact:
    _exporter_ref_current: >-
      {{ (_exporter_ref_marker.content | default('') | b64decode | trim)
      if (_exporter_ref_marker is defined and _exporter_ref_marker.content is defined)
      else '' }}

- name: Install ai-horde-stats-exporter from GitHub
  ansible.builtin.command: >
    /usr/local/bin/uv pip install
    --python {{ exporter_install_dir }}/venv/bin/python
    "ai-horde-stats-exporter @ git+{{ exporter_repo_url }}@{{ exporter_repo_ref }}#subdirectory=packages/ai-horde-stats-exporter"
  become: true
  register: _exporter_install
  changed_when: true
  when:
    - not ansible_check_mode
    - _exporter_ref_current != exporter_repo_ref
  notify: Restart horde-exporter

- name: Record installed exporter ref
  ansible.builtin.copy:
    dest: "{{ exporter_install_dir }}/.exporter_ref"
    content: "{{ exporter_repo_ref }}\n"
    owner: "{{ exporter_user }}"
    group: "{{ exporter_user }}"
    mode: "0644"
  become: true
  when:
    - not ansible_check_mode
    - _exporter_ref_current != exporter_repo_ref

- name: Template exporter configuration
  ansible.builtin.template:
    src: exporter_config.yaml.j2
    dest: "{{ exporter_install_dir }}/exporter_config.yaml"
    owner: "{{ exporter_user }}"
    group: "{{ exporter_user }}"
    mode: "0644"
  become: true
  notify: Restart horde-exporter

- name: Install systemd service files
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
    mode: "0644"
  become: true
  loop:
    - horde-exporter.service
    - horde-downsample.service
    - horde-downsample.timer
  notify: Reload systemd

- name: Configure logrotate
  ansible.builtin.template:
    src: logrotate-horde-stats.j2
    dest: /etc/logrotate.d/horde-stats
    mode: "0644"
  become: true

- name: Enable and start horde-exporter service
  ansible.builtin.systemd:
    name: horde-exporter
    enabled: true
    state: started
    daemon_reload: true
  become: true

- name: Enable and start horde-downsample timer
  ansible.builtin.systemd:
    name: horde-downsample.timer
    enabled: true
    state: started
    daemon_reload: true
  become: true
  when: exporter_enable_downsampling
