---
# AI Horde Stats Exporter Deployment
# Installs ai-horde-stats-exporter from the horde-exporters monorepo via uv

- name: Install system dependencies for Ansible modules
  ansible.builtin.apt:
    name:
      - python3
    state: present
    update_cache: true
  become: true

- name: Bootstrap uv (Python package manager)  # noqa: var-naming[no-role-prefix]
  ansible.builtin.include_role:
    name: _uv_bootstrap
  vars:
    _uv_bootstrap_version: "{{ horde_stats_exporter_uv_version }}"
    _uv_bootstrap_installer_checksum: "{{ horde_stats_exporter_uv_installer_checksum }}"
    _uv_bootstrap_allow_unverified: false
  when: not ansible_check_mode

- name: Create exporter user
  ansible.builtin.user:
    name: "{{ horde_stats_exporter_user }}"
    system: true
    shell: /usr/sbin/nologin
    createhome: false
  become: true

- name: Create exporter directory
  ansible.builtin.file:
    path: "{{ horde_stats_exporter_install_dir }}"
    state: directory
    owner: "{{ horde_stats_exporter_user }}"
    group: "{{ horde_stats_exporter_user }}"
    mode: "0755"
  become: true

- name: Create log directory
  ansible.builtin.file:
    path: /var/log/horde-stats
    state: directory
    owner: "{{ horde_stats_exporter_user }}"
    group: "{{ horde_stats_exporter_user }}"
    mode: "0755"
  become: true

- name: Ensure shared uv python install directory exists
  ansible.builtin.file:
    path: "{{ horde_stats_exporter_uv_python_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Create virtual environment with uv
  ansible.builtin.command: /usr/local/bin/uv venv {{ horde_stats_exporter_install_dir }}/venv --python 3.12 --managed-python
  args:
    creates: "{{ horde_stats_exporter_install_dir }}/venv"
  environment:
    UV_PYTHON_INSTALL_DIR: "{{ horde_stats_exporter_uv_python_install_dir }}"
  become: true
  register: horde_stats_exporter__venv_create
  notify:
    - Set venv ownership
    - Ensure shared python install is world-readable

- name: Read installed exporter ref marker
  ansible.builtin.slurp:
    src: "{{ horde_stats_exporter_install_dir }}/.exporter_ref"
  register: horde_stats_exporter__ref_marker
  failed_when: false
  changed_when: false
  become: true

- name: Compute installed exporter ref
  ansible.builtin.set_fact:
    horde_stats_exporter__ref_current: >-
      {{ (horde_stats_exporter__ref_marker.content | default('') | b64decode | trim)
      if (horde_stats_exporter__ref_marker is defined and horde_stats_exporter__ref_marker.content is defined)
      else '' }}

- name: Install ai-horde-stats-exporter from GitHub
  ansible.builtin.command: >
    /usr/local/bin/uv pip install
    --python {{ horde_stats_exporter_install_dir }}/venv/bin/python
    "ai-horde-stats-exporter @ git+{{ horde_stats_exporter_repo_url }}@{{ horde_stats_exporter_repo_ref }}#subdirectory=packages/ai-horde-stats-exporter"
  environment:
    UV_PYTHON_INSTALL_DIR: "{{ horde_stats_exporter_uv_python_install_dir }}"
  become: true
  register: horde_stats_exporter__install
  changed_when: true
  when:
    - not ansible_check_mode
    - horde_stats_exporter__ref_current != horde_stats_exporter_repo_ref
  notify:
    - Set venv ownership
    - Ensure shared python install is world-readable
    - Restart horde-exporter

- name: Record installed exporter ref
  ansible.builtin.copy:
    dest: "{{ horde_stats_exporter_install_dir }}/.exporter_ref"
    content: "{{ horde_stats_exporter_repo_ref }}\n"
    owner: "{{ horde_stats_exporter_user }}"
    group: "{{ horde_stats_exporter_user }}"
    mode: "0644"
  become: true
  when:
    - not ansible_check_mode
    - horde_stats_exporter__ref_current != horde_stats_exporter_repo_ref

- name: Template exporter configuration
  ansible.builtin.template:
    src: exporter_config.yaml.j2
    dest: "{{ horde_stats_exporter_install_dir }}/exporter_config.yaml"
    owner: "{{ horde_stats_exporter_user }}"
    group: "{{ horde_stats_exporter_user }}"
    mode: "0644"
  become: true
  notify: Restart horde-exporter

- name: Install systemd service files
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
    mode: "0644"
  become: true
  loop:
    - horde-exporter.service
    - horde-downsample.service
    - horde-downsample.timer
  notify: Reload systemd

- name: Configure logrotate
  ansible.builtin.template:
    src: logrotate-horde-stats.j2
    dest: /etc/logrotate.d/horde-stats
    mode: "0644"
  become: true

- name: Ensure exporter entry-points are owned and executable
  ansible.builtin.file:
    path: "{{ horde_stats_exporter_install_dir }}/venv/bin/{{ item }}"
    owner: "{{ horde_stats_exporter_user }}"
    group: "{{ horde_stats_exporter_user }}"
    mode: "0755"
  become: true
  loop:
    - horde-exporter
    - ai-horde-downsample
  when: not ansible_check_mode

- name: Enable and start horde-exporter service
  ansible.builtin.systemd:
    name: horde-exporter
    enabled: true
    state: started
    daemon_reload: true
  become: true

- name: Enable and start horde-downsample timer
  ansible.builtin.systemd:
    name: horde-downsample.timer
    enabled: true
    state: started
    daemon_reload: true
  become: true
  when: horde_stats_exporter_enable_downsampling
