---
# AI Horde Stats Exporter Deployment
# Installs ai-horde-stats-exporter from the horde-exporters monorepo via uv

- name: Using {{ target_pkg_module.split('.')[-1] }}
  ansible.builtin.include_tasks: "install_{{ target_pkg_module.split('.')[-1] }}.yml"

- name: Bootstrap uv (Python package manager)  # noqa: var-naming[no-role-prefix]
  ansible.builtin.include_role:
    name: _uv_bootstrap
  vars:
    _uv_bootstrap_version: "{{ horde_stats_exporter_uv_version }}"
    _uv_bootstrap_installer_checksum: "{{ horde_stats_exporter_uv_installer_checksum }}"
    _uv_bootstrap_allow_unverified: false
  when: not ansible_check_mode

- name: Create exporter user
  ansible.builtin.user:
    name: "{{ horde_stats_exporter_user }}"
    system: true
    shell: /usr/sbin/nologin
    createhome: false
  become: true

- name: Create exporter directory
  ansible.builtin.file:
    path: "{{ horde_stats_exporter_install_dir }}"
    state: directory
    owner: "{{ horde_stats_exporter_user }}"
    group: "{{ horde_stats_exporter_user }}"
    mode: "0755"
  become: true

- name: Create log directory
  ansible.builtin.file:
    path: /var/log/horde-stats
    state: directory
    owner: "{{ horde_stats_exporter_user }}"
    group: "{{ horde_stats_exporter_user }}"
    mode: "0755"
  become: true

- name: Ensure shared uv python install directory exists
  ansible.builtin.file:
    path: "{{ horde_stats_exporter_uv_python_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Create virtual environment with uv
  ansible.builtin.command: /usr/local/bin/uv venv {{ horde_stats_exporter_install_dir }}/venv --python 3.12 --managed-python
  args:
    creates: "{{ horde_stats_exporter_install_dir }}/venv"
  environment:
    UV_PYTHON_INSTALL_DIR: "{{ horde_stats_exporter_uv_python_install_dir }}"
  become: true
  register: horde_stats_exporter__venv_create
  notify:
    - Set venv ownership
    - Ensure shared python install is world-readable

- name: Validate exporter install source mode
  ansible.builtin.assert:
    that:
      - horde_stats_exporter_install_source in ['git', 'wheel', 'local']
    fail_msg: >-
      horde_stats_exporter_install_source must be one of: git, wheel, local.
      Got '{{ horde_stats_exporter_install_source }}'.

- name: Read installed exporter ref marker
  ansible.builtin.slurp:
    src: "{{ horde_stats_exporter_install_dir }}/.exporter_ref"
  register: horde_stats_exporter__ref_marker
  failed_when: false
  changed_when: false
  become: true

- name: Compute installed exporter ref
  ansible.builtin.set_fact:
    horde_stats_exporter__ref_current: >-
      {{ (horde_stats_exporter__ref_marker.content | default('') | b64decode | trim)
      if (horde_stats_exporter__ref_marker is defined and horde_stats_exporter__ref_marker.content is defined)
      else '' }}

- name: Validate wheel mode settings
  ansible.builtin.assert:
    that:
      - >-
        (horde_stats_exporter_wheel_url | length > 0) or
        (horde_stats_exporter_release_version | length > 0)
    fail_msg: >-
      In wheel mode, either horde_stats_exporter_wheel_url or
      horde_stats_exporter_release_version must be set.
  when: horde_stats_exporter_install_source == 'wheel'

# ── manifest resolution (wheel mode, no explicit URL) ────────
- name: Download release manifest for wheel resolution
  ansible.builtin.get_url:
    url: >-
      https://github.com/{{ horde_stats_exporter_release_repo
      }}/releases/download/{{ horde_stats_exporter_release_version
      }}/release-manifest.json
    dest: /tmp/horde-exporter-manifest.json
    mode: "0644"
  become: true
  when:
    - horde_stats_exporter_install_source == 'wheel'
    - horde_stats_exporter_wheel_url | length == 0

- name: Read release manifest
  ansible.builtin.slurp:
    src: /tmp/horde-exporter-manifest.json
  register: horde_stats_exporter__manifest_raw
  become: true
  when:
    - horde_stats_exporter_install_source == 'wheel'
    - horde_stats_exporter_wheel_url | length == 0

- name: Parse release manifest
  ansible.builtin.set_fact:
    horde_stats_exporter__manifest: "{{ horde_stats_exporter__manifest_raw.content | b64decode | from_json }}"
  when:
    - horde_stats_exporter_install_source == 'wheel'
    - horde_stats_exporter_wheel_url | length == 0

- name: Resolve wheel URL and checksum from manifest
  ansible.builtin.set_fact:
    horde_stats_exporter__resolved_wheel_url: >-
      {{
        'https://github.com/'
        ~ horde_stats_exporter_release_repo
        ~ '/releases/download/'
        ~ horde_stats_exporter_release_version
        ~ '/'
        ~ horde_stats_exporter__manifest.artifacts.wheel.filename
      }}
    horde_stats_exporter__resolved_wheel_checksum: >-
      sha256:{{ horde_stats_exporter__manifest.artifacts.wheel.sha256 }}
  when:
    - horde_stats_exporter_install_source == 'wheel'
    - horde_stats_exporter_wheel_url | length == 0

- name: Use explicit wheel URL and checksum when provided
  ansible.builtin.set_fact:
    horde_stats_exporter__resolved_wheel_url: "{{ horde_stats_exporter_wheel_url }}"
    horde_stats_exporter__resolved_wheel_checksum: "{{ horde_stats_exporter_wheel_checksum }}"
  when:
    - horde_stats_exporter_install_source == 'wheel'
    - horde_stats_exporter_wheel_url | length > 0

- name: Compute desired exporter install spec
  ansible.builtin.set_fact:
    horde_stats_exporter__install_spec: >-
      {{
        (
          'ai-horde-stats-exporter @ git+'
          ~ horde_stats_exporter_repo_url
          ~ '@'
          ~ horde_stats_exporter_repo_ref
          ~ '#subdirectory=packages/ai-horde-stats-exporter'
        )
        if horde_stats_exporter_install_source == 'git'
        else (
          'ai-horde-stats-exporter @ ' ~ horde_stats_exporter__resolved_wheel_url
          if horde_stats_exporter_install_source == 'wheel'
          else horde_stats_exporter_local_path
        )
      }}
    horde_stats_exporter__ref_target: >-
      {{
        horde_stats_exporter_repo_ref
        if horde_stats_exporter_install_source == 'git'
        else (
          horde_stats_exporter__resolved_wheel_url
          if horde_stats_exporter_install_source == 'wheel'
          else 'local: ' ~ horde_stats_exporter_local_path
        )
      }}

- name: Validate local mode settings
  ansible.builtin.assert:
    that:
      - horde_stats_exporter_local_path | length > 0
    fail_msg: >-
      horde_stats_exporter_local_path must be set when install_source is 'local'.
  when: horde_stats_exporter_install_source == 'local'

- name: Download wheel artifact
  ansible.builtin.get_url:
    url: "{{ horde_stats_exporter__resolved_wheel_url }}"
    dest: "/tmp/{{ horde_stats_exporter__resolved_wheel_url | basename }}"
    checksum: "{{ horde_stats_exporter__resolved_wheel_checksum | default(omit, true) }}"
    mode: "0644"
  become: true
  when:
    - horde_stats_exporter_install_source == 'wheel'
    - not ansible_check_mode
    - horde_stats_exporter__ref_current != horde_stats_exporter__ref_target

- name: Install ai-horde-stats-exporter
  ansible.builtin.command: >
    /usr/local/bin/uv pip install
    --python {{ horde_stats_exporter_install_dir }}/venv/bin/python
    {% if horde_stats_exporter_install_source == 'wheel' %}
    /tmp/{{ horde_stats_exporter__resolved_wheel_url | basename }}
    {% else %}
    "{{ horde_stats_exporter__install_spec }}"
    {% endif %}
  environment:
    UV_PYTHON_INSTALL_DIR: "{{ horde_stats_exporter_uv_python_install_dir }}"
  become: true
  register: horde_stats_exporter__install
  changed_when: true
  when:
    - not ansible_check_mode
    - horde_stats_exporter__ref_current != horde_stats_exporter__ref_target
  notify:
    - Set venv ownership
    - Ensure shared python install is world-readable
    - Restart horde-exporter

- name: Record installed exporter ref
  ansible.builtin.copy:
    dest: "{{ horde_stats_exporter_install_dir }}/.exporter_ref"
    content: "{{ horde_stats_exporter__ref_target }}\n"
    owner: "{{ horde_stats_exporter_user }}"
    group: "{{ horde_stats_exporter_user }}"
    mode: "0644"
  become: true
  when:
    - not ansible_check_mode
    - horde_stats_exporter__ref_current != horde_stats_exporter__ref_target

- name: Clean up downloaded wheel
  ansible.builtin.file:
    path: "/tmp/{{ horde_stats_exporter__resolved_wheel_url | basename }}"
    state: absent
  become: true
  when: horde_stats_exporter_install_source == 'wheel'

- name: Template exporter configuration
  ansible.builtin.template:
    src: exporter_config.yaml.j2
    dest: "{{ horde_stats_exporter_install_dir }}/exporter_config.yaml"
    owner: "{{ horde_stats_exporter_user }}"
    group: "{{ horde_stats_exporter_user }}"
    mode: "0644"
  become: true
  notify: Restart horde-exporter

- name: Install systemd service files
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
    mode: "0644"
  become: true
  loop:
    - horde-exporter.service
    # - horde-downsample.service
    # - horde-downsample.timer
  notify: Reload systemd

- name: Configure logrotate
  ansible.builtin.template:
    src: logrotate-horde-stats.j2
    dest: /etc/logrotate.d/horde-stats
    mode: "0644"
  become: true

- name: Ensure exporter entry-points are owned and executable
  ansible.builtin.file:
    path: "{{ horde_stats_exporter_install_dir }}/venv/bin/{{ item }}"
    owner: "{{ horde_stats_exporter_user }}"
    group: "{{ horde_stats_exporter_user }}"
    mode: "0755"
  become: true
  loop:
    - horde-exporter
    # - ai-horde-downsample
  when: not ansible_check_mode

- name: Enable and start horde-exporter service
  ansible.builtin.systemd:
    name: horde-exporter
    enabled: true
    state: started
    daemon_reload: true
  become: true

