---
# AI Horde Stats Exporter Deployment
# Installs ai-horde-stats-exporter from the horde-exporters monorepo via uv

- name: Install system dependencies for Ansible modules
  apt:
    name:
      - python3
    state: present
    update_cache: yes
  become: true

- name: Download uv installer
  ansible.builtin.get_url:
    url: https://astral.sh/uv/install.sh
    dest: /tmp/uv-install.sh
    mode: '0755'
  become: true
  when: not ansible_check_mode

- name: Install uv
  ansible.builtin.command: /tmp/uv-install.sh
  args:
    creates: /root/.local/bin/uv
  environment:
    INSTALLER_NO_MODIFY_PATH: "1"
  become: true
  when: not ansible_check_mode

- name: Ensure uv is on PATH system-wide
  copy:
    content: 'export PATH="/root/.local/bin:$PATH"'
    dest: /etc/profile.d/uv.sh
    mode: '0644'
  become: true

- name: Create exporter user
  user:
    name: "{{ exporter_user }}"
    system: yes
    shell: /usr/sbin/nologin
    createhome: no
  become: true

- name: Create exporter directory
  file:
    path: "{{ exporter_install_dir }}"
    state: directory
    owner: "{{ exporter_user }}"
    group: "{{ exporter_user }}"
    mode: '0755'
  become: true

- name: Create log directory
  file:
    path: /var/log/horde-stats
    state: directory
    owner: "{{ exporter_user }}"
    group: "{{ exporter_user }}"
    mode: '0755'
  become: true

- name: Create virtual environment with uv
  command: /root/.local/bin/uv venv {{ exporter_install_dir }}/venv --python 3.12 --managed-python
  args:
    creates: "{{ exporter_install_dir }}/venv"
  become: true

- name: Set venv ownership
  file:
    path: "{{ exporter_install_dir }}/venv"
    state: directory
    owner: "{{ exporter_user }}"
    group: "{{ exporter_user }}"
    recurse: yes
  become: true

- name: Read installed exporter ref marker
  slurp:
    src: "{{ exporter_install_dir }}/.exporter_ref"
  register: _exporter_ref_marker
  failed_when: false
  changed_when: false
  become: true

- name: Compute installed exporter ref
  set_fact:
    _exporter_ref_current: "{{ (_exporter_ref_marker.content | default('') | b64decode | trim) if (_exporter_ref_marker is defined and _exporter_ref_marker.content is defined) else '' }}"

- name: Install ai-horde-stats-exporter from GitHub
  command: >
    /root/.local/bin/uv pip install
    --python {{ exporter_install_dir }}/venv/bin/python
    "ai-horde-stats-exporter @ git+{{ exporter_repo_url }}@{{ exporter_repo_ref }}#subdirectory=packages/ai-horde-stats-exporter"
  become: true
  when:
    - not ansible_check_mode
    - _exporter_ref_current != exporter_repo_ref
  notify: restart horde-exporter

- name: Record installed exporter ref
  copy:
    dest: "{{ exporter_install_dir }}/.exporter_ref"
    content: "{{ exporter_repo_ref }}\n"
    owner: "{{ exporter_user }}"
    group: "{{ exporter_user }}"
    mode: '0644'
  become: true
  when:
    - not ansible_check_mode
    - _exporter_ref_current != exporter_repo_ref

- name: Template exporter configuration
  template:
    src: exporter_config.yaml.j2
    dest: "{{ exporter_install_dir }}/exporter_config.yaml"
    owner: "{{ exporter_user }}"
    group: "{{ exporter_user }}"
    mode: '0644'
  become: true
  notify: restart horde-exporter

- name: Install systemd service files
  template:
    src: "{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
    mode: '0644'
  become: true
  loop:
    - horde-exporter.service
    - horde-downsample.service
    - horde-downsample.timer
  notify: reload systemd

- name: Configure logrotate
  template:
    src: logrotate-horde-stats.j2
    dest: /etc/logrotate.d/horde-stats
    mode: '0644'
  become: true

- name: Enable and start horde-exporter service
  systemd:
    name: horde-exporter
    enabled: yes
    state: started
    daemon_reload: yes
  become: true

- name: Enable and start horde-downsample timer
  systemd:
    name: horde-downsample.timer
    enabled: yes
    state: started
    daemon_reload: yes
  become: true
  when: exporter_enable_downsampling
