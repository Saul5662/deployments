---
- name: Install dependencies
  ansible.builtin.apt:
    state: present
    update_cache: true
    pkg:
      - git
      - libjemalloc2
  tags:
    - packages
    - worker

- name: Fail if worker API key is missing or placeholder
  ansible.builtin.assert:
    that:
      - horde_regen_worker_api_key is defined
      - horde_regen_worker_api_key | length > 0
      - horde_regen_worker_api_key != "0000000000"
    fail_msg: >-
      horde_regen_worker_api_key must be set to a real worker API key.
      The default placeholder value is not valid for runtime deployments.
  tags:
    - worker

- name: Ensure worker user exists ({{ horde_regen_worker_username }})
  ansible.builtin.user:
    name: "{{ horde_regen_worker_username }}"
    shell: /bin/bash
    groups:
      - video
      - render
    append: true
  tags: worker

- name: Clone Horde github repository
  ansible.builtin.git:
    repo: "{{ horde_regen_worker_repo }}"
    dest: /home/{{ horde_regen_worker_username }}/{{ horde_regen_worker_clone_dir }}
    clone: true
    update: true
    version: "{{ horde_regen_worker_repo_version }}"
  notify: Restart AI Worker service
  tags: worker

- name: Ensure git repo is owned by worker user ({{ horde_regen_worker_username }})
  ansible.builtin.file:
    path: /home/{{ horde_regen_worker_username }}/{{ horde_regen_worker_clone_dir }}
    owner: "{{ horde_regen_worker_username }}"
    group: "{{ horde_regen_worker_username }}"
    recurse: true
  tags: worker

- name: Ensure horde_regen_worker_runtime_dir exists ({{ horde_regen_worker_runtime_dir }})
  ansible.builtin.file:
    path: /home/{{ horde_regen_worker_username }}/{{ horde_regen_worker_runtime_dir }}
    owner: "{{ horde_regen_worker_username }}"
    group: "{{ horde_regen_worker_username }}"
    state: directory
    mode: "0755"
  tags:
    - worker

- name: Ensure horde_regen_worker_models_dir exists ({{ horde_regen_worker_models_dir }})
  ansible.builtin.file:
    path: /home/{{ horde_regen_worker_username }}/{{ horde_regen_worker_models_dir }}
    owner: "{{ horde_regen_worker_username }}"
    group: "{{ horde_regen_worker_username }}"
    state: directory
    mode: "0755"
  tags:
    - worker

- name: Deploy bridgeData
  ansible.builtin.template:
    src: bridgeData.yaml.j2
    dest: /home/{{ horde_regen_worker_username }}/{{ horde_regen_worker_runtime_dir }}/bridgeData.yaml
    owner: "{{ horde_regen_worker_username }}"
    group: "{{ horde_regen_worker_username }}"
    mode: "0640"
  no_log: true
  notify: Restart AI Worker service
  tags:
    - worker

- name: Ensure update-runtime is run for AMD GPUs
  ansible.builtin.shell: /home/{{ horde_regen_worker_username }}/{{ horde_regen_worker_clone_dir }}/update-runtime-rocm.sh
  become: true
  become_user: "{{ horde_regen_worker_username }}"
  changed_when: true
  args:
    executable: /bin/bash
    chdir: /home/{{ horde_regen_worker_username }}/{{ horde_regen_worker_clone_dir }}
  register: horde_regen_worker_update_runtime
  when:
    - horde_regen_worker_initialize is true
    - horde_regen_worker_amd_gpu is true
  tags:
    - worker
    - horde_regen_worker_initialize

- name: Show horde_regen_worker_update_runtime output
  ansible.builtin.debug:
    var: horde_regen_worker_update_runtime
  when:
    - horde_regen_worker_initialize is true
  tags:
    - worker
    - horde_regen_worker_initialize
    - debug

- name: Ensure update-runtime is run for Nvidia GPUs
  ansible.builtin.shell: /home/{{ horde_regen_worker_username }}/{{ horde_regen_worker_clone_dir }}/update-runtime.sh
  become: true
  become_user: "{{ horde_regen_worker_username }}"
  changed_when: true
  args:
    executable: /bin/bash
    chdir: /home/{{ horde_regen_worker_username }}/{{ horde_regen_worker_clone_dir }}
  register: horde_regen_worker_update_runtime
  when:
    - horde_regen_worker_initialize is true
    - horde_regen_worker_amd_gpu is false
  tags:
    - worker
    - horde_regen_worker_initialize

- name: Show horde_regen_worker_update_runtime output
  ansible.builtin.debug:
    var: horde_regen_worker_update_runtime
  when:
    - horde_regen_worker_initialize is true
  tags:
    - worker
    - horde_regen_worker_initialize
    - debug

- name: Ensure models are downloaded for the first time
  ansible.builtin.shell: >
    /home/{{ horde_regen_worker_username }}/{{ horde_regen_worker_clone_dir }}/runtime-rocm.sh
    python -s /home/{{ horde_regen_worker_username }}/{{ horde_regen_worker_clone_dir }}/download_models.py
  become: true
  become_user: "{{ horde_regen_worker_username }}"
  changed_when: true
  args:
    executable: /bin/bash
    chdir: /home/{{ horde_regen_worker_username }}/{{ horde_regen_worker_runtime_dir }}
  when:
    - horde_regen_worker_initialize is true
    - horde_regen_worker_amd_gpu is true
  tags:
    - worker
    - horde_regen_worker_initialize

- name: Ensure models are downloaded for the first time
  ansible.builtin.shell: >
    /home/{{ horde_regen_worker_username }}/{{ horde_regen_worker_clone_dir }}/runtime.sh
    python -s /home/{{ horde_regen_worker_username }}/{{ horde_regen_worker_clone_dir }}/download_models.py
  become: true
  become_user: "{{ horde_regen_worker_username }}"
  changed_when: true
  args:
    executable: /bin/bash
    chdir: /home/{{ horde_regen_worker_username }}/{{ horde_regen_worker_runtime_dir }}
  when:
    - horde_regen_worker_initialize is true
    - horde_regen_worker_amd_gpu is false
  tags:
    - worker
    - horde_regen_worker_initialize

- name: Ensure systemd directory exists
  ansible.builtin.file:
    path: /home/{{ horde_regen_worker_username }}/.config/systemd/user/
    owner: "{{ horde_regen_worker_username }}"
    group: "{{ horde_regen_worker_username }}"
    mode: "0755"
    state: directory
  tags:
    - worker
    - systemd

- name: Ensure horde systemd services exist in userspace
  ansible.builtin.template:
    src: ai_horde_worker.j2
    dest: /home/{{ horde_regen_worker_username }}/.config/systemd/user/{{ horde_regen_worker_service_name }}.service
    owner: "{{ horde_regen_worker_username }}"
    group: "{{ horde_regen_worker_username }}"
    mode: "0644"
  notify: Restart AI Worker service
  tags:
    - worker
    - systemd

- name: Ensure XDG_RUNTIME_DIR is set in user's .bashrc
  ansible.builtin.lineinfile:
    path: /home/{{ horde_regen_worker_username }}/.bashrc
    line: export XDG_RUNTIME_DIR=/run/user/$(id -u)
    owner: "{{ horde_regen_worker_username }}"
    group: "{{ horde_regen_worker_username }}"
  tags:
    - worker
    - systemd

- name: Enable lingering if needed ({{ horde_regen_worker_username }})
  ansible.builtin.command: loginctl enable-linger {{ horde_regen_worker_username }}
  args:
    creates: /var/lib/systemd/linger/{{ horde_regen_worker_username }}
  tags:
    - worker
    - systemd

# Needed for the next task
- name: Find worker uid ({{ horde_regen_worker_username }})
  ansible.builtin.getent:
    database: passwd
  tags:
    - worker
    - systemd

- name: Ensure AI Worker service is started
  ansible.builtin.systemd:
    state: started
    daemon_reload: true
    name: "{{ horde_regen_worker_service_name }}"
    enabled: true
    scope: user
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ getent_passwd[horde_regen_worker_username].1 }}"
  become: true
  become_user: "{{ horde_regen_worker_username }}"
  register: horde_regen_worker_service_started
  tags:
    - worker
    - systemd
