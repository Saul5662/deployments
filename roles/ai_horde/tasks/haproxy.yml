---
# Replacement HAProxy setup for AI-Horde native instances.

- name: Determine whether HAProxy should apply live changes
  ansible.builtin.set_fact:
    _ai_horde_haproxy_apply_mode: "{{ ai_horde_start_services | bool }}"

- name: Bootstrap HAProxy conf.d systemd override
  ansible.builtin.include_role:
    name: _haproxy_confd_bootstrap
  vars:
    haproxy_confd_install: "{{ _ai_horde_haproxy_apply_mode | bool }}"
  when: _ai_horde_haproxy_apply_mode | bool

- name: Write AI-Horde HAProxy configuration fragment
  ansible.builtin.template:
    src: ai-horde-backend.cfg.j2
    dest: /etc/haproxy/conf.d/ai_horde.cfg
    mode: "0644"
  become: true
  register: _ai_horde_haproxy_cfg
  when: _ai_horde_haproxy_apply_mode | bool

- name: Enable and restart HAProxy
  ansible.builtin.systemd:
    name: haproxy
    enabled: true
    state: "{{ 'restarted' if _ai_horde_haproxy_cfg.changed else 'started' }}"
  become: true
  when: ai_horde_start_services | bool
