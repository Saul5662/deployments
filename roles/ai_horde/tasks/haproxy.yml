---
# Replacement HAProxy setup for AI-Horde native instances.
- name: Install HAProxy
  ansible.builtin.apt:
    name: haproxy
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: ai_horde_start_services | bool

- name: Determine whether HAProxy should apply live changes
  ansible.builtin.set_fact:
    _ai_horde_haproxy_apply_mode: "{{ ai_horde_start_services | bool }}"

- name: Ensure HAProxy conf.d directory exists
  ansible.builtin.file:
    path: /etc/haproxy/conf.d
    state: directory
    mode: "0755"
  become: true
  when: _ai_horde_haproxy_apply_mode | bool

- name: Ensure HAProxy systemd override directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/haproxy.service.d
    state: directory
    mode: "0755"
  become: true
  when: _ai_horde_haproxy_apply_mode | bool

- name: Configure HAProxy to load from conf.d
  ansible.builtin.copy:
    dest: /etc/systemd/system/haproxy.service.d/override.conf
    content: |
      [Service]
      Environment="CONFIG=/etc/haproxy/haproxy.cfg -f /etc/haproxy/conf.d/"
    mode: "0644"
  become: true
  when: _ai_horde_haproxy_apply_mode | bool

- name: Reload systemd daemon for HAProxy
  ansible.builtin.systemd:
    daemon_reload: true
  become: true
  when: _ai_horde_haproxy_apply_mode | bool

- name: Write AI-Horde HAProxy configuration fragment
  ansible.builtin.template:
    src: ai-horde-backend.cfg.j2
    dest: /etc/haproxy/conf.d/ai_horde.cfg
    mode: "0644"
  become: true
  when: _ai_horde_haproxy_apply_mode | bool

- name: Enable and start HAProxy
  ansible.builtin.systemd:
    name: haproxy
    enabled: true
    state: started
  become: true
  when: ai_horde_start_services | bool
