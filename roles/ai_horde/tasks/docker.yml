---
# Core tasks to deploy AI-Horde via Docker Compose

- name: Verify Docker is available
  ansible.builtin.command: docker --version
  register: ai_horde__docker_check
  changed_when: false
  ignore_errors: true

- name: Fail if Docker is not installed
  ansible.builtin.fail:
    msg: "Docker is required but not installed. Please install Docker."
  when: ai_horde__docker_check.rc != 0

- name: Verify Docker Compose V2 is available
  ansible.builtin.command: docker compose version
  register: ai_horde__compose_check
  changed_when: false
  ignore_errors: true

- name: Fail if Docker Compose V2 is not available
  ansible.builtin.fail:
    msg: "Docker Compose V2 is required but not available. Please install docker-compose-plugin."
  when: ai_horde__compose_check.rc != 0

- name: Ensure AI-Horde base directory exists
  ansible.builtin.file:
    path: "{{ ai_horde_base_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  become: true

- name: Create AI-Horde data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  loop:
    - "{{ ai_horde_data_dir }}"
  become: true

- name: Create embedded PostgreSQL data directory
  ansible.builtin.file:
    path: "{{ ai_horde_data_dir }}/postgres"
    state: directory
    owner: root
    group: root
    mode: "0750"
  become: true
  when: ai_horde_embedded_postgres_enabled | bool

- name: Template AI-Horde environment file
  ansible.builtin.template:
    src: "ai-horde.env.j2"
    dest: "{{ ai_horde_base_dir }}/.env"
    owner: root
    group: root
    mode: "0600"
  become: true
  no_log: true

- name: Template Docker Compose for AI-Horde stack
  ansible.builtin.template:
    src: "docker-compose.ai-horde.yml.j2"
    dest: "{{ ai_horde_base_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0600"
  become: true

- name: Start and verify AI-Horde Docker stack
  when: ai_horde_start_services | bool
  block:
    - name: Manage AI-Horde Docker Compose stack
      community.docker.docker_compose_v2:
        project_src: "{{ ai_horde_base_dir }}"
        state: present
        pull: always
        build: never
        scale: "{{ {'aihorde': (ai_horde_replicas | int)} }}"
      become: true

    - name: Build list of expected AI-Horde replica ports
      ansible.builtin.set_fact:
        _ai_horde_ports: >-
          {{
            range(
              ai_horde_port | int,
              (ai_horde_port | int) + (ai_horde_replicas | int)
            ) | list
          }}

    - name: Wait for AI-Horde REST API heartbeat on all published ports
      ansible.builtin.uri:
        url: "http://{{ ai_horde_listen | default('127.0.0.1') }}:{{ item }}/api/v2/status/heartbeat"
        method: GET
        status_code: 200
      register: _ai_horde_heartbeat
      until: _ai_horde_heartbeat.status == 200
      retries: 30
      delay: 5
      loop: "{{ _ai_horde_ports }}"
      loop_control:
        label: "{{ item }}"
