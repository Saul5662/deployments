---
# Optional local PostgreSQL provisioning for AI-Horde (native mode).
# Installs PostgreSQL via system packages, creates the database and user.
# Deliberately avoids all destructive operations (DROP, TRUNCATE, etc.).

- name: Install PostgreSQL packages
  ansible.builtin.apt:
    name:
      - postgresql
      - postgresql-contrib
      - python3-psycopg2
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: ai_horde_start_services | bool

- name: Ensure PostgreSQL service is enabled and started
  ansible.builtin.systemd:
    name: postgresql
    enabled: true
    state: started
  become: true
  when: ai_horde_start_services | bool

- name: Create AI-Horde PostgreSQL user
  community.postgresql.postgresql_user:
    name: "{{ ai_horde_postgres_user }}"
    password: "{{ ai_horde_postgres_password }}"
    state: present
  become: true
  become_user: postgres
  no_log: true
  when: ai_horde_start_services | bool

- name: Create AI-Horde PostgreSQL database
  community.postgresql.postgresql_db:
    name: "{{ ai_horde_postgres_db }}"
    owner: "{{ ai_horde_postgres_user }}"
    state: present
  become: true
  become_user: postgres
  when: ai_horde_start_services | bool

- name: Detect PostgreSQL major version
  ansible.builtin.shell:
    cmd: set -o pipefail && pg_lsclusters -h | head -1 | awk '{print $1}'
    executable: /bin/bash
  changed_when: false
  register: ai_horde__pg_version
  become: true
  when: ai_horde_start_services | bool

- name: Configure pg_hba.conf for local password auth (loopback IPv4/IPv6)
  community.postgresql.postgresql_pg_hba:
    dest: /etc/postgresql/{{ ai_horde__pg_version.stdout | trim }}/main/pg_hba.conf
    contype: host
    databases: "{{ ai_horde_postgres_db }}"
    users: "{{ ai_horde_postgres_user }}"
    address: "{{ item }}"
    method: scram-sha-256
    state: present
  loop:
    - "127.0.0.1/32"
    - "::1/128"
  become: true
  when: ai_horde_start_services | bool
  notify: Restart PostgreSQL

- name: Wait for PostgreSQL to accept connections
  ansible.builtin.wait_for:
    host: "{{ ai_horde_postgres_host }}"
    port: "{{ ai_horde_postgres_port }}"
    timeout: 30
  when: ai_horde_start_services | bool
