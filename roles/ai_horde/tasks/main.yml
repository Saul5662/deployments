---
# Deploy AI-Horde backend
# Supports two deploy modes:
#   docker — Docker Compose: AI-Horde + bundled PostgreSQL + Redis (default)
#   native — Bare-metal: Python venv + systemd template instances
#
# Task flow: validate → mode dispatch → optional services → health checks

- name: Validate deploy mode
  ansible.builtin.assert:
    that:
      - ai_horde_deploy_mode in ['docker', 'native']
    fail_msg: >-
      Invalid ai_horde_deploy_mode '{{ ai_horde_deploy_mode }}'.
      Must be 'docker' or 'native'.

- name: Validate native mode core settings
  ansible.builtin.assert:
    that:
      - ai_horde_instance_count | int >= 1
      - ai_horde_user | length > 0
      - ai_horde_group | length > 0
    fail_msg: >-
      Native mode requires ai_horde_instance_count >= 1 and non-empty
      ai_horde_user/ai_horde_group values.
  when: ai_horde_deploy_mode == 'native'

- name: Fail if ai_horde_postgres_password is not set
  ansible.builtin.assert:
    that:
      - ai_horde_postgres_password is defined
      - ai_horde_postgres_password | length > 0
    fail_msg: >-
      ai_horde_postgres_password must be defined and non-empty.
      Set it in your inventory, group_vars, or vault.

- name: Fail if ai_horde_secret_key is not set
  ansible.builtin.assert:
    that:
      - ai_horde_secret_key is defined
      - ai_horde_secret_key | length > 0
    fail_msg: >-
      ai_horde_secret_key must be defined and non-empty.
      Set it in your inventory, group_vars, or vault.

# ── PostgreSQL data-safety guardrails ────────────────────────
- name: Validate deployment paths do not collide with system PostgreSQL directories
  ansible.builtin.assert:
    that:
      - ai_horde_data_dir is not regex('^/var/lib/postgres(ql)?(/|$)')
      - ai_horde_data_dir is not regex('^/var/lib/pgsql(/|$)')
      - ai_horde_data_dir not in ['/', '/var', '/var/lib', '/tmp', '/home']
      - ai_horde_base_dir is not regex('^/var/lib/postgres(ql)?(/|$)')
      - ai_horde_base_dir is not regex('^/var/lib/pgsql(/|$)')
      - ai_horde_base_dir not in ['/', '/var', '/var/lib', '/tmp', '/home']
    fail_msg: >-
      ai_horde_data_dir ({{ ai_horde_data_dir }}) or ai_horde_base_dir
      ({{ ai_horde_base_dir }}) overlaps with system PostgreSQL data paths
      or critical system directories. This could destroy existing PostgreSQL
      data or other system state. Use dedicated paths such as
      /var/lib/ai-horde or /opt/ai-horde.

- name: Include Docker deployment tasks
  ansible.builtin.include_tasks: docker.yml
  when: ai_horde_deploy_mode == 'docker'

- name: Include native deployment tasks
  ansible.builtin.include_tasks: native.yml
  when: ai_horde_deploy_mode == 'native'
