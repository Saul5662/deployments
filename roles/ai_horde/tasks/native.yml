---
# Native (bare-metal) deployment tasks for AI-Horde backend.
# Installs Python + uv, creates a virtualenv, clones the source,
# and deploys systemd template instances (one per port).
# When ai_horde_start_services=false, renders service configuration
# only and skips network/package/build operations.

# ── Native-mode config contract guardrails ──────────────────
- name: Validate POSTGRES_URL override shape
  ansible.builtin.assert:
    that:
      - ai_horde_postgres_url_override | length == 0 or not (ai_horde_postgres_url_override is regex('(?i)^postgres(?:ql)?://'))
      - ai_horde_postgres_url_override | length == 0 or '@' not in ai_horde_postgres_url_override
    fail_msg: >-
      ai_horde_postgres_url_override must be a POSTGRES_URL fragment only
      (host[:port]/db[?options]), without scheme or credentials.

- name: Normalize POSTGRES_URL fragment for native mode
  ansible.builtin.set_fact:
    _ai_horde_postgres_url: >-
      {{
        ai_horde_postgres_url_override
        if (ai_horde_postgres_url_override | length > 0)
        else (
          ai_horde_postgres_host ~
          (
            ':' ~ (ai_horde_postgres_port | string)
            if (ai_horde_postgres_port | int) != 5432
            else ''
          ) ~
          '/' ~ ai_horde_postgres_db
        )
      }}

- name: Validate Redis runtime port support
  ansible.builtin.assert:
    that:
      - ai_horde_redis_port | int == 6379
    fail_msg: >-
      AI-Horde runtime currently uses a fixed Redis port (6379).
      Set ai_horde_redis_port to 6379.

- name: Validate local PostgreSQL provisioning contract
  ansible.builtin.assert:
    that:
      - ai_horde_postgres_host in ['127.0.0.1', 'localhost', '::1']
      - ai_horde_postgres_port | int == 5432
    fail_msg: >-
      ai_horde_install_postgres=true requires local PostgreSQL endpoint
      semantics (ai_horde_postgres_host in 127.0.0.1/localhost/::1 and
      ai_horde_postgres_port=5432). To use external PostgreSQL, set
      ai_horde_install_postgres=false.
  when: ai_horde_install_postgres | bool

- name: Validate local Redis provisioning contract
  ansible.builtin.assert:
    that:
      - ai_horde_redis_host in ['127.0.0.1', 'localhost', '::1']
      - ai_horde_redis_port | int == 6379
    fail_msg: >-
      ai_horde_install_redis=true requires local Redis endpoint semantics
      (ai_horde_redis_host in 127.0.0.1/localhost/::1 and
      ai_horde_redis_port=6379). To use external Redis, set
      ai_horde_install_redis=false.
  when: ai_horde_install_redis | bool

# ── Optional local services ─────────────────────────────────
- name: Include PostgreSQL provisioning
  ansible.builtin.include_tasks: postgres.yml
  when: ai_horde_install_postgres | bool

- name: Include Redis provisioning
  ansible.builtin.include_tasks: redis.yml
  when: ai_horde_install_redis | bool

# ── System dependencies ─────────────────────────────────────
- name: Install system packages for native deployment
  ansible.builtin.apt:
    name:
      - git
      - python3
      - python3-venv
      - python3-dev
      - build-essential
      - curl
      - ca-certificates
      - python3-psycopg2
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: ai_horde_start_services | bool

- name: Bootstrap uv (Python package manager)
  ansible.builtin.include_role:
    name: _uv_bootstrap
  vars:
    _uvb_version: "{{ ai_horde_uv_version }}"
    _uvb_installer_checksum: "{{ ai_horde_uv_installer_checksum }}"
    _uvb_allow_unverified: "{{ ai_horde_uv_allow_unverified_installer }}"
  when: ai_horde_start_services | bool

# ── Service user ─────────────────────────────────────────────
- name: Create AI-Horde group
  ansible.builtin.group:
    name: "{{ ai_horde_group }}"
    system: true
    state: present
  become: true

- name: Create AI-Horde user
  ansible.builtin.user:
    name: "{{ ai_horde_user }}"
    group: "{{ ai_horde_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ ai_horde_base_dir }}"
    create_home: false
  become: true

- name: Gather AI-Horde group entry
  ansible.builtin.getent:
    database: group
    key: "{{ ai_horde_group }}"

- name: Gather AI-Horde user entry
  ansible.builtin.getent:
    database: passwd
    key: "{{ ai_horde_user }}"

- name: Assert native service account exists
  ansible.builtin.assert:
    that:
      - ai_horde_group in ansible_facts.getent_group
      - ai_horde_user in ansible_facts.getent_passwd
    fail_msg: >-
      Failed to verify native service account creation for
      {{ ai_horde_user }}:{{ ai_horde_group }}.

- name: Ensure AI-Horde base directory exists (native mode)
  ansible.builtin.file:
    path: "{{ ai_horde_base_dir }}"
    state: directory
    owner: root
    group: "{{ ai_horde_group }}"
    mode: "0750"
  become: true

- name: Ensure AI-Horde runtime directories exist (native mode)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ai_horde_user }}"
    group: "{{ ai_horde_group }}"
    mode: "0750"
  become: true
  loop:
    - "{{ ai_horde_base_dir }}/src"
    - "{{ ai_horde_venv_dir }}"

# ── Data directories ────────────────────────────────────────
- name: Create AI-Horde data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ai_horde_user }}"
    group: "{{ ai_horde_group }}"
    mode: "0750"
  become: true
  loop:
    - "{{ ai_horde_data_dir }}"

# ── Source clone ─────────────────────────────────────────────
- name: Clone AI-Horde source repository
  ansible.builtin.git:
    repo: "{{ ai_horde_repo }}"
    dest: "{{ ai_horde_base_dir }}/src"
    version: "{{ ai_horde_repo_version }}"
    force: true
  become: true
  become_user: "{{ ai_horde_user }}"
  register: _ai_horde_clone
  notify: Restart AI-Horde native instances
  when: ai_horde_start_services | bool

- name: Determine whether recursive source ownership normalization is required
  ansible.builtin.set_fact:
    _ai_horde_source_reownership_required: "{{ _ai_horde_clone is changed }}"
  when: ai_horde_start_services | bool

- name: Normalize source directory ownership recursively (change-gated)
  ansible.builtin.file:
    path: "{{ ai_horde_base_dir }}/src"
    owner: "{{ ai_horde_user }}"
    group: "{{ ai_horde_group }}"
    recurse: true
  become: true
  when:
    - ai_horde_start_services | bool
    - _ai_horde_source_reownership_required | default(false) | bool

# ── Python virtualenv ───────────────────────────────────────
- name: Create virtualenv with uv
  ansible.builtin.command:
    cmd: uv venv {{ ai_horde_venv_dir }} --python python3
    creates: "{{ ai_horde_venv_dir }}/bin/python"
  become: true
  become_user: "{{ ai_horde_user }}"
  register: _ai_horde_venv_create
  when: ai_horde_start_services | bool

- name: Determine whether recursive venv ownership normalization is required
  ansible.builtin.set_fact:
    _ai_horde_venv_reownership_required: "{{ _ai_horde_venv_create is changed }}"
  when: ai_horde_start_services | bool

- name: Normalize venv directory ownership recursively (change-gated)
  ansible.builtin.file:
    path: "{{ ai_horde_venv_dir }}"
    owner: "{{ ai_horde_user }}"
    group: "{{ ai_horde_group }}"
    recurse: true
  become: true
  when:
    - ai_horde_start_services | bool
    - _ai_horde_venv_reownership_required | default(false) | bool

- name: Install Python dependencies with uv
  ansible.builtin.command:
    cmd: >-
      uv pip install
      --python {{ ai_horde_venv_dir }}/bin/python
      -r {{ ai_horde_base_dir }}/src/requirements.txt
  become: true
  become_user: "{{ ai_horde_user }}"
  register: _pip_install
  changed_when: "'Installed' in _pip_install.stdout"
  notify: Restart AI-Horde native instances
  when: ai_horde_start_services | bool

# ── Configuration ────────────────────────────────────────────
- name: Template AI-Horde environment file (native)
  ansible.builtin.template:
    src: ai-horde-native.env.j2
    dest: "{{ ai_horde_base_dir }}/.env"
    owner: root
    group: "{{ ai_horde_group }}"
    mode: "0640"
  become: true
  no_log: true
  notify: Restart AI-Horde native instances

# ── Systemd template unit ───────────────────────────────────
- name: Template systemd service for AI-Horde (native)
  ansible.builtin.template:
    src: ai-horde-native@.service.j2
    dest: /etc/systemd/system/ai-horde@.service
    mode: "0644"
  become: true
  notify:
    - Reload systemd
    - Restart AI-Horde native instances

# ── Compute instance port list ──────────────────────────────
- name: Build list of instance ports
  ansible.builtin.set_fact:
    _ai_horde_ports: >-
      {{ range(ai_horde_port | int, ai_horde_port | int + ai_horde_instance_count | int) | list }}

- name: Gather existing AI-Horde systemd instance units
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail &&
      systemctl list-unit-files 'ai-horde@*.service' --no-legend --no-pager |
      awk '{print $1}'
    executable: /bin/bash
  register: _ai_horde_existing_units
  failed_when: false
  changed_when: false
  become: true
  when: ai_horde_start_services | bool

- name: Build list of stale AI-Horde instance ports
  ansible.builtin.set_fact:
    _ai_horde_stale_ports: >-
      {{
        (
          _ai_horde_existing_units.stdout_lines
          | select('match', '^ai-horde@[0-9]+[.]service$')
          | map('regex_replace', '^ai-horde@', '')
          | map('replace', '.service', '')
          | map('int')
          | list
        ) | difference(_ai_horde_ports)
      }}
  when: ai_horde_start_services | bool

- name: Stop and disable stale AI-Horde instances
  ansible.builtin.systemd:
    name: "ai-horde@{{ item }}"
    enabled: false
    state: stopped
  become: true
  loop: "{{ _ai_horde_stale_ports }}"
  when: ai_horde_start_services | bool

- name: Enable and start AI-Horde instances
  ansible.builtin.systemd:
    name: "ai-horde@{{ item }}"
    enabled: true
    state: started
    daemon_reload: true
  become: true
  loop: "{{ _ai_horde_ports }}"
  when: ai_horde_start_services | bool

# ── Optional HAProxy ────────────────────────────────────────
- name: Include HAProxy configuration
  ansible.builtin.include_tasks: haproxy.yml
  when: ai_horde_install_haproxy | bool

# ── Health checks ────────────────────────────────────────────
- name: Wait for AI-Horde heartbeat on each instance
  ansible.builtin.uri:
    url: "http://{{ ai_horde_backend_host }}:{{ item }}/api/v2/status/heartbeat"
    method: GET
    status_code: 200
  register: _horde_ready
  until: _horde_ready.status == 200
  retries: 30
  delay: 5
  become: true
  loop: "{{ _ai_horde_ports }}"
  when: ai_horde_start_services | bool
