---
# Handlers for ai_horde role

# ── Docker Compose lifecycle ─────────────────────────────────
- name: Restart AI-Horde Docker stack
  community.docker.docker_compose_v2:
    project_src: "{{ ai_horde_base_dir }}"
    state: present
    pull: always
    build: never
    scale: "{{ {'aihorde': (ai_horde_replicas | int)} }}"
  become: true
  when: ai_horde_start_services | bool
