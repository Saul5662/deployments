---
# AI-Horde backend deployment defaults

# Docker image for AI-Horde backend.
# ai_horde_image: "ghcr.io/haidra-org/ai-horde:main"
ai_horde_image: "ghcr.io/tazlin/ai-horde:main"

# Optional: when set, render a `build:` directive so `docker compose build`
# rebuilds the image from a local source checkout instead of using the
# pre-published one. Local-deploy uses this to pick up uncommitted source
# changes (e.g. iterating on horde/telemetry.py). Production deployments
# leave this empty so the registry image is used as-is.
ai_horde_build_context: ""
ai_horde_build_dockerfile: ""

# Optional list of extra docker-compose env_file entries to attach to the
# AI-Horde service. Each entry is either an absolute path or a basename
# relative to ai_horde_base_dir. They are loaded with `required: false`
# so the stack starts even when the file is absent. Used by local-deploy
# to inject Garage/S3 credentials rendered after the AI-Horde tier.
ai_horde_extra_env_files: []


# Docker-mode images (pinned by digest).
ai_horde_postgres_image: "ghcr.io/haidra-org/ai-horde-postgres@sha256:25984d05fdb328d3283166222efd569303c0221736fc332b8f4be1b8ff37e1e4"
ai_horde_redis_image: "redis:7-alpine@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065"

ai_horde_port: 7001
ai_horde_listen: "127.0.0.1"

ai_horde_horde_type: "stable"
ai_horde_verbosity: "-vvvvi"

ai_horde_base_dir: "/opt/ai-horde"
ai_horde_data_dir: "/var/lib/ai-horde"

# MUST be set by operator (fail-fast if missing).
# ai_horde_postgres_password:
# ai_horde_secret_key:

ai_horde_postgres_host: "postgres"
ai_horde_postgres_port: 5432
ai_horde_postgres_user: "aihorde"
ai_horde_postgres_db: "aihorde"

ai_horde_redis_host: "redis"
ai_horde_redis_port: 6379

ai_horde_admins: []
# Extra env vars merged into .env (e.g. R2, OAuth keys).
ai_horde_env_overrides: {}

# Docker-mode logging.  journald avoids double-writing (Alloy already
# collects from the journal) while keeping `docker logs` functional.
ai_horde_log_driver: "journald"

# false = render-only mode (CI/test).
ai_horde_start_services: true

# Replicas for AI-Horde backend (uses Docker Compose deploy: replicas)
ai_horde_replicas: 1
ai_horde_waitress_threads: 45
ai_horde_waitress_connection_limit: 1024

# Telemetry defaults
ai_horde_otel_service_name: "ai-horde"
ai_horde_otel_sdk_disabled: "false"
# Enable OTel Redis instrumentation — noisy by default.  Pair with Alloy-side
# span filtering (horde_alloy_trace_filter_enabled) to drop fast cache hits.
ai_horde_otel_instrument_redis: "false"
ai_horde_pyroscope_enabled: "false"
ai_horde_pyroscope_server_address: "http://host.docker.internal:4040"
ai_horde_pyroscope_tenant_id: ""
ai_horde_deployment_environment: "production"

# App-side head sampler ratio (0.0-1.0).  Default 1.0: every root span is
# created at the SDK and forwarded to Alloy, where the tail sampler does the
# trimming (100% of errors and slow traces, 1% baseline; see horde_alloy
# defaults).  Head sampling decides BEFORE span creation, so any value < 1.0
# here proportionally erodes the tail sampler's view of errors — only lower
# this if SDK CPU on a high-RPS instance becomes a bottleneck (>1k rps/instance
# is a reasonable threshold; below that the savings are negligible).  When
# lowering, prefer parentbased_traceidratio so child spans inherit the
# parent's keep/drop decision and traces stay coherent.
ai_horde_otel_traces_sampler_arg: "1.0"

# OTLP endpoint — containers reach Alloy directly via host.docker.internal.
# Alloy must bind its OTLP receiver to an address reachable from Docker
# (e.g. 0.0.0.0 or 172.17.0.1).  See horde_alloy_otlp_listen_address.
ai_horde_alloy_otlp_port: 4318
