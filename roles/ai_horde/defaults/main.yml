---
# AI-Horde backend deployment defaults

# Docker image for AI-Horde backend.
ai_horde_image: "ghcr.io/haidra-org/ai-horde:main"

# Docker-mode images (pinned by digest).
ai_horde_postgres_image: "ghcr.io/haidra-org/ai-horde-postgres@sha256:25984d05fdb328d3283166222efd569303c0221736fc332b8f4be1b8ff37e1e4"
ai_horde_redis_image: "redis:7-alpine@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065"

ai_horde_port: 7001
ai_horde_listen: "127.0.0.1"

ai_horde_horde_type: "stable"
ai_horde_verbosity: "-vvvvi"

ai_horde_base_dir: "/opt/ai-horde"
ai_horde_data_dir: "/var/lib/ai-horde"

# MUST be set by operator (fail-fast if missing).
# ai_horde_postgres_password:
# ai_horde_secret_key:

ai_horde_postgres_host: "postgres"
ai_horde_postgres_port: 5432
ai_horde_postgres_user: "aihorde"
ai_horde_postgres_db: "aihorde"

ai_horde_redis_host: "redis"
ai_horde_redis_port: 6379

ai_horde_admins: []
# Extra env vars merged into .env (e.g. R2, OAuth keys).
ai_horde_env_overrides: {}

# Docker-mode logging.  journald avoids double-writing (Alloy already
# collects from the journal) while keeping `docker logs` functional.
ai_horde_log_driver: "journald"

# false = render-only mode (CI/test).
ai_horde_start_services: true

# Replicas for AI-Horde backend (uses Docker Compose deploy: replicas)
ai_horde_replicas: 1
ai_horde_waitress_threads: 45
ai_horde_waitress_connection_limit: 1024

# Telemetry defaults
ai_horde_otel_service_name: "ai-horde"
ai_horde_otel_sdk_disabled: "false"
ai_horde_pyroscope_enabled: "false"
ai_horde_pyroscope_server_address: "http://host.docker.internal:4040"
ai_horde_pyroscope_tenant_id: ""
ai_horde_deployment_environment: "production"

# OTLP endpoint — containers reach Alloy directly via host.docker.internal.
# Alloy must bind its OTLP receiver to an address reachable from Docker
# (e.g. 0.0.0.0 or 172.17.0.1).  See horde_alloy_otlp_listen_address.
ai_horde_alloy_otlp_port: 4318
