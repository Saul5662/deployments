---
# Configure Grafana Alloy — render config, set up systemd, manage data dirs.

- name: Ensure Alloy config directory exists
  ansible.builtin.file:
    path: "{{ horde_alloy_config_dir }}"
    state: directory
    owner: alloy
    group: alloy
    mode: "0750"
  become: true

- name: Ensure Alloy data directory exists
  ansible.builtin.file:
    path: "{{ horde_alloy_data_dir }}"
    state: directory
    owner: alloy
    group: alloy
    mode: "0750"
  become: true

- name: Deploy Alloy configuration
  ansible.builtin.template:
    src: config.alloy.j2
    dest: "{{ horde_alloy_config_dir }}/config.alloy"
    owner: alloy
    group: alloy
    mode: "0640"
    backup: true
  become: true
  no_log: true
  notify: Restart alloy

- name: Configure Alloy systemd environment overrides
  ansible.builtin.template:
    src: alloy.env.j2
    dest: /etc/default/alloy
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart alloy

- name: Enable and start Alloy service
  ansible.builtin.systemd:
    name: alloy
    enabled: true
    state: started
    daemon_reload: true
  become: true
  when: horde_alloy_start_service | bool
