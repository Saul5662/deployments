---
# Grafana Alloy – role entry point
# Deploys Alloy as a native systemd service on application hosts.
# Collects metrics, logs, and traces; forwards to the central monitoring stack.

- name: Validate Alloy endpoint configuration
  ansible.builtin.assert:
    that:
      - >-
        horde_alloy_mimir_endpoint | length > 0
        or not (
          (horde_alloy_collect_metrics | bool)
          or (
            (horde_alloy_collect_traces | bool)
            and (horde_alloy_forward_otlp_metrics | bool)
          )
        )
      - horde_alloy_loki_endpoint  | length > 0 or not (horde_alloy_collect_logs | bool)
      - horde_alloy_tempo_endpoint | length > 0 or not (horde_alloy_collect_traces | bool)
    fail_msg: >-
      Alloy endpoints must be configured when the corresponding collection
      pipeline is enabled. Set horde_alloy_mimir_endpoint, horde_alloy_loki_endpoint,
      and/or horde_alloy_tempo_endpoint in your inventory.

- name: Validate Alloy basic auth is not using default password
  ansible.builtin.assert:
    that:
      - horde_alloy_basic_auth_password != "changeme-alloy"
    fail_msg: >-
      horde_alloy_basic_auth_password is still set to the insecure default.
      Override it in your inventory or vault.
  when: horde_alloy_basic_auth_username | length > 0

- name: Install Grafana Alloy
  ansible.builtin.include_tasks: install.yml

- name: Configure Grafana Alloy
  ansible.builtin.include_tasks: configure.yml

- name: Deploy TLS CA certificate
  ansible.builtin.include_tasks: tls.yml
  when: horde_alloy_tls_ca_cert | length > 0
