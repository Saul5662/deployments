---
# Deploy TLS CA certificate for Alloy to verify the monitoring stack endpoints.

- name: Ensure keyrings directory exists for CA cert
  ansible.builtin.file:
    path: "{{ horde_alloy_config_dir }}"
    state: directory
    owner: alloy
    group: alloy
    mode: "0750"
  become: true

- name: Deploy CA certificate
  ansible.builtin.copy:
    src: "{{ horde_alloy_tls_ca_cert }}"
    dest: "{{ horde_alloy_config_dir }}/ca.crt"
    owner: alloy
    group: alloy
    mode: "0644"
  become: true
  notify: Restart alloy
