---
# Default variables for horde_alloy role
#
# This role deploys Grafana Alloy as a native systemd service on application
# hosts. Alloy collects metrics, logs, and traces and forwards them to the
# central monitoring stack (Mimir, Loki, Tempo).

# ---------------------------------------------------------------------------
# Installation
# ---------------------------------------------------------------------------
# Alloy version — pinned for reproducibility.
horde_alloy_version: "1.8.1"

# Installation method: "package" uses Grafana's APT/RPM repo.
# "binary" downloads from GitHub releases (no repo dependency).
horde_alloy_install_method: "package"

# Config and data directories
horde_alloy_config_dir: "/etc/alloy"
horde_alloy_data_dir: "/var/lib/alloy"
horde_alloy_log_level: "warn"

# Alloy's built-in HTTP UI/health endpoint (/-/ready, /-/healthy, /graph)
horde_alloy_http_listen_address: "127.0.0.1"
horde_alloy_http_port: 12345

# Set to false in CI/test environments to skip service start.
horde_alloy_start_service: true

# ---------------------------------------------------------------------------
# Central stack endpoints (must be overridden in inventory)
# ---------------------------------------------------------------------------
# Mimir remote_write endpoint — receives Prometheus metrics.
# Example: "https://mimir.example.com/api/v1/push"
horde_alloy_mimir_endpoint: ""

# Mimir OTLP ingestion endpoint — receives OTLP metrics directly,
# preserving delta-temporality histograms (Prometheus remote_write path
# drops delta histograms via otelcol.exporter.prometheus).
# Example: "https://mimir.example.com/otlp"
horde_alloy_mimir_otlp_endpoint: ""

# Max staleness window for the deltatocumulative metrics processor. Streams
# with no updates within this window are evicted. Must comfortably exceed
# the client's metrics export interval (default 60s).
horde_alloy_deltatocumulative_max_stale: "5m"

# Loki push endpoint — receives log streams.
# Example: "https://loki.example.com/loki/api/v1/push"
horde_alloy_loki_endpoint: ""

# Tempo OTLP HTTP endpoint — receives traces.
# Example: "https://tempo.example.com:4318"
horde_alloy_tempo_endpoint: ""

# X-Scope-OrgID tenant for this host's telemetry data.
horde_alloy_tenant_id: "infrastructure"

# ---------------------------------------------------------------------------
# TLS + Authentication
# ---------------------------------------------------------------------------
# Path to CA certificate on the Ansible controller — pushed to targets.
# Uses the same CA infrastructure as node_exporter TLS.
horde_alloy_tls_ca_cert: ""

# Basic auth credentials for talking to Loki/Tempo/Mimir through HAProxy.
horde_alloy_basic_auth_username: "alloy"
horde_alloy_basic_auth_password: "changeme-alloy"

# ---------------------------------------------------------------------------
# Metrics collection (optional host metrics via prometheus.exporter.unix)
# ---------------------------------------------------------------------------
horde_alloy_collect_metrics: true
horde_alloy_scrape_interval: "15s"

# Additional labels added to all metrics from this host.
# Merged with auto-detected instance label (hostname).
# Example: { "environment": "production", "region": "us-east-1" }
horde_alloy_external_labels: {}
# Extra Prometheus scrape targets on the local host.
# Each entry: { job: "name", address: "host:port", metrics_path: "/metrics" }
horde_alloy_extra_scrape_targets: []

# Optional collector controls for prometheus.exporter.unix.
horde_alloy_unix_exporter_set_collectors: []
horde_alloy_unix_exporter_enable_collectors: []
horde_alloy_unix_exporter_disable_collectors: []
horde_alloy_unix_exporter_include_exporter_metrics: false

# Optional textfile collector directory for host-local *.prom metrics.
# Example: "/var/lib/node_exporter/textfile_collector"
horde_alloy_unix_exporter_textfile_directory: ""

# Optional filesystem collector overrides.
horde_alloy_unix_exporter_filesystem_fs_types_exclude: ""
horde_alloy_unix_exporter_filesystem_mount_points_exclude: ""
horde_alloy_unix_exporter_filesystem_mount_timeout: "5s"
# ---------------------------------------------------------------------------
# Log collection
# ---------------------------------------------------------------------------
horde_alloy_collect_logs: true

# Collect from systemd journal (recommended — captures all service output)
horde_alloy_collect_journal: true
# Maximum age of journal entries to ship on first start
horde_alloy_journal_max_age: "24h"
# Parse application-embedded log levels from message body (e.g. "INFO | ...",
# "level=info", "[WARNING] ...") and override the journal syslog level.
# Widely useful for Python (loguru/logging), Go (slog), and similar frameworks.
horde_alloy_journal_parse_level: true

# Derive a static "app" label from the service_name using regex patterns.
# Each entry maps a service_name regex to a human-readable application name.
# First match wins.  This lets you collapse per-instance service names like
# "horde_systemd_7001", "horde_systemd_7002" into app="ai-horde".
# Example:
#   - { pattern: "horde_systemd_.*|ai-horde@.*", app: "ai-horde" }
#   - { pattern: "haproxy",                      app: "haproxy"  }
horde_alloy_journal_app_rules: []

# Collect from specific log files (glob patterns).
# Example: ["/var/log/app/*.log", "/var/log/syslog"]
horde_alloy_collect_log_files: []
# Collect Docker container logs (requires Docker on the host)
horde_alloy_collect_docker_logs: false

# Docker container label used to opt-in to log collection.
# Only containers with this label set to the filter value will be collected.
# Set filter_label to "" to collect ALL containers (no filtering).
horde_alloy_docker_log_filter_label: "horde.logs"
horde_alloy_docker_log_filter_value: "true"

# Docker container labels to promote to Loki stream labels.
# Each entry maps a Docker label name to the Loki label name.
# Example: { "horde.app": "app", "horde.component": "component" }
horde_alloy_docker_label_map:
  "horde.app": "app"
  "horde.component": "component"

# Static labels added to all log streams from this host.
horde_alloy_log_labels: {}
# ---------------------------------------------------------------------------
# Trace forwarding (OTLP receiver for local app instrumentation)
# ---------------------------------------------------------------------------
horde_alloy_collect_traces: true

# Forward OTLP metrics from instrumented apps to Mimir via remote_write.
# Reuses the same OTLP receiver — requires horde_alloy_collect_traces: true.
horde_alloy_forward_otlp_metrics: true
# Tenant ID for OTLP-sourced metrics (may differ from scraped metrics).
horde_alloy_otlp_metrics_tenant_id: "ai-horde-telemetry"

# Bind address for the OTLP receiver — apps on this host send traces here.
# 0.0.0.0 allows Docker containers to reach Alloy via the bridge gateway
# (host.docker.internal).  Host firewall should restrict external access.
horde_alloy_otlp_listen_address: "0.0.0.0"
horde_alloy_otlp_grpc_port: 4317
horde_alloy_otlp_http_port: 4318

# Batch processor tuning
horde_alloy_trace_batch_timeout: "5s"
horde_alloy_trace_batch_size: 8192

# ---------------------------------------------------------------------------
# OTLP span filtering (pre-sampling)
# ---------------------------------------------------------------------------
# Drop high-volume / low-signal spans before they reach the sampler / exporter.
# Enabled by default: the patterns below cap ingest without losing operationally
# meaningful spans (errors are always preserved by the status_code != ERROR guard).
# Override `horde_alloy_trace_filter_exclude_spans` to extend or replace this list.
# Expressions use OTTL span context:
# https://grafana.com/docs/alloy/latest/reference/components/otelcol/otelcol.processor.filter/
horde_alloy_trace_filter_enabled: true
horde_alloy_trace_filter_exclude_spans:
  # Redis spans faster than 2ms (end_time-start_time is in nanoseconds).
  - 'attributes["db.system"] == "redis" and (end_time_unix_nano - start_time_unix_nano) < 2000000 and status.code != STATUS_CODE_ERROR'
  # Healthcheck and heartbeat probes (HAProxy + worker poll loops dwarf real traffic).
  - 'attributes["http.target"] == "/" and status.code != STATUS_CODE_ERROR'
  - 'attributes["http.target"] == "/healthcheck" and status.code != STATUS_CODE_ERROR'
  - 'attributes["http.target"] == "/status/heartbeat" and status.code != STATUS_CODE_ERROR'
  - 'attributes["http.route"] == "/healthcheck" and status.code != STATUS_CODE_ERROR'

# ---------------------------------------------------------------------------
# OTLP tail-based sampling
# ---------------------------------------------------------------------------
# Tail-based sampling sits behind the filter and probabilistic head sampler.
# Enabled by default: in production the head sampler (set via the app-side
# OTEL_TRACES_SAMPLER_ARG; default 0.10 in prod, 1.0 in local-deploy) caps span
# *creation* CPU; the tail sampler then promotes 100% of errors and slow traces
# back to full fidelity from the head-sampled set, keeping diagnostic value
# without the storage burden of full-rate ingest.  Override
# `horde_alloy_trace_tail_sampling_enabled: false` for tiny local stacks where
# every trace must be visible regardless of latency/error.
horde_alloy_trace_tail_sampling_enabled: true

# How long to buffer a trace before deciding whether to keep it.  Must exceed
# the p99 request duration you want to catch, or late spans are dropped.
# 5s comfortably covers the slowest endpoint p99 (/generate/async ~3s) while
# bounding tail_sampling memory pressure.
horde_alloy_trace_sampling_decision_wait: "5s"

# Max concurrently-buffered traces (memory-bounded).  At 200k * ~10 spans avg
# this buffer fits well under 1GB RSS for the Alloy process.  Tune up if
# `expected_new_traces_per_sec * decision_wait` would exceed it.
horde_alloy_trace_sampling_num_traces: 200000

# Throughput hint used to pre-size the buffer.  Sized for a ~25 instance
# fleet running ~10-20 rps each (after head sampling).
horde_alloy_trace_sampling_expected_new_per_sec: 500

# Latency threshold (ms) above which the full trace is always kept.
horde_alloy_trace_sampling_latency_ms: 1000

# Baseline probabilistic keep rate for healthy / fast traces (0-100).  This
# is applied AFTER the app-side head sampler, so the effective ingest rate
# for baseline traffic is roughly head_ratio * (probability/100).  At
# defaults (0.10 head, 1% tail) we retain ~0.1% of healthy traces while
# still keeping 100% of errors and slow traces.
horde_alloy_trace_sampling_probability: 1

# Additional raw Alloy `policy { ... }` blocks — advanced use only.
# Each entry is a string spliced verbatim into the tail_sampling component.
horde_alloy_trace_sampling_extra_policies: []
