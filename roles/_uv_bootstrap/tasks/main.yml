---
# Shared uv bootstrap pipeline.
#
# Downloads, verifies, and installs a pinned version of uv (the Python
# package manager from Astral).  Both the ai_horde and
# horde_stats_exporter roles delegate here via include_role.
#
# Required caller variables:
#   _uv_bootstrap_version              – pinned uv version string (e.g. "0.11.2")
#   _uv_bootstrap_installer_checksum   – sha256:<64-hex> checksum of the install script
#   _uv_bootstrap_allow_unverified     – bool; true to skip checksum verification
#
# Optional caller variables:
#   _uv_bootstrap_install_path         – where to place the uv binary (default: /usr/local/bin)
#
# Postcondition: /usr/local/bin/uv (or _uv_bootstrap_install_path/uv) is present
# and matches the pinned version.

- name: "Uv-bootstrap — Set install path default"  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    _uv_bootstrap_install_path: "{{ _uv_bootstrap_install_path | default('/usr/local/bin') }}"

- name: "Uv-bootstrap — Validate checksum policy"
  ansible.builtin.assert:
    that:
      - _uv_bootstrap_allow_unverified | bool or (_uv_bootstrap_installer_checksum | length > 0)
      - _uv_bootstrap_allow_unverified | bool or (_uv_bootstrap_installer_checksum is regex('^sha256:[0-9a-f]{64}$'))
    fail_msg: >-
      uv installer integrity verification is enforced by default.
      Provide _uv_bootstrap_installer_checksum (format sha256:<64-hex>) or set
      _uv_bootstrap_allow_unverified=true as an explicit opt-in.

- name: "Uv-bootstrap — Warn when checksum verification is disabled"
  ansible.builtin.debug:
    msg: >-
      _uv_bootstrap_allow_unverified=true: downloading uv installer
      without checksum verification.
  when: _uv_bootstrap_allow_unverified | bool

- name: "Uv-bootstrap — Download installer with checksum verification"
  ansible.builtin.get_url:
    url: "https://astral.sh/uv/{{ _uv_bootstrap_version }}/install.sh"
    dest: /tmp/uv-install.sh
    mode: "0700"
    checksum: "{{ _uv_bootstrap_installer_checksum }}"
  become: true
  when: not (_uv_bootstrap_allow_unverified | bool)

- name: "Uv-bootstrap — Download installer without checksum verification (explicit opt-in)"
  ansible.builtin.get_url:
    url: "https://astral.sh/uv/{{ _uv_bootstrap_version }}/install.sh"
    dest: /tmp/uv-install.sh
    mode: "0700"
  become: true
  when: _uv_bootstrap_allow_unverified | bool

- name: "Uv-bootstrap — Check installed uv version"  # noqa: var-naming[no-role-prefix]
  ansible.builtin.command: "{{ _uv_bootstrap_install_path }}/uv --version"
  changed_when: false
  failed_when: false
  register: _uv_bootstrap_version_check
  become: true

- name: "Uv-bootstrap — Install pinned uv version"
  ansible.builtin.command: /tmp/uv-install.sh
  environment:
    UV_UNMANAGED_INSTALL: "{{ _uv_bootstrap_install_path }}"
    UV_NO_MODIFY_PATH: "1"
  changed_when: true
  become: true
  when: >-
    _uv_bootstrap_version_check.rc != 0
    or ('uv ' ~ _uv_bootstrap_version) not in (_uv_bootstrap_version_check.stdout | default(''))

- name: "Uv-bootstrap — Verify installed version matches pin"  # noqa: var-naming[no-role-prefix]
  ansible.builtin.command: "{{ _uv_bootstrap_install_path }}/uv --version"
  changed_when: false
  register: _uv_bootstrap_version_after
  become: true

- name: "Uv-bootstrap — Assert version match"
  ansible.builtin.assert:
    that:
      - "('uv ' ~ _uv_bootstrap_version) in (_uv_bootstrap_version_after.stdout | default(''))"
    fail_msg: >-
      Installed uv version does not match _uv_bootstrap_version={{ _uv_bootstrap_version }}.
      Got: {{ _uv_bootstrap_version_after.stdout | default('unknown') }}

- name: "Uv-bootstrap — Remove downloaded installer"
  ansible.builtin.file:
    path: /tmp/uv-install.sh
    state: absent
  become: true
