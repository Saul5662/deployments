---
# Deploy AiHordeFrontpage (Angular SSR + Express)
#   docker — build and run inside a Docker container (default)

- name: Create AiHordeFrontpage directories
  ansible.builtin.file:
    path: "{{ aihorde_frontpage_base_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  become: true

- name: Template AiHordeFrontpage environment file
  ansible.builtin.template:
    src: frontpage.env.j2
    dest: "{{ aihorde_frontpage_base_dir }}/.env"
    owner: root
    group: root
    mode: "0640"
  become: true

- name: Include Docker deployment tasks
  ansible.builtin.include_tasks: docker.yml
