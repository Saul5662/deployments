---
# Docker deployment tasks for AiHordeFrontpage
# Builds and runs the Angular SSR app inside a Docker container.

- name: Verify Docker is available
  ansible.builtin.command: docker --version
  changed_when: false
  failed_when: false
  register: aihorde_frontpage__docker_check
  become: true

- name: Fail if Docker is not installed
  ansible.builtin.fail:
    msg: "Docker is required for AiHordeFrontpage (deploy_mode=docker). Please install Docker first."
  when: aihorde_frontpage__docker_check.rc != 0

- name: Verify Docker Compose V2 is available
  ansible.builtin.command: docker compose version
  changed_when: false
  failed_when: aihorde_frontpage__compose_check.rc != 0
  register: aihorde_frontpage__compose_check
  become: true

- name: Fail if Docker Compose V2 is not available
  ansible.builtin.fail:
    msg: >-
      Docker Compose V2 plugin is required but 'docker compose version' failed.
      The standalone docker-compose (V1) is end-of-life. Please install the
      Docker Compose V2 plugin: https://docs.docker.com/compose/install/
  when: aihorde_frontpage__compose_check.rc != 0

- name: Clone AiHordeFrontpage source repository
  ansible.builtin.git:
    repo: "{{ aihorde_frontpage_repo }}"
    dest: "{{ aihorde_frontpage_base_dir }}/src"
    version: "{{ aihorde_frontpage_repo_version }}"
    force: true
  become: true
  register: aihorde_frontpage__clone
  when: aihorde_frontpage_start_services | bool

- name: Template Docker Compose for AiHordeFrontpage
  ansible.builtin.template:
    src: docker-compose.frontpage.yml.j2
    dest: "{{ aihorde_frontpage_base_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  notify: Restart AiHordeFrontpage stack

- name: Template systemd service for AiHordeFrontpage (Docker)
  ansible.builtin.template:
    src: frontpage.service.j2
    dest: /etc/systemd/system/aihorde-frontpage.service
    mode: "0644"
  become: true
  notify:
    - Reload systemd

- name: Enable and start AiHordeFrontpage service
  ansible.builtin.systemd:
    name: aihorde-frontpage
    enabled: true
    state: started
    daemon_reload: true
  become: true
  when: aihorde_frontpage_start_services | bool

- name: Wait for AiHordeFrontpage to respond
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ aihorde_frontpage_port }}/"
    method: GET
    status_code: 200
  register: aihorde_frontpage__ready
  until: aihorde_frontpage__ready.status == 200
  retries: 30
  delay: 5
  become: true
  when: aihorde_frontpage_start_services | bool
