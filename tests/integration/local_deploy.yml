---
# Integration test deployment playbook — renders AI-Horde stack configs
# and a worker bridgeData.yaml into local-deploy/runtime/ for live validation.
#
# Driven by tests/integration/local_deploy.sh — do not run directly.
# Applies the ai_horde role against localhost with
# ai_horde_start_services=false so only configs are rendered.

- name: Render integration test deployment
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    # AI-Horde settings
    ai_horde_start_services: false
    ai_horde_log_driver: "local"
    ai_horde_base_dir: "{{ playbook_dir }}/../../local-deploy/runtime/ai-horde"
    ai_horde_data_dir: "{{ playbook_dir }}/../../local-deploy/runtime/ai-horde/data"
    ai_horde_postgres_password: "localdev"
    ai_horde_secret_key: "integration-test-secret"
    ai_horde_listen: "0.0.0.0"
    ai_horde_port: 7001
    ai_horde_admins: ["test_user#1"]
    ai_horde_repo: "https://github.com/Haidra-Org/AI-Horde.git"
    ai_horde_repo_version: "main"
    ai_horde_embedded_postgres_enabled: true
    ai_horde_embedded_redis_enabled: true
    ai_horde_deployment_environment: "local-deploy"
    ai_horde_env_overrides:
      KUDOS_TRUST_THRESHOLD: "100"

    # Package manager ansible modules
    pkg_modules:
      Debian: "ansible.builtin.apt"
      Archlinux: "community.general.pacman"
      RedHat: "ansible.builtin.dnf"
      default: "ansible.builtin.package"

  pre_tasks:
    - name: Determine distrobution for package installation
      ansible.builtin.set_fact:
        target_pkg_module: >-
          {{ pkg_modules[ansible_facts['distribution']]
            | default(pkg_modules[ansible_facts['os_family']])
            | default(pkg_modules['default']) }}

  roles:
    - ai_horde

  post_tasks:
    - name: Create integration directory
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../../local-deploy/runtime/integration"
        state: directory
        mode: "0755"

    - name: Write integration env file
      ansible.builtin.copy:
        content: |
          AI_HORDE_PORT={{ ai_horde_port }}
          AI_HORDE_BASE_DIR={{ ai_horde_base_dir }}
          INTEGRATION_DIR={{ playbook_dir }}/../../local-deploy/runtime/integration
        dest: "{{ playbook_dir }}/../../local-deploy/runtime/integration/local-deploy.env"
        mode: "0644"

    - name: Write AI-Horde local-deploy.env
      ansible.builtin.copy:
        content: |
          AI_HORDE_PORT={{ ai_horde_port }}
          AI_HORDE_BASE_DIR={{ ai_horde_base_dir }}
        dest: "{{ ai_horde_base_dir }}/local-deploy.env"
        mode: "0644"

    - name: Create AI-Horde source directory owned by invoking user
      ansible.builtin.file:
        path: "{{ ai_horde_base_dir }}/src"
        state: directory
        owner: "{{ lookup('env', 'USER') }}"
        group: "{{ lookup('env', 'USER') }}"
        mode: "0755"
      become: true
