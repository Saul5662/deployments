---
# Integration smoke test — render-only (CI-friendly, no Docker daemon).
#
# Verifies that AI-Horde and worker configs render coherently together:
# the worker's bridgeData.yaml points at the correct horde_regen_worker_horde_url, and the
# AI-Horde compose stack exposes the expected port.

- name: Test integration config rendering
  hosts: testhost
  become: true
  vars:
    # AI-Horde role vars
    ai_horde_start_services: false
    ai_horde_deployment_environment: "local-deploy"
    ai_horde_embedded_postgres_enabled: true
    ai_horde_embedded_redis_enabled: true
    ai_horde_postgres_password: "test-password"
    ai_horde_secret_key: "test-secret"
    ai_horde_env_overrides:
      KUDOS_TRUST_THRESHOLD: "100"
    ai_horde_port: 7001
    ai_horde_listen: "0.0.0.0"
    ai_horde_admins: ["test_user#1"]

    # Worker template vars (for bridgeData rendering)
    horde_regen_worker_horde_url: "http://localhost:7001"
    horde_regen_worker_api_key: "test-key"
    horde_regen_worker_username: "testworker"
    horde_regen_worker_runtime_dir: "horde-worker-regen"
    horde_regen_worker_clone_dir: "horde-worker-regen"
    horde_regen_worker_service_name: "ai_horde_worker"
    horde_regen_worker_environment: ""
    horde_regen_worker_amd_gpu: false
    horde_regen_worker_models_dir: "regen_worker_models"
    horde_regen_worker_priority_usernames: []
    horde_regen_worker_max_threads: 1
    horde_regen_worker_queue_size: 1
    horde_regen_worker_max_batch: 1
    horde_regen_worker_max_power: 8
    horde_regen_worker_allow_unsafe_ip: true
    horde_regen_worker_require_upfront_kudos: false
    horde_regen_worker_dreamer_name: "integration-test-dreamer"
    dreamer_worker: true
    horde_regen_worker_scribe_name: "integration-test-scribe"
    scribe_worker: false
    horde_regen_worker_alchemist_name: "integration-test-alchemist"
    alchemist_worker: false
    horde_regen_worker_blacklist: []
    horde_regen_worker_nsfw: false
    horde_regen_worker_censor_nsfw: false
    horde_regen_worker_censorlist: []
    horde_regen_worker_allow_img2img: true
    horde_regen_worker_allow_painting: true
    horde_regen_worker_allow_controlnet: false
    horde_regen_worker_allow_sdxl_controlnet: false
    horde_regen_worker_allow_lora: false
    horde_regen_worker_max_lora_cache_size: 10
    horde_regen_worker_allow_post_processing: true
    horde_regen_worker_safety_on_gpu: false
    horde_regen_worker_dynamic_models: false
    horde_regen_worker_number_of_dynamic_models: 0
    horde_regen_worker_max_models_to_download: 10
    horde_regen_worker_stats_output_frequency: 30
    horde_regen_worker_moderate_performance_mode: false
    horde_regen_worker_high_performance_mode: false
    horde_regen_worker_exit_on_unhandled_faults: true
    horde_regen_worker_kai_url: "http://localhost:5000"
    horde_regen_worker_max_length: 80
    horde_regen_worker_max_context_length: 1024
    horde_regen_worker_branded_model: true
    horde_regen_worker_forms:
      - "caption"
      - "nsfw"
    horde_regen_worker_models_to_load:
      - "stable_diffusion"
    horde_regen_worker_models_to_skip:
      - "pix2pix"

  roles:
    - ai_horde

  post_tasks:
    - name: Stat AI-Horde compose
      ansible.builtin.stat:
        path: /opt/ai-horde/docker-compose.yml
      register: _compose

    - name: Assert compose exists
      ansible.builtin.assert:
        that:
          - _compose.stat.exists

    - name: Read AI-Horde compose
      ansible.builtin.slurp:
        src: /opt/ai-horde/docker-compose.yml
      register: _compose_content

    - name: Assert AI-Horde compose exposes port 7001
      ansible.builtin.assert:
        that:
          - "'7001' in _compose_content.content | b64decode"

    - name: Assert AI-Horde compose listens on 0.0.0.0 (for integration)
      ansible.builtin.assert:
        that:
          - "'0.0.0.0:7001-' in _compose_content.content | b64decode"
          - "':7001' in _compose_content.content | b64decode"
        fail_msg: >-
          Compose port binding should contain host-range format
          (e.g. 0.0.0.0:7001-7001:7001 for replicas=1).

    - name: Create worker config directory
      ansible.builtin.file:
        path: /tmp/integration-worker
        state: directory
        mode: "0755"

    - name: Render bridgeData.yaml for integration
      ansible.builtin.template:
        src: "../../roles/horde_regen_worker/templates/bridgeData.yaml.j2"
        dest: /tmp/integration-worker/bridgeData.yaml
        mode: "0644"

    - name: Read bridgeData.yaml
      ansible.builtin.slurp:
        src: /tmp/integration-worker/bridgeData.yaml
      register: _bridge

    - name: Assert bridgeData.yaml points at local AI-Horde
      ansible.builtin.assert:
        that:
          - "'horde_url: http://localhost:7001' in _bridge.content | b64decode"
        fail_msg: >
          bridgeData.yaml should point at http://localhost:7001 (the local
          AI-Horde instance) but it doesn't.  This means the worker would
          not be able to reach the backend.

    - name: Assert bridgeData has correct worker identity
      ansible.builtin.assert:
        that:
          - "'dreamer_name: integration-test-dreamer' in _bridge.content | b64decode"

    - name: Read AI-Horde .env
      ansible.builtin.slurp:
        src: /opt/ai-horde/.env
      register: _env_content

    - name: Assert .env has integration-compatible settings
      ansible.builtin.assert:
        that:
          - "'POSTGRES_PASS=\"test-password\"' in _env_content.content | b64decode"
          - "'secret_key=\"test-secret\"' in _env_content.content | b64decode"

    - name: Render worker systemd unit
      ansible.builtin.template:
        src: "../../roles/horde_regen_worker/templates/ai_horde_worker.j2"
        dest: /tmp/integration-worker/ai_horde_worker.service
        mode: "0644"

    - name: Read worker systemd unit
      ansible.builtin.slurp:
        src: /tmp/integration-worker/ai_horde_worker.service
      register: _worker_service

    - name: Assert worker systemd unit is valid
      ansible.builtin.assert:
        that:
          - "'horde-bridge.sh' in _worker_service.content | b64decode"
          - "'/home/testworker/horde-worker-regen' in _worker_service.content | b64decode"
