---
# Full-stack rendering playbook — renders configs for all services
# that participate in the complete local Horde stack.
#
# Driven by tests/full_stack/local_deploy.sh — do not run directly.
# Applies both the ai_horde and aihorde_frontpage roles against
# localhost with start_services=false so only configs are rendered.
#
# The HAProxy config is a static file (local-deploy/static/haproxy/haproxy.cfg)
# and does not need to be rendered here.

- name: Render complete Horde stack configs (local deploy)
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    ai_horde_base_dir: "{{ playbook_dir }}/../../local-deploy/runtime/ai-horde"
    ai_horde_data_dir: "{{ playbook_dir }}/../../local-deploy/runtime/ai-horde/data"
    aihorde_frontpage_base_dir: "{{ playbook_dir }}/../../local-deploy/runtime/frontpage"

    # Build the AI-Horde image from the cloned source so iterative changes
    # to /root/horde/AI-Horde (or whatever upstream ref local_deploy.sh
    # checks out into runtime/ai-horde/src) are picked up by
    # `dc_backend build`. Without this, the compose only references
    # `image:` and the build step is a no-op.
    ai_horde_build_context: "./src"
    # Tag the locally-built image with a -local suffix so it can never be
    # overwritten by a `docker pull` from the registry.
    ai_horde_image: "ai-horde:local"

    # Garage S3 credentials are rendered into runtime/ai-horde/.env.garage
    # by local_deploy.sh after the embedded Garage bootstrap completes.
    # Loaded as a second env_file with required:false so the stack still
    # boots cleanly when monitoring (and therefore Garage) is disabled.
    ai_horde_extra_env_files:
      - .env.garage

    ai_horde_start_services: false
    ai_horde_log_driver: "local"
    ai_horde_listen: "127.0.0.1"
    ai_horde_port: 7001
    ai_horde_postgres_password: "localdev-postgres"
    ai_horde_secret_key: "localdev-secret-key"
    ai_horde_admins: ["test_user#1"]
    ai_horde_repo: "https://github.com/Haidra-Org/AI-Horde.git"
    ai_horde_repo_version: "main"
    ai_horde_pyroscope_enabled: "true"
    ai_horde_pyroscope_tenant_id: "ai-horde-app"

    # In local-deploy, alloy + pyroscope run as sibling containers and are
    # attached to the shared `horde-stack` network by local_deploy.sh.  We
    # override the endpoints (which default to host.docker.internal in the
    # role) so ai-horde containers reach them by service name over the
    # shared network — this avoids the IPv6 ENETUNREACH issue with
    # host.docker.internal on Linux Docker.
    ai_horde_env_overrides:
      KUDOS_TRUST_THRESHOLD: "100"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy:4318"
      PYROSCOPE_SERVER_ADDRESS: "http://pyroscope:4040"

    aihorde_frontpage_start_services: false
    aihorde_frontpage_build_config: local
    aihorde_frontpage_listen: "127.0.0.1"
    aihorde_frontpage_port: 8006
    aihorde_frontpage_repo: "https://github.com/Haidra-Org/AiHordeFrontpage.git"
    aihorde_frontpage_repo_version: "master"

    horde_model_reference_base_dir: "{{ playbook_dir }}/../../local-deploy/runtime/model-reference"
    horde_model_reference_data_dir: "{{ playbook_dir }}/../../local-deploy/runtime/model-reference/data"
    horde_model_reference_start_services: false
    horde_model_reference_replicate_mode: "PRIMARY"
    # One-time seed: enable when bootstrapping a fresh local stack.
    # Set to false (or remove) once the data volume is populated.
    horde_model_reference_github_seed_enabled: true
    horde_model_reference_make_folders: true
    horde_model_reference_canonical_format: "v2"
    horde_model_reference_listen: "127.0.0.1"
    horde_model_reference_port: 19800
    horde_model_reference_log_driver: "local"

  roles:
    - ai_horde
    - aihorde_frontpage
    - horde_model_reference

  post_tasks:
    - name: Ensure HAProxy config directory exists
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../../local-deploy/static/haproxy"
        state: directory
        mode: "0755"

    - name: Verify HAProxy config is present
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../../local-deploy/static/haproxy/haproxy.cfg"
      register: _haproxy_cfg

    - name: Fail if HAProxy config is missing
      ansible.builtin.fail:
        msg: >-
          local-deploy/static/haproxy/haproxy.cfg not found. This is a
          version-controlled static file — ensure the repo checkout
          is complete.
      when: not _haproxy_cfg.stat.exists
