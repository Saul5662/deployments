---
# Test playbook: Prometheus-only deployment
- name: Test horde_monitoring - Prometheus only
  hosts: testhost
  become: true
  gather_facts: yes

  vars:
    monitoring_install_prometheus: true
    monitoring_install_grafana: false
    monitoring_install_influxdb: false
    monitoring_enable_prometheus_backup: false
    monitoring_configure_firewall: false
    prometheus_version: "2.45.0"
    prometheus_retention_time: "100y"

  roles:
    - role: horde_monitoring
