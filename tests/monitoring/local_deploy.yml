---
# Local deployment playbook — renders the full monitoring stack config
# into local-deploy/runtime/ for manual validation via Docker Compose.
#
# This playbook is driven by tests/monitoring/local_deploy.sh — do not run directly.
# It applies the horde_monitoring role against localhost with
# horde_monitoring_start_services=false so that only configs are rendered
# (no systemd units are enabled/started).
#
# After the role runs, post_tasks render the remaining configs that are
# outside the role's scope (Prometheus, Alertmanager, Exporter, Alloy,
# and the Compose overlay).  The shell script sources the rendered
# local-deploy.env for ports/credentials — nothing is hardcoded there.

- name: Render monitoring stack for local validation
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    _local_root: "{{ playbook_dir }}/../../local-deploy/runtime"
    _local_secret_dir: "{{ _local_root }}/.secrets/monitoring"
    _local_garage_access_key_suffix_file: "{{ _local_secret_dir }}/garage-access-key-suffix.hex"
    _local_garage_secret_key_file: "{{ _local_secret_dir }}/garage-secret-key.hex"
    _local_garage_rpc_secret_file: "{{ _local_secret_dir }}/garage-rpc-secret.hex"

    horde_monitoring_install_mimir: true
    horde_monitoring_install_grafana: true
    horde_monitoring_install_loki: true
    horde_monitoring_install_tempo: true
    horde_monitoring_install_pyroscope: true
    horde_monitoring_configure_haproxy: false
    horde_monitoring_configure_firewall: false
    horde_monitoring_start_services: false  # script starts compose directly

    horde_monitoring_mimir_config_dir: "{{ _local_root }}/mimir/config"
    horde_monitoring_mimir_data_dir: "{{ _local_root }}/mimir/data"
    horde_monitoring_mimir_compose_dir: "{{ _local_root }}/compose"
    horde_monitoring_grafana_data_dir: "{{ _local_root }}/grafana/data"
    horde_monitoring_grafana_provisioning_dir: "{{ _local_root }}/grafana/provisioning"
    horde_monitoring_grafana_dashboard_dir: "{{ _local_root }}/grafana/dashboards"
    horde_monitoring_loki_config_dir: "{{ _local_root }}/loki/config"
    horde_monitoring_loki_data_dir: "{{ _local_root }}/loki/data"
    horde_monitoring_tempo_config_dir: "{{ _local_root }}/tempo/config"
    horde_monitoring_tempo_data_dir: "{{ _local_root }}/tempo/data"
    horde_monitoring_pyroscope_config_dir: "{{ _local_root }}/pyroscope/config"
    horde_monitoring_pyroscope_data_dir: "{{ _local_root }}/pyroscope/data"
    horde_monitoring_s3_config_dir: "{{ _local_root }}/garage/config"
    horde_monitoring_s3_data_dir: "{{ _local_root }}/garage/data"
    horde_monitoring_s3_metadata_dir: "{{ _local_root }}/garage/meta"

    horde_monitoring_grafana_admin_password: "localdev"
    horde_monitoring_grafana_anonymous_enabled: true
    horde_monitoring_grafana_provision_dashboards: true
    # Use git mode for local dev (release tarball may not exist)
    horde_monitoring_grafana_dashboards_source: "git"

    # Tenants
    horde_monitoring_application_tenant_id: "ai-horde-app"
    horde_monitoring_infrastructure_tenant_id: "infrastructure"
    horde_monitoring_telemetry_tenant_id: "ai-horde-telemetry"
    horde_monitoring_public_tenant_id: "ai-horde-public"

    # Loki / Tempo local settings
    horde_monitoring_loki_retention_period: "168h"  # 7 days for local dev
    horde_monitoring_tempo_trace_retention: "24h"  # 1 day for local dev
    horde_monitoring_tempo_metrics_generator_enabled: true
    horde_monitoring_tempo_metrics_generator_tenant_id: "ai-horde-telemetry"

    # Pyroscope local settings
    horde_monitoring_pyroscope_retention_period: "0s"
    horde_monitoring_pyroscope_self_profiling: true

    # Alertmanager — runs as Docker container in local runtime
    horde_monitoring_alertmanager_url: "http://alertmanager:9093"
    # Redirect alerting rules into local runtime so they can be mounted
    horde_monitoring_alerting_rules_dir: "{{ _local_root }}/prometheus/rules"

    # Ports for services that the shell script manages
    _local_prometheus_port: 9090
    _local_alertmanager_port: 9093
    _local_exporter_port: 9150
    _local_alloy_http_port: 12345
    _local_otlp_grpc_port: 4317
    _local_otlp_http_port: 4318

    # Pinned image versions — single source of truth
    _local_alertmanager_image: "prom/alertmanager:v0.31.1"
    _local_prometheus_image: "prom/prometheus:v3.10.0"
    _local_exporter_base_image: "python:3.12-bookworm"
    _local_alloy_image: "grafana/alloy:v1.8.1"

    # Exporter install source
    _local_exporter_repo_url: "https://github.com/Haidra-Org/horde-exporters"
    _local_exporter_repo_ref: "main"

  pre_tasks:
    - name: Ensure local secret directory exists
      ansible.builtin.file:
        path: "{{ _local_secret_dir }}"
        state: directory
        mode: "0700"
      become: false

    - name: Generate stable local embedded Garage access key suffix
      ansible.builtin.set_fact:
        horde_monitoring__garage_access_key_suffix: >-
          {{ lookup('ansible.builtin.password', _local_garage_access_key_suffix_file ~ ' length=24 chars=hexdigits') | lower }}
      no_log: true
      become: false

    - name: Generate stable local embedded Garage credentials
      ansible.builtin.set_fact:
        horde_monitoring_s3_access_key: >-
          GK{{ horde_monitoring__garage_access_key_suffix }}
        horde_monitoring_s3_access_key_name: >-
          mimir-{{ horde_monitoring__garage_access_key_suffix[-8:] }}
        horde_monitoring_s3_secret_key: >-
          {{ lookup('ansible.builtin.password', _local_garage_secret_key_file ~ ' length=64 chars=hexdigits') | lower }}
        horde_monitoring_s3_rpc_secret: >-
          {{ lookup('ansible.builtin.password', _local_garage_rpc_secret_file ~ ' length=64 chars=hexdigits') | lower }}
      no_log: true
      become: false

    - name: Assert generated Garage credentials match required formats
      ansible.builtin.assert:
        that:
          - horde_monitoring_s3_access_key is match('^GK[0-9a-f]{24}$')
          - horde_monitoring_s3_secret_key is match('^[0-9a-f]{64}$')
          - horde_monitoring_s3_rpc_secret is match('^[0-9a-f]{64}$')
        fail_msg: >-
          Generated Garage credentials are invalid. Remove files in
          {{ _local_secret_dir }} and re-run this playbook.
      become: false

  roles:
    - role: horde_monitoring

  post_tasks:
    - name: Create local runtime subdirectories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ _local_root }}/prometheus"
        - "{{ _local_root }}/alertmanager"
        - "{{ _local_root }}/exporter"
        - "{{ _local_root }}/alloy"

    - name: Render Prometheus config
      ansible.builtin.template:
        src: local-deploy/prometheus.yml.j2
        dest: "{{ _local_root }}/prometheus/prometheus.yml"
        mode: "0644"

    - name: Render Alertmanager config
      ansible.builtin.template:
        src: local-deploy/alertmanager.yml.j2
        dest: "{{ _local_root }}/alertmanager/alertmanager.yml"
        mode: "0644"

    - name: Render exporter config
      ansible.builtin.template:
        src: local-deploy/exporter-config.yaml.j2
        dest: "{{ _local_root }}/exporter/config.yaml"
        mode: "0644"

    - name: Render Alloy config
      ansible.builtin.template:
        src: local-deploy/alloy-config.alloy.j2
        dest: "{{ _local_root }}/alloy/config.alloy"
        mode: "0644"

    - name: Render Docker Compose overlay
      ansible.builtin.template:
        src: local-deploy/docker-compose.local.yml.j2
        dest: "{{ horde_monitoring_mimir_compose_dir }}/docker-compose.local.yml"
        mode: "0644"

    - name: Render local-deploy.env
      ansible.builtin.template:
        src: local-deploy/local-deploy.env.j2
        dest: "{{ _local_root }}/local-deploy.env"
        mode: "0644"
