---
# risk-category: deploy-safety, fail-fast
# Test playbook: host metrics source auto-selection contract
- name: Test host metrics source auto selection contract
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    horde_host_metrics_source_allowed:
      - auto
      - node_exporter
      - alloy

    host_metrics_resolution_cases:
      - name: auto default installs node_exporter
        source: auto
        expected_use_alloy: false

      - name: auto with horde_alloy_enabled true skips node_exporter
        source: auto
        horde_alloy_enabled: true
        expected_use_alloy: true

      - name: auto with horde_alloy_collect_metrics true skips node_exporter
        source: auto
        horde_alloy_collect_metrics: true
        expected_use_alloy: true

      - name: auto with both indicators false installs node_exporter
        source: auto
        horde_alloy_enabled: false
        horde_alloy_collect_metrics: false
        expected_use_alloy: false

      - name: auto treats string true as enabled
        source: auto
        horde_alloy_collect_metrics: "true"
        expected_use_alloy: true

      - name: force node_exporter overrides Alloy indicators
        source: node_exporter
        horde_alloy_enabled: true
        horde_alloy_collect_metrics: true
        expected_use_alloy: false

      - name: force alloy skips node_exporter
        source: alloy
        expected_use_alloy: true

  tasks:
    - name: Read monitoring example playbook
      ansible.builtin.set_fact:
        horde_monitoring_stack_example: "{{ lookup('ansible.builtin.file', playbook_dir ~ '/../../examples/horde_monitoring_stack.yml') }}"

    - name: Read monitoring guide
      ansible.builtin.set_fact:
        horde_monitoring_guide: "{{ lookup('ansible.builtin.file', playbook_dir ~ '/../../MONITORING.md') }}"

    - name: Assert example playbook defines allowed source values
      ansible.builtin.assert:
        that:
          - "'horde_host_metrics_source_allowed' in horde_monitoring_stack_example"
          - "'- auto' in horde_monitoring_stack_example"
          - "'- node_exporter' in horde_monitoring_stack_example"
          - "'- alloy' in horde_monitoring_stack_example"
        fail_msg: "Monitoring example must define explicit allowed values for horde_host_metrics_source"

    - name: Assert auto-mode Alloy indicators are present in example playbook
      ansible.builtin.assert:
        that:
          - "'horde_alloy_enabled | default(false) | bool' in horde_monitoring_stack_example"
          - "'horde_alloy_collect_metrics is defined' in horde_monitoring_stack_example"
          - "'horde_alloy_collect_metrics | bool' in horde_monitoring_stack_example"
        fail_msg: "Monitoring example must treat horde_alloy_enabled and horde_alloy_collect_metrics as auto-mode indicators"

    - name: Assert node_exporter install/cert tasks all use resolved host decision
      ansible.builtin.assert:
        that:
          - >-
            (horde_monitoring_stack_example
            | regex_findall('when: not \\(horde_host_uses_alloy_metrics \\| bool\\)')
            | length) == 3
        fail_msg: "Monitoring example must gate cert/key copy and node_exporter role with horde_host_uses_alloy_metrics"

    - name: Assert monitoring guide documents auto host metrics source behavior
      ansible.builtin.assert:
        that:
          - "'horde_host_metrics_source: auto' in horde_monitoring_guide"
          - "'horde_alloy_enabled: true' in horde_monitoring_guide"
          - "'horde_alloy_collect_metrics: true' in horde_monitoring_guide"
        fail_msg: "Monitoring guide must document auto source behavior and Alloy indicators"

    - name: Assert host metrics source resolution matrix
      ansible.builtin.assert:
        that:
          - >-
            (
              (item.source | default('auto') | lower) == 'alloy'
              or (
                (item.source | default('auto') | lower) == 'auto'
                and (
                  (item.horde_alloy_enabled | default(false) | bool)
                  or (
                    (item.horde_alloy_collect_metrics is defined)
                    and (item.horde_alloy_collect_metrics | bool)
                  )
                )
              )
            ) == (item.expected_use_alloy | bool)
        fail_msg: "Host metrics source auto-selection contract changed unexpectedly"
      loop: "{{ host_metrics_resolution_cases }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Assert invalid source value is rejected by allow-list
      ansible.builtin.assert:
        that:
          - "'invalid' not in horde_host_metrics_source_allowed"
        fail_msg: "Invalid host metrics source values must be rejected"