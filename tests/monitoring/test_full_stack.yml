---
# idempotency: skip
# Test playbook: Full stack (Mimir + Grafana + HAProxy)
- name: Test horde_monitoring - Full stack
  hosts: testhost
  become: true
  gather_facts: true

  vars:
    horde_monitoring_install_mimir: true
    horde_monitoring_install_grafana: true
    horde_monitoring_configure_firewall: false
    horde_monitoring_configure_haproxy: true
    horde_monitoring_grafana_admin_password: "testpass123"
    horde_monitoring_application_tenant_id: "app-metrics"
    horde_monitoring_application_retention: "0"
    horde_monitoring_infrastructure_tenant_id: "infra-metrics"
    horde_monitoring_infrastructure_retention: "14d"
    horde_monitoring_public_tenant_id: "public-metrics"
    horde_monitoring_public_retention: "90d"
    horde_monitoring_grafana_anonymous_enabled: true
    horde_monitoring_grafana_provision_dashboards: false
    horde_monitoring_start_services: false
    horde_monitoring_mimir_backup_enabled: false

  pre_tasks:
    - name: Install HAProxy for config validation
      ansible.builtin.apt:
        name: haproxy
        state: present
        update_cache: true

    - name: Create HAProxy config directory for test
      ansible.builtin.file:
        path: /etc/haproxy
        state: directory
        mode: "0755"

    - name: Create stub HAProxy config for test
      ansible.builtin.copy:
        dest: /etc/haproxy/haproxy.cfg
        content: |
          global
              log /dev/log local0
          defaults
              mode http
              timeout connect 5s
              timeout client 50s
              timeout server 50s
        mode: "0644"

  roles:
    - role: horde_monitoring

  post_tasks:
    - name: Read rendered Mimir config
      ansible.builtin.slurp:
        path: /etc/mimir/mimir.yaml
      register: horde_monitoring_mimir_config

    - name: Read rendered Mimir runtime overrides
      ansible.builtin.slurp:
        path: /etc/mimir/runtime-overrides.yaml
      register: horde_monitoring_mimir_runtime_overrides

    - name: Read rendered Grafana datasources
      ansible.builtin.slurp:
        path: /etc/grafana/provisioning/datasources/mimir.yml
      register: horde_monitoring_grafana_datasources

    - name: Read rendered Docker Compose
      ansible.builtin.slurp:
        path: /opt/mimir/docker-compose.yml
      register: compose_config

    - name: Assert multitenant monitoring config
      ansible.builtin.assert:
        that:
          - "'multitenancy_enabled: true' in (horde_monitoring_mimir_config.content | b64decode)"
          - "'runtime-overrides.yaml' in (horde_monitoring_mimir_config.content | b64decode)"
          - "'app-metrics:' in (horde_monitoring_mimir_runtime_overrides.content | b64decode)"
          - "'infra-metrics:' in (horde_monitoring_mimir_runtime_overrides.content | b64decode)"
          - "'public-metrics:' in (horde_monitoring_mimir_runtime_overrides.content | b64decode)"
          - "'max_total_query_length' in (horde_monitoring_mimir_runtime_overrides.content | b64decode)"
          - "'max_fetched_series_per_query' in (horde_monitoring_mimir_runtime_overrides.content | b64decode)"
          - "'AI Horde App' in (horde_monitoring_grafana_datasources.content | b64decode)"
          - "'Infrastructure' in (horde_monitoring_grafana_datasources.content | b64decode)"
          - "'orgId: 1' in (horde_monitoring_grafana_datasources.content | b64decode)"
          - "'mimir-public' in (horde_monitoring_grafana_datasources.content | b64decode)"
          - "'ANONYMOUS_ENABLED=true' in (compose_config.content | b64decode)"
          - "'ANONYMOUS_ORG_NAME' in (compose_config.content | b64decode)"

    - name: Assert S3 object storage config
      ansible.builtin.assert:
        that:
          - "'backend: s3' in (horde_monitoring_mimir_config.content | b64decode)"
          - "'endpoint: s3-store:' in (horde_monitoring_mimir_config.content | b64decode)"
          - "'bucket_name: mimir-blocks' in (horde_monitoring_mimir_config.content | b64decode)"
          - "'common:' in (horde_monitoring_mimir_config.content | b64decode)"
          - "'s3-store' in (compose_config.content | b64decode)"
          - "'s3-init' not in (compose_config.content | b64decode)"

    - name: Assert performance and caching config
      ansible.builtin.assert:
        that:
          - "'activity_tracker' in (horde_monitoring_mimir_config.content | b64decode)"
          - "'chunks_cache' in (horde_monitoring_mimir_config.content | b64decode)"
          - "'metadata_cache' in (horde_monitoring_mimir_config.content | b64decode)"
          - "'results_cache' in (horde_monitoring_mimir_config.content | b64decode)"
          - "'split_queries_by_interval' in (horde_monitoring_mimir_config.content | b64decode)"
          - "'deletion_delay' in (horde_monitoring_mimir_config.content | b64decode)"
          - "'max_global_series_per_user' in (horde_monitoring_mimir_config.content | b64decode)"
          - "'memcached' in (compose_config.content | b64decode)"

    - name: Read rendered alerting rules
      ansible.builtin.slurp:
        path: /etc/mimir/rules/monitoring-stack.rules
      register: alerting_rules

    - name: Assert alerting rules content
      ansible.builtin.assert:
        that:
          - "'Watchdog' in (alerting_rules.content | b64decode)"
          - "'MimirDown' in (alerting_rules.content | b64decode)"
          - "'MimirRequestErrors' in (alerting_rules.content | b64decode)"
          - "'MimirIngestionStalled' in (alerting_rules.content | b64decode)"
          - "'MimirCompactorFailed' in (alerting_rules.content | b64decode)"
          # S3 health alerts — split into metrics-scrape (warning) and
          # backend-failing (critical driven by thanos_objstore_* metrics).
          - "'S3MetricsScrapeDown' in (alerting_rules.content | b64decode)"
          - "'S3StorageBackendFailing' in (alerting_rules.content | b64decode)"
          - "'S3StorageDown' not in (alerting_rules.content | b64decode)"
          - "'HostDiskUsageCritical' in (alerting_rules.content | b64decode)"
          - "'HostDiskUsageHigh' in (alerting_rules.content | b64decode)"
          - "'mimir-health' in (alerting_rules.content | b64decode)"
          - "'s3-storage-health' in (alerting_rules.content | b64decode)"
          - "'host-disk-usage' in (alerting_rules.content | b64decode)"
          - "'monitoring-stack-watchdog' in (alerting_rules.content | b64decode)"
          # Application-level alerts (horde-app-health group)
          - "'horde-app-health' in (alerting_rules.content | b64decode)"
          - "'HordeExporterDown' in (alerting_rules.content | b64decode)"
          - "'HordeAPIDown' in (alerting_rules.content | b64decode)"
          - "'HordeExporterScrapeFailing' in (alerting_rules.content | b64decode)"
          - "'HordeExporterRateLimitExhausted' in (alerting_rules.content | b64decode)"
          - "'HordeNoActiveImageWorkers' in (alerting_rules.content | b64decode)"
          - "'HordeNoActiveTextWorkers' in (alerting_rules.content | b64decode)"
          - "'HordeImageWorkerCountDrop' in (alerting_rules.content | b64decode)"
          - "'HordeImageQueueBacklog' in (alerting_rules.content | b64decode)"
          - "'HordeMaintenanceMode' in (alerting_rules.content | b64decode)"
          - "'HordeRaidMode' in (alerting_rules.content | b64decode)"
          # Prometheus self-monitoring alerts (prometheus-health group)
          - "'prometheus-health' in (alerting_rules.content | b64decode)"
          - "'PrometheusTargetsMissing' in (alerting_rules.content | b64decode)"
          - "'PrometheusRemoteWriteErrors' in (alerting_rules.content | b64decode)"
          - "'PrometheusRuleEvaluationFailures' in (alerting_rules.content | b64decode)"
          - "'PrometheusNotConnectedToAlertmanager' in (alerting_rules.content | b64decode)"
          - "'PrometheusTSDBCompactionsFailing' in (alerting_rules.content | b64decode)"
          - "'PrometheusConfigReloadFailure' in (alerting_rules.content | b64decode)"
          - "'PrometheusNotificationsBacklog' in (alerting_rules.content | b64decode)"
          - "'AlertmanagerNotificationFailing' in (alerting_rules.content | b64decode)"
          # Host resource alerts (host-resource-health group)
          - "'host-resource-health' in (alerting_rules.content | b64decode)"
          - "'HostHighCpuLoad' in (alerting_rules.content | b64decode)"
          - "'HostHighMemoryUsage' in (alerting_rules.content | b64decode)"
          - "'HostOomKillDetected' in (alerting_rules.content | b64decode)"
          - "'HostSystemdServiceFailed' in (alerting_rules.content | b64decode)"
          - "'HostClockSkew' in (alerting_rules.content | b64decode)"
          - "'HostSwapFillingUp' in (alerting_rules.content | b64decode)"
          - "'HostCpuStealHigh' in (alerting_rules.content | b64decode)"
          # Host disk projections (host-disk-projections group)
          - "'host-disk-projections' in (alerting_rules.content | b64decode)"
          - "'HostOutOfInodes' in (alerting_rules.content | b64decode)"
          - "'HostDiskWillFillIn24h' in (alerting_rules.content | b64decode)"
          # PostgreSQL alerts should NOT be present (disabled by default)
          - "'PostgresExporterDown' not in (alerting_rules.content | b64decode)"
          - "'PostgresDown' not in (alerting_rules.content | b64decode)"

    - name: Read rendered recording rules
      ansible.builtin.slurp:
        path: /etc/mimir/rules/monitoring-stack.recording.rules
      register: recording_rules

    - name: Assert recording rules content
      ansible.builtin.assert:
        that:
          - "'horde-app:recording' in (recording_rules.content | b64decode)"
          - "'mimir:recording' in (recording_rules.content | b64decode)"
          - "'host:recording' in (recording_rules.content | b64decode)"
          - "'horde:api_availability:avg5m' in (recording_rules.content | b64decode)"
          - "'horde:workers_active:by_type' in (recording_rules.content | b64decode)"
          - "'horde:queue_drain_seconds:avg5m' in (recording_rules.content | b64decode)"
          - "'mimir:ingestion_rate:rate5m' in (recording_rules.content | b64decode)"
          - "'mimir:request_errors:ratio5m' in (recording_rules.content | b64decode)"
          - "'host:cpu_utilisation:avg5m' in (recording_rules.content | b64decode)"
          - "'host:memory_utilisation:ratio' in (recording_rules.content | b64decode)"

    - name: Assert no floating or latest image tags in Compose
      ansible.builtin.assert:
        that:
          - "':latest' not in (compose_config.content | b64decode)"
          - "'grafana/grafana:12.4.1' in (compose_config.content | b64decode)"
          - "'memcached:1.6.41-alpine' in (compose_config.content | b64decode)"
          - "'grafana/mimir:2.15.0' in (compose_config.content | b64decode)"
          - "'dxflrs/garage:' in (compose_config.content | b64decode)"
        fail_msg: "All container images must use immutable version tags (no 'latest', no minor-only floating)"

    - name: Assert log rotation is configured for all services
      ansible.builtin.assert:
        that:
          - "'driver: local' in (compose_config.content | b64decode)"
          - "'max-size' in (compose_config.content | b64decode)"
          - "'max-file' in (compose_config.content | b64decode)"
        fail_msg: "All Compose services must have logging driver with rotation configured"

    - name: Read rendered systemd service
      ansible.builtin.slurp:
        path: /etc/systemd/system/mimir-monitoring.service
      register: systemd_service

    - name: Assert TimeoutStartSec is finite (not 0)
      ansible.builtin.assert:
        that:
          - "'TimeoutStartSec=0' not in (systemd_service.content | b64decode)"
          - "'TimeoutStartSec=300' in (systemd_service.content | b64decode)"
        fail_msg: "TimeoutStartSec must be set to a finite value (300s) to prevent infinite boot hangs"

    - name: Stat Mimir config file permissions
      ansible.builtin.stat:
        path: /etc/mimir/mimir.yaml
      register: _mimir_config_stat

    - name: Stat Docker Compose file permissions
      ansible.builtin.stat:
        path: /opt/mimir/docker-compose.yml
      register: _compose_config_stat

    - name: Stat Mimir runtime overrides permissions
      ansible.builtin.stat:
        path: /etc/mimir/runtime-overrides.yaml
      register: _runtime_overrides_stat

    - name: Assert secret-containing files are mode 0600 owned by root:root
      ansible.builtin.assert:
        that:
          - _mimir_config_stat.stat.mode == '0600'
          - _mimir_config_stat.stat.pw_name == 'root'
          - _mimir_config_stat.stat.gr_name == 'root'
          - _compose_config_stat.stat.mode == '0600'
          - _compose_config_stat.stat.pw_name == 'root'
          - _compose_config_stat.stat.gr_name == 'root'
          - _runtime_overrides_stat.stat.mode == '0600'
          - _runtime_overrides_stat.stat.pw_name == 'root'
          - _runtime_overrides_stat.stat.gr_name == 'root'
        fail_msg: "Secret-containing files must be mode 0600, owned root:root"

    - name: Stat Mimir config directory
      ansible.builtin.stat:
        path: /etc/mimir
      register: _mimir_dir_stat

    - name: Stat Mimir data directory
      ansible.builtin.stat:
        path: /var/lib/mimir
      register: _mimir_data_stat

    - name: Stat S3 data directory
      ansible.builtin.stat:
        path: /var/lib/garage/data
      register: _s3_data_stat

    - name: Assert Mimir directories are owned by root:root
      ansible.builtin.assert:
        that:
          - _mimir_dir_stat.stat.pw_name == 'root'
          - _mimir_dir_stat.stat.gr_name == 'root'
          - _mimir_data_stat.stat.pw_name == 'root'
          - _mimir_data_stat.stat.gr_name == 'root'
        fail_msg: "Mimir directories must be owned by root:root"

    - name: Assert S3 data directory is owned by root
      ansible.builtin.assert:
        that:
          - _s3_data_stat.stat.pw_name == 'root'
          - _s3_data_stat.stat.gr_name == 'root'
        fail_msg: "S3 data directory must be owned by root:root"

    # --- HAProxy conf.d assertions ---

    - name: Stat HAProxy conf.d directory
      ansible.builtin.stat:
        path: /etc/haproxy/conf.d
      register: _haproxy_confd_stat

    - name: Stat HAProxy systemd override
      ansible.builtin.stat:
        path: /etc/systemd/system/haproxy.service.d/override.conf
      register: _haproxy_override_stat

    - name: Read HAProxy systemd override
      ansible.builtin.slurp:
        path: /etc/systemd/system/haproxy.service.d/override.conf
      register: _haproxy_override_content

    - name: Stat monitoring HAProxy conf.d fragment
      ansible.builtin.stat:
        path: /etc/haproxy/conf.d/horde-monitoring.cfg
      register: _haproxy_monitoring_cfg_stat

    - name: Read monitoring HAProxy conf.d fragment
      ansible.builtin.slurp:
        path: /etc/haproxy/conf.d/horde-monitoring.cfg
      register: _haproxy_monitoring_cfg_content

    - name: Assert HAProxy conf.d bootstrap was applied correctly
      ansible.builtin.assert:
        that:
          - _haproxy_confd_stat.stat.exists
          - _haproxy_confd_stat.stat.isdir
          - _haproxy_override_stat.stat.exists
          - "'ExecStart=' in (_haproxy_override_content.content | b64decode)"
          - "'/etc/haproxy/conf.d/' in (_haproxy_override_content.content | b64decode)"
          - "'Environment=' not in (_haproxy_override_content.content | b64decode)"
        fail_msg: >-
          HAProxy conf.d bootstrap must create the conf.d directory, write a
          systemd override using ExecStart (not Environment), and reference conf.d.

    - name: Assert monitoring HAProxy backends are configured via conf.d
      ansible.builtin.assert:
        that:
          - _haproxy_monitoring_cfg_stat.stat.exists
          - _haproxy_monitoring_cfg_stat.stat.mode == '0644'
          - "'horde_monitoring_grafana_backend' in (_haproxy_monitoring_cfg_content.content | b64decode)"
          - "'horde_monitoring_mimir_backend' in (_haproxy_monitoring_cfg_content.content | b64decode)"
        fail_msg: >-
          Monitoring HAProxy config must be a conf.d fragment containing backend definitions.

    # Run the role a second time with a changed value so Ansible
    # overwrites the config and creates a backup file.

    - name: Re-run role with changed horde_monitoring_mimir_log_level to trigger backup
      ansible.builtin.include_role:
        name: horde_monitoring
      vars:
        horde_monitoring_mimir_log_level: "info"
        horde_monitoring_start_services: false

    - name: Find backup files for mimir.yaml
      ansible.builtin.find:
        paths: /etc/mimir
        patterns: "mimir.yaml.*~"
      register: _mimir_backups

    - name: Find backup files for docker-compose.yml
      ansible.builtin.find:
        paths: /opt/mimir
        patterns: "docker-compose.yml.*~"
      register: _compose_backups

    - name: Find backup files for runtime-overrides.yaml
      ansible.builtin.find:
        paths: /etc/mimir
        patterns: "runtime-overrides.yaml.*~"
      register: _overrides_backups

    - name: Assert config backups were created
      ansible.builtin.assert:
        that:
          - _mimir_backups.matched > 0
        fail_msg: "Template tasks must create backup files before overwriting"

    - name: Stat critical output files
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /etc/mimir/mimir.yaml
        - /etc/mimir/runtime-overrides.yaml
        - /opt/mimir/docker-compose.yml
        - /etc/grafana/provisioning/datasources/mimir.yml
        - /etc/mimir/rules/monitoring-stack.rules
      register: _critical_files

    - name: Assert all critical output files exist
      ansible.builtin.assert:
        that:
          - item.stat.exists
        fail_msg: "Critical file missing: {{ item.item }}"
      loop: "{{ _critical_files.results }}"
      loop_control:
        label: "{{ item.item }}"


    - name: Assert systemd unit contains required directives
      ansible.builtin.assert:
        that:
          - "'Requires=docker.service' in (systemd_service.content | b64decode)"
          - "'docker compose' in (systemd_service.content | b64decode)"
          - "'WorkingDirectory=' in (systemd_service.content | b64decode)"
          - "'Restart=on-failure' in (systemd_service.content | b64decode)"
          - "'RestartSec=10s' in (systemd_service.content | b64decode)"
        fail_msg: "Systemd unit must reference docker.service, use docker compose, and set WorkingDirectory + Restart=on-failure"

- name: Test fail-fast rejects default passwords
  hosts: testhost
  become: true
  gather_facts: false

  tasks:
    - name: Attempt role with default passwords and start_services=true
      block:
        - name: Run role with default credentials (should fail)
          ansible.builtin.include_role:
            name: horde_monitoring
          vars:
            horde_monitoring_install_mimir: true
            horde_monitoring_install_grafana: true
            horde_monitoring_configure_firewall: false
            horde_monitoring_configure_haproxy: false
            horde_monitoring_start_services: true
            horde_monitoring_host_filesystem_metrics_available: true
            horde_monitoring_s3_secret_key: "changeme-s3-secret"
            horde_monitoring_grafana_admin_password: "changeme"

        - name: Fail if role did not reject default passwords
          ansible.builtin.fail:
            msg: "Role should have failed with default passwords but did not"

      rescue:
        - name: Assert failure was specifically about default credentials
          ansible.builtin.assert:
            that:
              - ansible_failed_result.msg is defined
              - >-
                'default placeholder' in ansible_failed_result.msg or
                'changeme-s3-secret' in ansible_failed_result.msg or
                'changeme' in ansible_failed_result.msg
            fail_msg: >-
              Expected fail-fast password rejection but got an unexpected error:
              {{ ansible_failed_result.msg | default('(no message)') }}

        - name: Confirm expected failure occurred
          ansible.builtin.debug:
            msg: "PASS — Fail-fast correctly rejected default credentials"

- name: Test fail-fast requires host filesystem metrics declaration
  hosts: testhost
  become: true
  gather_facts: false

  tasks:
    - name: Attempt role with host disk alerts enabled but metrics flag unset
      block:
        - name: Run role with host disk alerts enabled and metrics flag false (should fail)
          ansible.builtin.include_role:
            name: horde_monitoring
          vars:
            horde_monitoring_install_mimir: false
            horde_monitoring_install_grafana: false
            horde_monitoring_install_alerting_rules: true
            horde_monitoring_start_services: true
            horde_monitoring_install_host_disk_alerts: true
            horde_monitoring_host_filesystem_metrics_available: false

        - name: Fail if role did not reject missing host filesystem metrics contract
          ansible.builtin.fail:
            msg: "Role should have failed when host disk alerts are enabled without host filesystem metrics"

      rescue:
        - name: Assert failure was specifically about host filesystem metrics prerequisite
          ansible.builtin.assert:
            that:
              - ansible_failed_result.msg is defined
              - >-
                'host_filesystem' in ansible_failed_result.msg or
                'horde_monitoring_host_filesystem_metrics_available' in ansible_failed_result.msg or
                'install_host_disk_alerts' in ansible_failed_result.msg
            fail_msg: >-
              Expected host filesystem metrics fail-fast but got an unexpected error:
              {{ ansible_failed_result.msg | default('(no message)') }}

        - name: Confirm expected host metrics prerequisite failure occurred
          ansible.builtin.debug:
            msg: "PASS — Fail-fast correctly enforced host filesystem metrics prerequisite"

# ---------------------------------------------------------------------------
# Play 3: Loki + Tempo integration tests
# ---------------------------------------------------------------------------
- name: Test horde_monitoring - Loki + Tempo enabled
  hosts: testhost
  become: true
  gather_facts: true

  vars:
    horde_monitoring_install_mimir: true
    horde_monitoring_install_grafana: true
    horde_monitoring_install_loki: true
    horde_monitoring_install_tempo: true
    horde_monitoring_install_pyroscope: true
    horde_monitoring_configure_firewall: false
    horde_monitoring_configure_haproxy: true
    horde_monitoring_configure_alertmanager_backend: true
    horde_monitoring_configure_stats_exporter_backend: true
    horde_monitoring_grafana_admin_password: "testpass123"
    horde_monitoring_application_tenant_id: "app-metrics"
    horde_monitoring_infrastructure_tenant_id: "infra-metrics"
    horde_monitoring_public_tenant_id: "public-metrics"
    horde_monitoring_start_services: false
    horde_monitoring_mimir_backup_enabled: false
    # Use git source for dashboards — release artifacts do not exist in CI
    horde_monitoring_grafana_dashboards_source: "git"

  pre_tasks:
    - name: Install HAProxy for config validation
      ansible.builtin.apt:
        name: haproxy
        state: present
        update_cache: true

    - name: Create HAProxy config directory for test
      ansible.builtin.file:
        path: /etc/haproxy
        state: directory
        mode: "0755"

    - name: Create stub HAProxy config for test
      ansible.builtin.copy:
        dest: /etc/haproxy/haproxy.cfg
        content: |
          global
              log /dev/log local0
          defaults
              mode http
              timeout connect 5s
              timeout client 50s
              timeout server 50s
        mode: "0644"

  roles:
    - role: horde_monitoring

  post_tasks:
    - name: Read rendered Docker Compose (loki/tempo)
      ansible.builtin.slurp:
        path: /opt/mimir/docker-compose.yml
      register: compose_lt

    - name: Assert Loki service is present in Compose
      ansible.builtin.assert:
        that:
          - "'loki:' in (compose_lt.content | b64decode)"
          - "'grafana/loki:3.4.2' in (compose_lt.content | b64decode)"
          - "'3100:3100' in (compose_lt.content | b64decode)"
          - "'loki.yaml:/etc/loki/loki.yaml:ro' in (compose_lt.content | b64decode)"
        fail_msg: "Docker Compose must contain a Loki service with pinned image tag and config mount"

    - name: Assert monitoring services have horde.logs labels
      ansible.builtin.assert:
        that:
          - "'horde.logs' in (compose_lt.content | b64decode)"
          - "'horde.app' in (compose_lt.content | b64decode)"
          - "'horde.component' in (compose_lt.content | b64decode)"
        fail_msg: "Monitoring compose services must have horde.logs/horde.app/horde.component labels"

    - name: Assert Tempo service is present in Compose
      ansible.builtin.assert:
        that:
          - "'tempo:' in (compose_lt.content | b64decode)"
          - "'grafana/tempo:2.7.1' in (compose_lt.content | b64decode)"
          - "'3200:3200' in (compose_lt.content | b64decode)"
          - "'4317:4317' in (compose_lt.content | b64decode)"
          - "'4318:4318' in (compose_lt.content | b64decode)"
          - "'tempo.yaml:/etc/tempo/tempo.yaml:ro' in (compose_lt.content | b64decode)"
        fail_msg: "Docker Compose must contain a Tempo service with pinned image tag and config mount"

    - name: Assert no :latest tags in Compose
      ansible.builtin.assert:
        that:
          - "':latest' not in (compose_lt.content | b64decode)"
        fail_msg: "No :latest tags allowed in Docker Compose"

    - name: Stat Loki config file
      ansible.builtin.stat:
        path: /etc/loki/loki.yaml
      register: _loki_config_stat

    - name: Assert Loki config exists with correct permissions
      ansible.builtin.assert:
        that:
          - _loki_config_stat.stat.exists
          - _loki_config_stat.stat.mode == '0640'
        fail_msg: "Loki config must exist as 0640"

    - name: Read Loki config
      ansible.builtin.slurp:
        path: /etc/loki/loki.yaml
      register: horde_monitoring_loki_config

    - name: Assert Loki config content
      ansible.builtin.assert:
        that:
          - "'auth_enabled: true' in (horde_monitoring_loki_config.content | b64decode)"
          - "'schema_config' in (horde_monitoring_loki_config.content | b64decode)"
          - "'tsdb' in (horde_monitoring_loki_config.content | b64decode)"
          - "'loki-chunks' in (horde_monitoring_loki_config.content | b64decode)"
          - "'retention_period' in (horde_monitoring_loki_config.content | b64decode)"

    - name: Stat Tempo config file
      ansible.builtin.stat:
        path: /etc/tempo/tempo.yaml
      register: _tempo_config_stat

    - name: Assert Tempo config exists with correct permissions
      ansible.builtin.assert:
        that:
          - _tempo_config_stat.stat.exists
          - _tempo_config_stat.stat.mode == '0640'
        fail_msg: "Tempo config must exist as 0640"

    - name: Read Tempo config
      ansible.builtin.slurp:
        path: /etc/tempo/tempo.yaml
      register: horde_monitoring_tempo_config

    - name: Assert Tempo config content
      ansible.builtin.assert:
        that:
          - "'distributor' in (horde_monitoring_tempo_config.content | b64decode)"
          - "'otlp' in (horde_monitoring_tempo_config.content | b64decode)"
          - "'tempo-traces' in (horde_monitoring_tempo_config.content | b64decode)"
          - "'block_retention' in (horde_monitoring_tempo_config.content | b64decode)"

    - name: Read Grafana datasources
      ansible.builtin.slurp:
        path: /etc/grafana/provisioning/datasources/mimir.yml
      register: horde_monitoring_grafana_ds_lt

    - name: Assert Loki datasources are provisioned
      ansible.builtin.assert:
        that:
          - "'loki-app' in (horde_monitoring_grafana_ds_lt.content | b64decode)"
          - "'loki-infra' in (horde_monitoring_grafana_ds_lt.content | b64decode)"
          - "'type: loki' in (horde_monitoring_grafana_ds_lt.content | b64decode)"
        fail_msg: "Grafana must have Loki datasources provisioned"

    - name: Assert Tempo datasource is provisioned
      ansible.builtin.assert:
        that:
          - "'type: tempo' in (horde_monitoring_grafana_ds_lt.content | b64decode)"
        fail_msg: "Grafana must have Tempo datasource provisioned"

    - name: Read alerting rules
      ansible.builtin.slurp:
        path: /etc/mimir/rules/monitoring-stack.rules
      register: alerting_rules_lt

    - name: Assert Loki alerting rules are present
      ansible.builtin.assert:
        that:
          - "'LokiDown' in (alerting_rules_lt.content | b64decode)"
          - "'LokiRequestErrors' in (alerting_rules_lt.content | b64decode)"
          - "'LokiIngestionStalled' in (alerting_rules_lt.content | b64decode)"
          - "'loki-health' in (alerting_rules_lt.content | b64decode)"
        fail_msg: "Alerting rules must include Loki health alerts"

    - name: Assert Tempo alerting rules are present
      ansible.builtin.assert:
        that:
          - "'TempoDown' in (alerting_rules_lt.content | b64decode)"
          - "'TempoRequestErrors' in (alerting_rules_lt.content | b64decode)"
          - "'TempoIngestionStalled' in (alerting_rules_lt.content | b64decode)"
          - "'tempo-health' in (alerting_rules_lt.content | b64decode)"
        fail_msg: "Alerting rules must include Tempo health alerts"

    - name: Assert Pyroscope alerting rules are present
      ansible.builtin.assert:
        that:
          - "'PyroscopeDown' in (alerting_rules_lt.content | b64decode)"
          - "'PyroscopeRequestErrors' in (alerting_rules_lt.content | b64decode)"
          - "'PyroscopeIngestionStalled' in (alerting_rules_lt.content | b64decode)"
          - "'pyroscope-health' in (alerting_rules_lt.content | b64decode)"
        fail_msg: "Alerting rules must include Pyroscope health alerts"

    - name: Assert Loki data directories exist
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /var/lib/loki
        - /var/lib/loki/index
        - /var/lib/loki/chunks
      register: _loki_dirs

    - name: Validate Loki directories
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.isdir
      loop: "{{ _loki_dirs.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Assert Tempo data directories exist
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /var/lib/tempo
        - /var/lib/tempo/wal
        - /var/lib/tempo/blocks
      register: _tempo_dirs

    - name: Validate Tempo directories
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.isdir
      loop: "{{ _tempo_dirs.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Assert Pyroscope service is present in Compose
      ansible.builtin.assert:
        that:
          - "'pyroscope:' in (compose_lt.content | b64decode)"
          - "'grafana/pyroscope:1.19.0' in (compose_lt.content | b64decode)"
          - "'4040:4040' in (compose_lt.content | b64decode)"
          - "'pyroscope.yaml:/etc/pyroscope/pyroscope.yaml:ro' in (compose_lt.content | b64decode)"
          - "'runtime-overrides.yaml:/etc/pyroscope/runtime-overrides.yaml:ro' in (compose_lt.content | b64decode)"
        fail_msg: "Docker Compose must contain a Pyroscope service with pinned image tag and runtime overrides mount"

    - name: Stat Pyroscope config file
      ansible.builtin.stat:
        path: /etc/pyroscope/pyroscope.yaml
      register: _pyroscope_config_stat

    - name: Assert Pyroscope config exists with correct permissions
      ansible.builtin.assert:
        that:
          - _pyroscope_config_stat.stat.exists
          - _pyroscope_config_stat.stat.mode == '0640'
        fail_msg: "Pyroscope config must exist as 0640"

    - name: Read Pyroscope config
      ansible.builtin.slurp:
        path: /etc/pyroscope/pyroscope.yaml
      register: horde_monitoring_pyroscope_config

    - name: Assert Pyroscope config content
      ansible.builtin.assert:
        that:
          - "'multitenancy_enabled: true' in (horde_monitoring_pyroscope_config.content | b64decode)"
          - "'pyroscope-data' in (horde_monitoring_pyroscope_config.content | b64decode)"
          - "'backend: s3' in (horde_monitoring_pyroscope_config.content | b64decode)"
          - "'runtime_config' in (horde_monitoring_pyroscope_config.content | b64decode)"
          - "'runtime-overrides.yaml' in (horde_monitoring_pyroscope_config.content | b64decode)"

    - name: Stat Pyroscope runtime overrides
      ansible.builtin.stat:
        path: /etc/pyroscope/runtime-overrides.yaml
      register: _pyroscope_overrides_stat

    - name: Assert Pyroscope runtime overrides exist
      ansible.builtin.assert:
        that:
          - _pyroscope_overrides_stat.stat.exists
          - _pyroscope_overrides_stat.stat.mode == '0640'
        fail_msg: "Pyroscope runtime overrides must exist as 0640"

    - name: Read Pyroscope runtime overrides
      ansible.builtin.slurp:
        path: /etc/pyroscope/runtime-overrides.yaml
      register: horde_monitoring_pyroscope_overrides

    - name: Assert Pyroscope per-tenant overrides
      ansible.builtin.assert:
        that:
          - "'app-metrics' in (horde_monitoring_pyroscope_overrides.content | b64decode)"
          - "'infra-metrics' in (horde_monitoring_pyroscope_overrides.content | b64decode)"
          - "'public-metrics' in (horde_monitoring_pyroscope_overrides.content | b64decode)"
          - "'compactor_blocks_retention_period' in (horde_monitoring_pyroscope_overrides.content | b64decode)"
        fail_msg: "Pyroscope must have per-tenant retention overrides"

    - name: Assert Pyroscope datasources are provisioned
      ansible.builtin.assert:
        that:
          - "'pyroscope-app' in (horde_monitoring_grafana_ds_lt.content | b64decode)"
          - "'pyroscope-infra' in (horde_monitoring_grafana_ds_lt.content | b64decode)"
          - "'grafana-pyroscope-datasource' in (horde_monitoring_grafana_ds_lt.content | b64decode)"
        fail_msg: "Grafana must have Pyroscope datasources provisioned"

    - name: Assert Pyroscope data directory exists
      ansible.builtin.stat:
        path: /var/lib/pyroscope
      register: _pyroscope_data_dir

    - name: Validate Pyroscope data directory
      ansible.builtin.assert:
        that:
          - _pyroscope_data_dir.stat.exists
          - _pyroscope_data_dir.stat.isdir

# ---------------------------------------------------------------------------
# Play 4: Verify Loki+Tempo are NOT present when disabled
# ---------------------------------------------------------------------------
- name: Test horde_monitoring - Loki + Tempo disabled (negative test)
  hosts: testhost
  become: true
  gather_facts: true

  vars:
    horde_monitoring_install_mimir: true
    horde_monitoring_install_grafana: true
    horde_monitoring_install_loki: false
    horde_monitoring_install_tempo: false
    horde_monitoring_configure_firewall: false
    horde_monitoring_configure_haproxy: false
    horde_monitoring_grafana_admin_password: "testpass123"
    horde_monitoring_start_services: false
    horde_monitoring_mimir_backup_enabled: false
    # Use git source for dashboards — release artifacts do not exist in CI
    horde_monitoring_grafana_dashboards_source: "git"

  roles:
    - role: horde_monitoring

  post_tasks:
    - name: Read Docker Compose (disabled loki/tempo)
      ansible.builtin.slurp:
        path: /opt/mimir/docker-compose.yml
      register: compose_disabled

    - name: Assert Loki and Tempo are NOT in Compose when disabled
      ansible.builtin.assert:
        that:
          - "'grafana/loki' not in (compose_disabled.content | b64decode)"
          - "'grafana/tempo' not in (compose_disabled.content | b64decode)"
        fail_msg: "Loki/Tempo should not appear in Compose when disabled"

    - name: Read alerting rules (disabled)
      ansible.builtin.slurp:
        path: /etc/mimir/rules/monitoring-stack.rules
      register: alerting_disabled

    - name: Assert Loki and Tempo alerts are NOT present when disabled
      ansible.builtin.assert:
        that:
          - "'LokiDown' not in (alerting_disabled.content | b64decode)"
          - "'TempoDown' not in (alerting_disabled.content | b64decode)"
        fail_msg: "Loki/Tempo alerts should not be present when those components are disabled"

    - name: Assert app and prometheus alerts are still present when Loki/Tempo disabled
      ansible.builtin.assert:
        that:
          - "'HordeExporterDown' in (alerting_disabled.content | b64decode)"
          - "'PrometheusTargetsMissing' in (alerting_disabled.content | b64decode)"
          - "'HostHighCpuLoad' in (alerting_disabled.content | b64decode)"
        fail_msg: "App, Prometheus, and host resource alerts must remain when Loki/Tempo are disabled"

# ---------------------------------------------------------------------------
# Play 5: Verify PostgreSQL alerts are included when enabled
# ---------------------------------------------------------------------------
- name: Test horde_monitoring - PostgreSQL alerts enabled
  hosts: testhost
  become: true
  gather_facts: true

  vars:
    horde_monitoring_install_mimir: true
    horde_monitoring_install_grafana: false
    horde_monitoring_install_loki: false
    horde_monitoring_install_tempo: false
    horde_monitoring_configure_firewall: false
    horde_monitoring_configure_haproxy: false
    horde_monitoring_grafana_admin_password: "testpass123"
    horde_monitoring_start_services: false
    horde_monitoring_mimir_backup_enabled: false
    horde_monitoring_install_postgres_alerts: true

  roles:
    - role: horde_monitoring

  post_tasks:
    - name: Read alerting rules (postgres enabled)
      ansible.builtin.slurp:
        path: /etc/mimir/rules/monitoring-stack.rules
      register: alerting_postgres

    - name: Assert PostgreSQL alerting rules are present
      ansible.builtin.assert:
        that:
          - "'postgres-health' in (alerting_postgres.content | b64decode)"
          - "'PostgresExporterDown' in (alerting_postgres.content | b64decode)"
          - "'PostgresDown' in (alerting_postgres.content | b64decode)"
          - "'PostgresTooManyConnections' in (alerting_postgres.content | b64decode)"
          - "'PostgresDeadlocks' in (alerting_postgres.content | b64decode)"
          - "'PostgresSlowQueries' in (alerting_postgres.content | b64decode)"
          - "'PostgresReplicationLag' in (alerting_postgres.content | b64decode)"
        fail_msg: "Alerting rules must include PostgreSQL health alerts when postgres alerts are enabled"
