---
- name: Verify HAProxy ownership scopes and delegated execution
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Read ai_horde haproxy task file for shared execution patterns
      ansible.builtin.set_fact:
        _haproxy_tasks_file_content: "{{ lookup('ansible.builtin.file', playbook_dir ~ '/../../roles/ai_horde/tasks/haproxy.yml') }}"

    - name: Assert native conf.d insertion does not use global handler flush
      ansible.builtin.assert:
        that:
          - "'meta: flush_handlers' not in _haproxy_tasks_file_content"
          - "'conf.d' in _haproxy_tasks_file_content"
          - "'_haproxy_confd_bootstrap' in _haproxy_tasks_file_content"
        fail_msg: >-
          Conf logic must deploy to conf.d natively and must not use global flush_handlers.

    - name: Read ai_horde native task file for ownership-performance guards
      ansible.builtin.set_fact:
        _native_tasks_file_content: "{{ lookup('ansible.builtin.file', playbook_dir ~ '/../../roles/ai_horde/tasks/main.yml') }}"

    - name: Ensure native processes do not bounce unrelated infrastructure components
      ansible.builtin.assert:
        that:
          - "'horde_monitoring' not in _native_tasks_file_content"
          - "'loki' not in _native_tasks_file_content"
          - "'mimir' not in _native_tasks_file_content"
        fail_msg: >-
          ai_horde native tasks must not touch or interact with unrelated infrastructure components.
