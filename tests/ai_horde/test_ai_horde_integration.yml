---
# requires: docker-daemon
# Test playbook: AI-Horde role (integration, start service)
#
# Play 1: Positive test — render and start service with valid inputs

- name: Test AI-Horde role integration (positive)
  hosts: testhost
  become: true
  gather_facts: true
  vars:
    ai_horde_start_services: true
    ai_horde_postgres_password: "test-pg-password"
    ai_horde_secret_key: "test-secret-key-12345"
    ai_horde_port: 7001
    ai_horde_listen: "127.0.0.1"
    ai_horde_replicas: 2
    ai_horde_admins: ["test_admin#1"]
    ai_horde_env_overrides:
      KUDOS_TRUST_THRESHOLD: "100"
    ai_horde_otel_service_name: "test-horde-svc"
    ai_horde_pyroscope_enabled: "false"
    # Integration test uses embedded datastores — mark as non-production
    ai_horde_embedded_postgres_enabled: true
    ai_horde_embedded_redis_enabled: true
    ai_horde_deployment_environment: "local-deploy"
  roles:
    - ai_horde
  post_tasks:
    - name: Stat docker-compose.yml
      ansible.builtin.stat:
        path: /opt/ai-horde/docker-compose.yml
      register: _compose

    - name: Assert docker-compose.yml exists with correct permissions
      ansible.builtin.assert:
        that:
          - _compose.stat.exists
          - _compose.stat.mode == "0600"
          - _compose.stat.pw_name == "root"

    - name: Read docker-compose.yml
      ansible.builtin.slurp:
        src: /opt/ai-horde/docker-compose.yml
      register: _compose_content

    - name: Assert compose has health checks
      ansible.builtin.assert:
        that:
          - "'healthcheck' in _compose_content.content | b64decode"
          - "'pg_isready' in _compose_content.content | b64decode"
          - "'redis-cli' in _compose_content.content | b64decode"
          - "'heartbeat' in _compose_content.content | b64decode"

    - name: Assert AI-Horde healthcheck uses Python stdlib (not curl)
      ansible.builtin.assert:
        that:
          - "'python' in _compose_content.content | b64decode"
          - "'urllib.request' in _compose_content.content | b64decode"
          - "'curl' not in _compose_content.content | b64decode"
        fail_msg: >-
          AI-Horde compose healthcheck must use Python stdlib urllib
          (available in runtime image), not curl (not installed).

    - name: Assert compose has log rotation
      ansible.builtin.assert:
        that:
          - "'max-size' in _compose_content.content | b64decode"
          - "'max-file' in _compose_content.content | b64decode"

    - name: Assert compose has horde.logs labels for log collection
      ansible.builtin.assert:
        that:
          - "'horde.logs' in _compose_content.content | b64decode"
          - "'horde.app' in _compose_content.content | b64decode"
          - "'horde.component' in _compose_content.content | b64decode"
        fail_msg: "AI-Horde compose services must have horde.logs/horde.app/horde.component labels for Alloy log collection"

    - name: Assert compose has depends_on with health condition
      ansible.builtin.assert:
        that:
          - "'service_healthy' in _compose_content.content | b64decode"

    - name: Assert compose does not publish DB/Redis ports to host
      ansible.builtin.assert:
        that:
          - "'5432:5432' not in _compose_content.content | b64decode"
          - "'6379:6379' not in _compose_content.content | b64decode"
        fail_msg: "Compose must keep PostgreSQL and Redis internal-only in docker mode"

    - name: Assert compose does not enable Postgres trust auth
      ansible.builtin.assert:
        that:
          - "'POSTGRES_HOST_AUTH_METHOD: trust' not in _compose_content.content | b64decode"
        fail_msg: "Compose must not set POSTGRES_HOST_AUTH_METHOD=trust"

    - name: Assert compose binds to 127.0.0.1 and allocates a host port range for replicas
      ansible.builtin.assert:
        that:
          - "'127.0.0.1:7001-7002:7001' in _compose_content.content | b64decode"
          - "'deploy:' not in _compose_content.content | b64decode"

    - name: Assert compose uses image tag
      ansible.builtin.assert:
        that:
          - "'image: ghcr.io/haidra-org/ai-horde:main' in _compose_content.content | b64decode"

    - name: Assert compose configures host gateway routing
      ansible.builtin.assert:
        that:
          - "'host.docker.internal:host-gateway' in _compose_content.content | b64decode"

    - name: Stat .env file
      ansible.builtin.stat:
        path: /opt/ai-horde/.env
      register: _env

    - name: Assert .env has secure permissions
      ansible.builtin.assert:
        that:
          - _env.stat.exists
          - _env.stat.mode == "0600"
          - _env.stat.pw_name == "root"

    - name: Read .env file
      ansible.builtin.slurp:
        src: /opt/ai-horde/.env
      register: _env_content

    - name: Assert .env renders secrets properly
      ansible.builtin.assert:
        that:
          - "'test-pg-password' in _env_content.content | b64decode"
          - "'test-secret-key-12345' in _env_content.content | b64decode"

    - name: Assert .env renders standard configs and overrides
      ansible.builtin.assert:
        that:
          - "'ADMINS=' in _env_content.content | b64decode"
          - "'test_admin#1' in _env_content.content | b64decode"
          - "'KUDOS_TRUST_THRESHOLD=\"100\"' in _env_content.content | b64decode"

    - name: Assert .env renders telemetry config correctly
      ansible.builtin.assert:
        that:
          - "'OTEL_SERVICE_NAME=\"test-horde-svc\"' in _env_content.content | b64decode"
          - "'PYROSCOPE_ENABLED=\"false\"' in _env_content.content | b64decode"
          - "'OTEL_EXPORTER_OTLP_ENDPOINT=\"http://host.docker.internal:4318\"' in _env_content.content | b64decode"
          - "'WORKER_THREADS=' not in _env_content.content | b64decode"
          - "'MAX_CONNECTIONS=' not in _env_content.content | b64decode"

- name: Test AI-Horde role fail-fast (missing postgres password)
  hosts: testhost
  become: true
  vars:
    ai_horde_start_services: false
    # ai_horde_postgres_password deliberately omitted
    ai_horde_secret_key: "test-secret-key"
  tasks:
    - name: Expect role to fail on missing postgres password
      block:
        - name: Apply role (should fail)
          ansible.builtin.include_role:
            name: ai_horde

        - name: Fail if role did not error
          ansible.builtin.fail:
            msg: "Role should have failed due to missing ai_horde_postgres_password"
      rescue:
        - name: Assert failure was specifically about missing postgres password
          ansible.builtin.assert:
            that:
              - ansible_failed_result.msg is defined
              - "'ai_horde_postgres_password' in ansible_failed_result.msg"
            fail_msg: >-
              Expected missing ai_horde_postgres_password failure, got:
              {{ ansible_failed_result.msg | default('(no message)') }}

        - name: Confirm fail-fast was correctly enforced
          ansible.builtin.debug:
            msg: "PASS - correctly rejected missing ai_horde_postgres_password"

