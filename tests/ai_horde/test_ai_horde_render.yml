---
# Test playbook: AI-Horde role (config rendering only, no service start)
#
# Play 1: Positive test — render with valid inputs, assert on output files
# Play 2: Negative test — missing postgres password triggers fail-fast
# Play 3: Negative test — missing secret key triggers fail-fast
#
# Build-on-start toggle contract is owned by test_ai_horde_docker_build_toggle.yml.

- name: Test AI-Horde role render (positive)
  hosts: testhost
  become: true
  vars:
    ai_horde_deploy_mode: docker
    ai_horde_start_services: false
    ai_horde_postgres_password: "test-pg-password"
    ai_horde_secret_key: "test-secret-key-12345"
    ai_horde_port: 7001
    ai_horde_listen: "127.0.0.1"
    ai_horde_admins: ["test_admin#1"]
    ai_horde_env_overrides:
      KUDOS_TRUST_THRESHOLD: "100"
  roles:
    - ai_horde
  post_tasks:
    - name: Stat docker-compose.yml
      ansible.builtin.stat:
        path: /opt/ai-horde/docker-compose.yml
      register: _compose

    - name: Assert docker-compose.yml exists with correct permissions
      ansible.builtin.assert:
        that:
          - _compose.stat.exists
          - _compose.stat.mode == "0600"
          - _compose.stat.pw_name == "root"

    - name: Read docker-compose.yml
      ansible.builtin.slurp:
        src: /opt/ai-horde/docker-compose.yml
      register: _compose_content

    - name: Assert compose has health checks
      ansible.builtin.assert:
        that:
          - "'healthcheck' in _compose_content.content | b64decode"
          - "'pg_isready' in _compose_content.content | b64decode"
          - "'redis-cli' in _compose_content.content | b64decode"
          - "'heartbeat' in _compose_content.content | b64decode"

    - name: Assert AI-Horde healthcheck uses Python stdlib (not curl)
      ansible.builtin.assert:
        that:
          - "'python' in _compose_content.content | b64decode"
          - "'urllib.request' in _compose_content.content | b64decode"
          - "'curl' not in _compose_content.content | b64decode"
        fail_msg: >-
          AI-Horde compose healthcheck must use Python stdlib urllib
          (available in runtime image), not curl (not installed).

    - name: Assert compose has log rotation
      ansible.builtin.assert:
        that:
          - "'max-size' in _compose_content.content | b64decode"
          - "'max-file' in _compose_content.content | b64decode"

    - name: Assert compose has depends_on with health condition
      ansible.builtin.assert:
        that:
          - "'service_healthy' in _compose_content.content | b64decode"

    - name: Assert compose does not publish DB/Redis ports to host
      ansible.builtin.assert:
        that:
          - "'5432:5432' not in _compose_content.content | b64decode"
          - "'6379:6379' not in _compose_content.content | b64decode"
        fail_msg: "Compose must keep PostgreSQL and Redis internal-only in docker mode"

    - name: Assert compose does not enable Postgres trust auth
      ansible.builtin.assert:
        that:
          - "'POSTGRES_HOST_AUTH_METHOD: trust' not in _compose_content.content | b64decode"
        fail_msg: "Compose must not set POSTGRES_HOST_AUTH_METHOD=trust"

    - name: Assert compose binds to 127.0.0.1
      ansible.builtin.assert:
        that:
          - "'127.0.0.1:7001:7001' in _compose_content.content | b64decode"

    - name: Assert compose uses build context
      ansible.builtin.assert:
        that:
          - "'build:' in _compose_content.content | b64decode"
          - "'context:' in _compose_content.content | b64decode"
          - "'Dockerfile' in _compose_content.content | b64decode"

    - name: Stat .env file
      ansible.builtin.stat:
        path: /opt/ai-horde/.env
      register: _env

    - name: Assert .env has secure permissions
      ansible.builtin.assert:
        that:
          - _env.stat.exists
          - _env.stat.mode == "0600"
          - _env.stat.pw_name == "root"

    - name: Read .env file
      ansible.builtin.slurp:
        src: /opt/ai-horde/.env
      register: _env_content

    - name: Assert .env has required variables
      ansible.builtin.assert:
        that:
          - "'PROFILE=docker' in _env_content.content | b64decode"
          - "'REDIS_IP=redis' in _env_content.content | b64decode"
          - "'USE_SQLITE=0' in _env_content.content | b64decode"
          - "'POSTGRES_URL=postgres/postgres' in _env_content.content | b64decode"
          - "'POSTGRES_PASS=\"test-pg-password\"' in _env_content.content | b64decode"
          - "'secret_key=\"test-secret-key-12345\"' in _env_content.content | b64decode"
          - "'test_admin#1' in _env_content.content | b64decode"

    - name: Assert env overrides are merged
      ansible.builtin.assert:
        that:
          - "'KUDOS_TRUST_THRESHOLD=\"100\"' in _env_content.content | b64decode"

    - name: Stat systemd unit
      ansible.builtin.stat:
        path: /etc/systemd/system/ai-horde.service
      register: _service

    - name: Assert systemd unit exists
      ansible.builtin.assert:
        that:
          - _service.stat.exists

    - name: Read systemd unit
      ansible.builtin.slurp:
        src: /etc/systemd/system/ai-horde.service
      register: _service_content

    - name: Assert systemd unit has correct directives
      ansible.builtin.assert:
        that:
          - "'docker compose up' in _service_content.content | b64decode"
          - "'docker compose down' in _service_content.content | b64decode"
          - "'TimeoutStartSec=300' in _service_content.content | b64decode"
          - "'Restart=on-failure' in _service_content.content | b64decode"
          - "'Requires=docker.service' in _service_content.content | b64decode"

    - name: Assert systemd unit defaults to fast start path (no implicit build)
      ansible.builtin.assert:
        that:
          - "'ExecStartPre=/usr/bin/docker compose build --pull' not in _service_content.content | b64decode"

- name: Test AI-Horde role fail-fast (missing postgres password)
  hosts: testhost
  become: true
  vars:
    ai_horde_start_services: false
    # ai_horde_postgres_password deliberately omitted
    ai_horde_secret_key: "test-secret-key"
  tasks:
    - name: Expect role to fail on missing postgres password
      block:
        - name: Apply role (should fail)
          ansible.builtin.include_role:
            name: ai_horde

        - name: Fail if role did not error
          ansible.builtin.fail:
            msg: "Role should have failed due to missing ai_horde_postgres_password"
      rescue:
        - name: Assert failure was specifically about missing postgres password
          ansible.builtin.assert:
            that:
              - ansible_failed_result.msg is defined
              - "'ai_horde_postgres_password' in ansible_failed_result.msg"
            fail_msg: >-
              Expected missing ai_horde_postgres_password failure, got:
              {{ ansible_failed_result.msg | default('(no message)') }}

        - name: Confirm fail-fast was correctly enforced
          ansible.builtin.debug:
            msg: "PASS — correctly rejected missing ai_horde_postgres_password"

- name: Test AI-Horde role fail-fast (missing secret key)
  hosts: testhost
  become: true
  vars:
    ai_horde_start_services: false
    ai_horde_postgres_password: "test-password"
    # ai_horde_secret_key deliberately omitted
  tasks:
    - name: Expect role to fail on missing secret key
      block:
        - name: Apply role (should fail)
          ansible.builtin.include_role:
            name: ai_horde

        - name: Fail if role did not error
          ansible.builtin.fail:
            msg: "Role should have failed due to missing ai_horde_secret_key"
      rescue:
        - name: Assert failure was specifically about missing secret key
          ansible.builtin.assert:
            that:
              - ansible_failed_result.msg is defined
              - "'ai_horde_secret_key' in ansible_failed_result.msg"
            fail_msg: >-
              Expected missing ai_horde_secret_key failure, got:
              {{ ansible_failed_result.msg | default('(no message)') }}

        - name: Confirm fail-fast was correctly enforced
          ansible.builtin.debug:
            msg: "PASS — correctly rejected missing ai_horde_secret_key"
