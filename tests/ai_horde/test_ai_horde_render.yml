---
# Test playbook: AI-Horde role (config rendering only, no service start)
#
# Play 1: Positive test — render with valid inputs, assert on output files
# Play 2: Negative test — missing postgres password triggers fail-fast
# Play 3: Negative test — missing secret key triggers fail-fast

- name: Test AI-Horde role render (positive)
  hosts: testhost
  become: true
  vars:
    ai_horde_start_services: false
    ai_horde_postgres_password: "test-pg-password"
    ai_horde_secret_key: "test-secret-key-12345"
    ai_horde_port: 7001
    ai_horde_listen: "127.0.0.1"
    ai_horde_replicas: 2
    ai_horde_admins: ["test_admin#1"]
    ai_horde_env_overrides:
      KUDOS_TRUST_THRESHOLD: "100"
    ai_horde_otel_service_name: "test-horde-svc"
    ai_horde_pyroscope_enabled: "false"
    # Embedded datastores enabled — use local-deploy environment to avoid
    # the production fail-fast guard.
    ai_horde_embedded_postgres_enabled: true
    ai_horde_embedded_redis_enabled: true
    ai_horde_deployment_environment: "local-deploy"
  roles:
    - ai_horde
  post_tasks:
    - name: Stat docker-compose.yml
      ansible.builtin.stat:
        path: /opt/ai-horde/docker-compose.yml
      register: _compose

    - name: Assert docker-compose.yml exists with correct permissions
      ansible.builtin.assert:
        that:
          - _compose.stat.exists
          - _compose.stat.mode == "0600"
          - _compose.stat.pw_name == "root"

    - name: Read docker-compose.yml
      ansible.builtin.slurp:
        src: /opt/ai-horde/docker-compose.yml
      register: _compose_content

    - name: Assert compose has health checks
      ansible.builtin.assert:
        that:
          - "'healthcheck' in _compose_content.content | b64decode"
          - "'pg_isready' in _compose_content.content | b64decode"
          - "'redis-cli' in _compose_content.content | b64decode"
          - "'heartbeat' in _compose_content.content | b64decode"

    - name: Assert AI-Horde healthcheck uses Python stdlib (not curl)
      ansible.builtin.assert:
        that:
          - "'python' in _compose_content.content | b64decode"
          - "'urllib.request' in _compose_content.content | b64decode"
          - "'curl' not in _compose_content.content | b64decode"
        fail_msg: >-
          AI-Horde compose healthcheck must use Python stdlib urllib
          (available in runtime image), not curl (not installed).

    - name: Assert compose passes waitress CLI args via command override
      ansible.builtin.assert:
        that:
          - "'--waitress_threads' in _compose_content.content | b64decode"
          - "'--waitress_connection_limit' in _compose_content.content | b64decode"
        fail_msg: "Compose must pass waitress tuning as CLI args (not env vars)"

    - name: Assert compose uses journald log driver
      ansible.builtin.assert:
        that:
          - "'journald' in _compose_content.content | b64decode"
        fail_msg: "Log driver must be journald to avoid double-writing (Alloy reads from journal)"

    - name: Assert compose has journald tag for log identification
      ansible.builtin.assert:
        that:
          - "'tag' in _compose_content.content | b64decode"

    - name: Assert compose has horde.logs labels for log collection
      ansible.builtin.assert:
        that:
          - "'horde.logs' in _compose_content.content | b64decode"
          - "'horde.app' in _compose_content.content | b64decode"
          - "'horde.component' in _compose_content.content | b64decode"
        fail_msg: "AI-Horde compose services must have horde.logs/horde.app/horde.component labels for Alloy log collection"

    - name: Assert compose has depends_on with health condition
      ansible.builtin.assert:
        that:
          - "'service_healthy' in _compose_content.content | b64decode"

    - name: Assert compose configures pg_cron for the application database
      ansible.builtin.assert:
        that:
          - "'cron.database_name=aihorde' in _compose_content.content | b64decode"
        fail_msg: "Compose must set cron.database_name to the application DB so pg_cron extension can be created"

    - name: Assert compose does not publish DB/Redis ports to host
      ansible.builtin.assert:
        that:
          - "'5432:5432' not in _compose_content.content | b64decode"
          - "'6379:6379' not in _compose_content.content | b64decode"
        fail_msg: "Compose must keep PostgreSQL and Redis internal-only in docker mode"

    - name: Assert compose does not enable Postgres trust auth
      ansible.builtin.assert:
        that:
          - "'POSTGRES_HOST_AUTH_METHOD: trust' not in _compose_content.content | b64decode"
        fail_msg: "Compose must not set POSTGRES_HOST_AUTH_METHOD=trust"

    - name: Assert compose binds to 127.0.0.1 and allocates a host port range for replicas
      ansible.builtin.assert:
        that:
          - "'127.0.0.1:7001-7002:7001' in _compose_content.content | b64decode"
          - "'deploy:' not in _compose_content.content | b64decode"

    - name: Assert compose uses image tag
      ansible.builtin.assert:
        that:
          - "'image: ghcr.io/haidra-org/ai-horde:main' in _compose_content.content | b64decode"

    - name: Assert compose configures host gateway routing
      ansible.builtin.assert:
        that:
          - "'host.docker.internal:host-gateway' in _compose_content.content | b64decode"

    - name: Stat .env file
      ansible.builtin.stat:
        path: /opt/ai-horde/.env
      register: _env

    - name: Assert .env has secure permissions
      ansible.builtin.assert:
        that:
          - _env.stat.exists
          - _env.stat.mode == "0600"
          - _env.stat.pw_name == "root"

    - name: Read .env file
      ansible.builtin.slurp:
        src: /opt/ai-horde/.env
      register: _env_content

    - name: Assert .env renders secrets properly
      ansible.builtin.assert:
        that:
          - "'test-pg-password' in _env_content.content | b64decode"
          - "'test-secret-key-12345' in _env_content.content | b64decode"

    - name: Assert .env renders standard configs and overrides
      ansible.builtin.assert:
        that:
          - "'ADMINS=' in _env_content.content | b64decode"
          - "'test_admin#1' in _env_content.content | b64decode"
          - "'KUDOS_TRUST_THRESHOLD=\"100\"' in _env_content.content | b64decode"

    - name: Assert .env renders telemetry config correctly
      ansible.builtin.assert:
        that:
          - "'OTEL_SERVICE_NAME=\"test-horde-svc\"' in _env_content.content | b64decode"
          - "'PYROSCOPE_ENABLED=\"false\"' in _env_content.content | b64decode"
          - "'OTEL_EXPORTER_OTLP_ENDPOINT=\"http://host.docker.internal:4318\"' in _env_content.content | b64decode"

    - name: Assert .env does not contain HAProxy bridge auth headers
      ansible.builtin.assert:
        that:
          - "'OTEL_EXPORTER_OTLP_HEADERS=' not in _env_content.content | b64decode"
        fail_msg: "OTLP goes direct to Alloy — no auth headers needed"

    - name: Assert .env does not contain stale env var names
      ansible.builtin.assert:
        that:
          - "'WORKER_THREADS=' not in _env_content.content | b64decode"
          - "'MAX_CONNECTIONS=' not in _env_content.content | b64decode"
        fail_msg: "Waitress tuning is passed via compose command args, not env vars"

    - name: Assert .env uses variable for REDIS_SERVERS (not hardcoded)
      ansible.builtin.assert:
        that:
          - "'REDIS_SERVERS=' in _env_content.content | b64decode"
          - "'REDIS_IP=' in _env_content.content | b64decode"

    - name: Assert OTLP bridge config was NOT rendered (removed)
      ansible.builtin.stat:
        path: /etc/haproxy/conf.d/ai-horde-otlp-bridge.cfg
      register: _otlp_bridge

    - name: Assert OTLP bridge is absent
      ansible.builtin.assert:
        that:
          - not _otlp_bridge.stat.exists
        fail_msg: "OTLP bridge HAProxy snippet should not exist — containers reach Alloy directly"

- name: Test AI-Horde role fail-fast (missing postgres password)
  hosts: testhost
  become: true
  vars:
    ai_horde_start_services: false
    # ai_horde_postgres_password deliberately omitted
    ai_horde_secret_key: "test-secret-key"
  tasks:
    - name: Expect role to fail on missing postgres password
      block:
        - name: Apply role (should fail)
          ansible.builtin.include_role:
            name: ai_horde

        - name: Fail if role did not error
          ansible.builtin.fail:
            msg: "Role should have failed due to missing ai_horde_postgres_password"
      rescue:
        - name: Assert failure was specifically about missing postgres password
          ansible.builtin.assert:
            that:
              - ansible_failed_result.msg is defined
              - "'ai_horde_postgres_password' in ansible_failed_result.msg"
            fail_msg: >-
              Expected missing ai_horde_postgres_password failure, got:
              {{ ansible_failed_result.msg | default('(no message)') }}

        - name: Confirm fail-fast was correctly enforced
          ansible.builtin.debug:
            msg: "PASS - correctly rejected missing ai_horde_postgres_password"

- name: Test AI-Horde role fail-fast (missing secret key)
  hosts: testhost
  become: true
  vars:
    ai_horde_start_services: false
    ai_horde_postgres_password: "test-password"
    # ai_horde_secret_key deliberately omitted
  tasks:
    - name: Expect role to fail on missing secret key
      block:
        - name: Apply role (should fail)
          ansible.builtin.include_role:
            name: ai_horde

        - name: Fail if role did not error
          ansible.builtin.fail:
            msg: "Role should have failed due to missing ai_horde_secret_key"
      rescue:
        - name: Assert failure was specifically about missing secret key
          ansible.builtin.assert:
            that:
              - ansible_failed_result.msg is defined
              - "'ai_horde_secret_key' in ansible_failed_result.msg"
            fail_msg: >-
              Expected missing ai_horde_secret_key failure, got:
              {{ ansible_failed_result.msg | default('(no message)') }}

        - name: Confirm fail-fast was correctly enforced
          ansible.builtin.debug:
            msg: "PASS - correctly rejected missing ai_horde_secret_key"

# ---------------------------------------------------------------------------
# Play 4: Guard — production environment + embedded datastores = fail
# ---------------------------------------------------------------------------
- name: Test AI-Horde guard (production + embedded datastores)
  hosts: testhost
  become: true
  vars:
    ai_horde_start_services: false
    ai_horde_postgres_password: "test-pg-password"
    ai_horde_secret_key: "test-secret-key-12345"
    ai_horde_env_overrides:
      KUDOS_TRUST_THRESHOLD: "100"
    # Embedded datastores (defaults) in production-tagged deployment = must fail
    ai_horde_embedded_postgres_enabled: true
    ai_horde_embedded_redis_enabled: true
    ai_horde_deployment_environment: "production"
    ai_horde_allow_embedded_datastores_in_production: false
  tasks:
    - name: Expect role to fail on production + embedded datastores
      block:
        - name: Apply role (should fail)
          ansible.builtin.include_role:
            name: ai_horde

        - name: Fail if role did not error
          ansible.builtin.fail:
            msg: "Role should have failed: production + embedded datastores without override"
      rescue:
        - name: Assert failure message describes the production datastore policy
          ansible.builtin.assert:
            that:
              - ansible_failed_result.msg is defined
              - "'embedded' in ansible_failed_result.msg or 'production' in ansible_failed_result.msg"
            fail_msg: >-
              Expected production+embedded guard failure, got:
              {{ ansible_failed_result.msg | default('(no message)') }}

        - name: Confirm production guard was correctly enforced
          ansible.builtin.debug:
            msg: "PASS - correctly rejected embedded datastores in production"

# ---------------------------------------------------------------------------
# Play 5: Guard — ai_horde_data_dir set to a well-known PostgreSQL path
# ---------------------------------------------------------------------------
- name: Test AI-Horde guard (data_dir is a PostgreSQL system path)
  hosts: testhost
  become: true
  vars:
    ai_horde_start_services: false
    ai_horde_postgres_password: "test-pg-password"
    ai_horde_secret_key: "test-secret-key-12345"
    ai_horde_env_overrides:
      KUDOS_TRUST_THRESHOLD: "100"
    ai_horde_deployment_environment: "local-deploy"
    # Setting data_dir to a well-known PostgreSQL system path must fail
    ai_horde_data_dir: "/var/lib/postgresql/data"
  tasks:
    - name: Expect role to fail on unsafe data_dir
      block:
        - name: Apply role (should fail)
          ansible.builtin.include_role:
            name: ai_horde

        - name: Fail if role did not error
          ansible.builtin.fail:
            msg: "Role should have failed: ai_horde_data_dir is a PostgreSQL system path"
      rescue:
        - name: Assert failure message describes the data_dir safety policy
          ansible.builtin.assert:
            that:
              - ansible_failed_result.msg is defined
              - "'ai_horde_data_dir' in ansible_failed_result.msg"
            fail_msg: >-
              Expected data_dir safety guard failure, got:
              {{ ansible_failed_result.msg | default('(no message)') }}

        - name: Confirm data_dir guard was correctly enforced
          ansible.builtin.debug:
            msg: "PASS - correctly rejected PostgreSQL system path as ai_horde_data_dir"

# ---------------------------------------------------------------------------
# Play 6: External mode render — embedded=false, external hosts configured
# ---------------------------------------------------------------------------
- name: Test AI-Horde role render (external datastores)
  hosts: testhost
  become: true
  vars:
    ai_horde_start_services: false
    # Use a separate base_dir to avoid clobbering the embedded-mode render above
    ai_horde_base_dir: /opt/ai-horde-ext-test
    ai_horde_data_dir: /tmp/ai-horde-ext-test/data
    ai_horde_postgres_password: "test-pg-password"
    ai_horde_secret_key: "test-secret-key-12345"
    ai_horde_env_overrides:
      KUDOS_TRUST_THRESHOLD: "100"
    ai_horde_deployment_environment: "production"
    # External mode: disable embedded datastores, point at external hosts
    ai_horde_embedded_postgres_enabled: false
    ai_horde_embedded_redis_enabled: false
    ai_horde_postgres_host: "db.internal.example.com"
    ai_horde_redis_host: "cache.internal.example.com"
  roles:
    - ai_horde
  post_tasks:
    - name: Read docker-compose.yml (external mode)
      ansible.builtin.slurp:
        src: /opt/ai-horde-ext-test/docker-compose.yml
      register: _compose_ext

    - name: Assert compose does NOT contain embedded postgres service
      ansible.builtin.assert:
        that:
          - "'pg_isready' not in _compose_ext.content | b64decode"
          - "'POSTGRES_USER' not in _compose_ext.content | b64decode"
        fail_msg: "Compose must not contain embedded postgres service when ai_horde_embedded_postgres_enabled is false"

    - name: Assert compose does NOT contain embedded redis service
      ansible.builtin.assert:
        that:
          - "'redis-cli' not in _compose_ext.content | b64decode"
          - "'aihorde-redis' not in _compose_ext.content | b64decode"
        fail_msg: "Compose must not contain embedded redis service when ai_horde_embedded_redis_enabled is false"

    - name: Assert compose does NOT have service_healthy depends_on for datastores
      ansible.builtin.assert:
        that:
          - "'service_healthy' not in _compose_ext.content | b64decode"
        fail_msg: "Compose must not have service_healthy depends_on when both datastores are external"

    - name: Read .env file (external mode)
      ansible.builtin.slurp:
        src: /opt/ai-horde-ext-test/.env
      register: _env_ext

    - name: Assert .env uses external postgres and redis hostnames
      ansible.builtin.assert:
        that:
          - "'db.internal.example.com' in _env_ext.content | b64decode"
          - "'cache.internal.example.com' in _env_ext.content | b64decode"
        fail_msg: "External host names must appear in .env when embedded datastores are disabled"
