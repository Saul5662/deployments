# ── HAProxy mode tests (Tier 1: safe_edit, Tier 2: standalone) ──

- name: Test AI-Horde role native render — Tier 2 standalone HAProxy mode
  hosts: testhost
  become: true
  vars:
    ai_horde_deploy_mode: native
    ai_horde_start_services: false
    ai_horde_base_dir: "/tmp/ai-horde-standalone-render"
    ai_horde_postgres_password: "test-pg-password"
    ai_horde_secret_key: "test-secret-key-12345"
    ai_horde_port: 7001
    ai_horde_instance_count: 2
    ai_horde_install_haproxy: true
    ai_horde_haproxy_mode: standalone
    ai_horde_haproxy_port: 18080
    ai_horde_haproxy_config_path: "/tmp/standalone-live-haproxy-test.cfg"
  pre_tasks:
    - name: Ensure standalone live HAProxy config path is absent before role run
      ansible.builtin.file:
        path: /tmp/standalone-live-haproxy-test.cfg
        state: absent
  roles:
    - ai_horde
  post_tasks:
    - name: Assert standalone render-only mode did not touch live config path
      ansible.builtin.stat:
        path: /tmp/standalone-live-haproxy-test.cfg
      register: _haproxy_standalone_live

    - name: Verify live standalone HAProxy config path remains untouched
      ansible.builtin.assert:
        that:
          - not _haproxy_standalone_live.stat.exists

    - name: Read rendered standalone HAProxy preview config
      ansible.builtin.slurp:
        src: /tmp/ai-horde-standalone-render/rendered/haproxy.cfg
      register: _haproxy_standalone

    - name: Assert standalone mode rendered full HAProxy preview config
      ansible.builtin.assert:
        that:
          - "'global' in _haproxy_standalone.content | b64decode"
          - "'defaults' in _haproxy_standalone.content | b64decode"
          - "'frontend ai_horde_front' in _haproxy_standalone.content | b64decode"
          - "'bind *:18080' in _haproxy_standalone.content | b64decode"
          - "'backend ai_horde_back' in _haproxy_standalone.content | b64decode"
          - "'server aihorde-7001' in _haproxy_standalone.content | b64decode"
          - "'server aihorde-7002' in _haproxy_standalone.content | b64decode"

