- name: Test AI-Horde role safe_edit render mode — Tier 1 safe_edit without existing config
  hosts: testhost
  become: true
  vars:
    ai_horde_deploy_mode: native
    ai_horde_start_services: false
    ai_horde_postgres_password: "test-password"
    ai_horde_secret_key: "test-secret-key"
    ai_horde_install_haproxy: true
    ai_horde_haproxy_mode: safe_edit
    ai_horde_haproxy_config_path: "/tmp/nonexistent-haproxy-test.cfg"
  tasks:
    - name: Ensure test config file does not exist
      ansible.builtin.file:
        path: /tmp/nonexistent-haproxy-test.cfg
        state: absent

    - name: Apply role in safe_edit render mode (should not fail)
      ansible.builtin.include_role:
        name: ai_horde

    - name: Assert live HAProxy config path was not touched in render mode
      ansible.builtin.stat:
        path: /tmp/nonexistent-haproxy-test.cfg
      register: _safe_edit_render_cfg

    - name: Verify safe_edit render mode skipped live config promotion
      ansible.builtin.assert:
        that:
          - not _safe_edit_render_cfg.stat.exists


