---
# Local deployment playbook — renders AI-Horde stack configs
# into local-deploy/runtime/ai-horde/ for manual validation via Docker Compose.
#
# Driven by tests/ai_horde/local_deploy.sh — do not run directly.
# Applies the ai_horde role against localhost with
# ai_horde_start_services=false so only configs are rendered.

- name: Render AI-Horde local deployment
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    ai_horde_start_services: false
    ai_horde_base_dir: "{{ playbook_dir }}/../../local-deploy/runtime/ai-horde"
    ai_horde_data_dir: "{{ playbook_dir }}/../../local-deploy/runtime/ai-horde/data"
    ai_horde_postgres_password: "localdev"
    ai_horde_secret_key: "localdev-secret-key-not-for-production"
    ai_horde_postgres_user: "aihorde"
    ai_horde_listen: "0.0.0.0"
    ai_horde_port: 7001
    ai_horde_admins: ["test_user#1"]
    ai_horde_repo: "https://github.com/Haidra-Org/AI-Horde.git"
    ai_horde_repo_version: "main"
    ai_horde_pyroscope_enabled: "true"
    ai_horde_pyroscope_tenant_id: "ai-horde-app"
    # Local-deploy: keep every trace at the source for full fidelity during dev.
    # Production default is 0.10 (see roles/ai_horde/defaults/main.yml).
    ai_horde_otel_traces_sampler_arg: "1.0"
    ai_horde_deployment_environment: "local-deploy"
    ai_horde_env_overrides:
      KUDOS_TRUST_THRESHOLD: "100"

  roles:
    - ai_horde

  post_tasks:
    - name: Render local-deploy.env
      ansible.builtin.copy:
        content: |
          AI_HORDE_PORT={{ ai_horde_port }}
          AI_HORDE_BASE_DIR={{ ai_horde_base_dir }}
        dest: "{{ ai_horde_base_dir }}/local-deploy.env"
        mode: "0644"

    - name: Render docker-compose.override.yml to provide an HAProxy load-balancer for replicas
      ansible.builtin.copy:
        content: |
          services:
            haproxy:
              image: haproxy:3.0-alpine
              ports:
                - "127.0.0.1:8080:8080"
              volumes:
                - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
              depends_on:
                - aihorde
              networks:
                - aihorde_network
        dest: "{{ ai_horde_base_dir }}/docker-compose.override.yml"
        mode: "0644"

    - name: Render haproxy.cfg for load-balancer
      ansible.builtin.copy:
        content: |
          global
            log stdout format raw local0

          defaults
            log global
            mode http
            timeout client 10s
            timeout connect 5s
            timeout server 10s
            timeout http-request 10s

          frontend aihorde_fe
            bind *:8080
            default_backend aihorde_be

          backend aihorde_be
            balance roundrobin
            option forwardfor
            http-request set-header X-Forwarded-Port %[dst_port]
            http-request set-header X-Forwarded-Proto http
            server-template worker 5 aihorde:7001 check resolvers docker init-addr libc,none

          resolvers docker
            nameserver dns 127.0.0.11:53
            resolve_retries 3
            timeout resolve 1s
            timeout retry   1s
            hold other      10s
            hold refused    10s
            hold nx         10s
            hold timeout    10s
            hold valid      10s
            hold obsolete   10s
        dest: "{{ ai_horde_base_dir }}/haproxy.cfg"
        mode: "0644"
