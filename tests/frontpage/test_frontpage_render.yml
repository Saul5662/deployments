---
# idempotency: skip
# Render-only test: validates AiHordeFrontpage role output without Docker.
# Safe for CI — no containers started, no network access needed.
# Tests both Docker and Native deployment modes.

- name: Render AiHordeFrontpage configs (Docker mode)
  hosts: localhost
  connection: local
  gather_facts: false
  become: true
  vars:
    aihorde_frontpage_start_services: false
    aihorde_frontpage_deploy_mode: docker
    aihorde_frontpage_base_dir: /tmp/frontpage-test-docker
    aihorde_frontpage_build_config: local
    aihorde_frontpage_allowed_hosts:
      - localhost
      - 127.0.0.1
      - stablehorde.net
  tasks:
    - name: Create mock source directory
      ansible.builtin.file:
        path: "{{ aihorde_frontpage_base_dir }}/src"
        state: directory
        mode: "0755"

    - name: Run aihorde_frontpage role (Docker mode)
      ansible.builtin.include_role:
        name: aihorde_frontpage
      vars:
        aihorde_frontpage_start_services: false

  post_tasks:
    - name: Assert docker-compose.yml exists
      ansible.builtin.stat:
        path: "{{ aihorde_frontpage_base_dir }}/docker-compose.yml"
      register: compose_file
    - name: Verify docker-compose.yml exists
      ansible.builtin.assert:
        that: compose_file.stat.exists

    - name: Read compose file
      ansible.builtin.slurp:
        path: "{{ aihorde_frontpage_base_dir }}/docker-compose.yml"
      register: compose_content

    - name: Assert compose has BUILD_CONFIG
      ansible.builtin.assert:
        that:
          - "'BUILD_CONFIG' in (compose_content.content | b64decode)"
          - "'local' in (compose_content.content | b64decode)"
        fail_msg: "Compose file missing BUILD_CONFIG or local value"

    - name: Assert compose has healthcheck
      ansible.builtin.assert:
        that: "'healthcheck' in (compose_content.content | b64decode)"
        fail_msg: "Compose file missing healthcheck"

    - name: Assert compose has port 8006
      ansible.builtin.assert:
        that: "'8006' in (compose_content.content | b64decode)"
        fail_msg: "Compose file not using port 8006"

    - name: Assert compose has log rotation
      ansible.builtin.assert:
        that: "'max-size' in (compose_content.content | b64decode)"
        fail_msg: "Compose file missing log rotation"

    - name: Assert compose has horde.logs labels for log collection
      ansible.builtin.assert:
        that:
          - "'horde.logs' in (compose_content.content | b64decode)"
          - "'horde.app' in (compose_content.content | b64decode)"
          - "'horde.component' in (compose_content.content | b64decode)"
        fail_msg: "Frontpage compose must have horde.logs/horde.app/horde.component labels for Alloy log collection"

    - name: Assert .env exists
      ansible.builtin.stat:
        path: "{{ aihorde_frontpage_base_dir }}/.env"
      register: env_file
    - name: Verify .env exists
      ansible.builtin.assert:
        that: env_file.stat.exists

    - name: Read .env file
      ansible.builtin.slurp:
        path: "{{ aihorde_frontpage_base_dir }}/.env"
      register: env_content

    - name: Assert .env has PORT=8006
      ansible.builtin.assert:
        that: "'PORT=8006' in (env_content.content | b64decode)"
        fail_msg: ".env file missing PORT=8006"

    - name: Assert .env has NODE_ENV=production
      ansible.builtin.assert:
        that: "'NODE_ENV=production' in (env_content.content | b64decode)"
        fail_msg: ".env file missing NODE_ENV=production"

    - name: Assert .env renders NG_ALLOWED_HOSTS
      ansible.builtin.assert:
        that:
          - "'NG_ALLOWED_HOSTS=localhost,127.0.0.1,stablehorde.net' in (env_content.content | b64decode)"
        fail_msg: ".env file missing configured NG_ALLOWED_HOSTS"

    - name: Assert systemd unit exists
      ansible.builtin.stat:
        path: /etc/systemd/system/aihorde-frontpage.service
      register: systemd_unit
    - name: Verify Docker mode systemd unit exists
      ansible.builtin.assert:
        that: systemd_unit.stat.exists

    - name: Read systemd unit
      ansible.builtin.slurp:
        path: /etc/systemd/system/aihorde-frontpage.service
      register: systemd_content

    - name: Assert systemd unit has TimeoutStartSec=600
      ansible.builtin.assert:
        that: "'TimeoutStartSec=600' in (systemd_content.content | b64decode)"
        fail_msg: "systemd unit missing TimeoutStartSec=600"

    - name: Assert systemd unit omits ExecStartPre build when toggle is off (default)
      ansible.builtin.assert:
        that: "'docker compose build' not in (systemd_content.content | b64decode)"
        fail_msg: "systemd unit should not contain docker compose build when aihorde_frontpage_docker_build_on_service_start is false"

    - name: Clean up Docker test directory
      ansible.builtin.file:
        path: "{{ aihorde_frontpage_base_dir }}"
        state: absent

- name: Render AiHordeFrontpage Docker mode with build-on-start enabled
  hosts: localhost
  connection: local
  gather_facts: false
  become: true
  vars:
    aihorde_frontpage_start_services: false
    aihorde_frontpage_deploy_mode: docker
    aihorde_frontpage_base_dir: /tmp/frontpage-test-build-toggle
    aihorde_frontpage_docker_build_on_service_start: true
  tasks:
    - name: Run aihorde_frontpage role with build-on-start enabled
      ansible.builtin.include_role:
        name: aihorde_frontpage

    - name: Slurp systemd unit
      ansible.builtin.slurp:
        path: /etc/systemd/system/aihorde-frontpage.service
      register: systemd_build_on

    - name: Assert ExecStartPre docker compose build is present when toggle is on
      ansible.builtin.assert:
        that: "'docker compose build' in (systemd_build_on.content | b64decode)"
        fail_msg: "systemd unit should contain docker compose build when aihorde_frontpage_docker_build_on_service_start is true"

    - name: Clean up build-toggle test directory
      ansible.builtin.file:
        path: "{{ aihorde_frontpage_base_dir }}"
        state: absent
