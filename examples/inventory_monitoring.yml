---
# Example inventory for AI Horde monitoring deployment
#
# Groups:
#   mimir     - hosts running Mimir + Grafana + Prometheus
#   haproxy   - hosts with HAProxy (may overlap with mimir)
#   artbot    - hosts running the artbot service
#   all       - host metrics source policy for node_exporter deployment

all:
  children:
    mimir:
      hosts:
        monitoring.example.com:
          ansible_host: 192.168.1.100
          ansible_user: admin
          ansible_become: true

          # Mimir + Grafana configuration
          horde_monitoring_mimir_port: 9009
          horde_monitoring_grafana_port: 3000
          horde_monitoring_grafana_admin_password: "{{ vault_grafana_admin_password }}"
          # horde_monitoring_grafana_root_url: "https://grafana.example.com"
          horde_monitoring_application_tenant_id: "ai-horde-app"
          horde_monitoring_application_retention: "0"
          horde_monitoring_infrastructure_tenant_id: "infrastructure"
          horde_monitoring_infrastructure_retention: "30d"

          # HAProxy integration
          horde_monitoring_configure_haproxy: true

          # Stats exporter
          horde_stats_exporter_port: 9150
          horde_stats_exporter_enable_downsampling: true

          # Loki log aggregation (enabled by default with horde_monitoring).
          # To collect Docker container logs, deploy the horde_alloy role on
          # this host with horde_alloy_collect_docker_logs: true (host daemon).
          # See examples/alloy_app_host.yml for the full pattern.
          # horde_monitoring_install_loki: true
          # horde_monitoring_loki_retention_period: "2160h"

    haproxy:
      hosts:
        monitoring.example.com:  # same host — HAProxy co-located with monitoring

    artbot:
      hosts:
        artbot.example.com:
          ansible_host: 192.168.1.101
          ansible_user: admin
          ansible_become: true
          # Optional: override the address Prometheus should use for
          # node_exporter scraping (legacy) if ansible_host is not routable
          # from the monitoring host.
          # horde_node_exporter_scrape_address: "10.0.0.101"
          # If this host uses Alloy for host metrics (preferred), set
          # horde_alloy_enabled: true so monitoring stack auto mode skips
          # node_exporter on this host.
          # horde_alloy_enabled: true

  vars:
    # Host metrics source for examples/horde_monitoring_stack.yml:
    # - auto (default): per-host decision
    #   - skip node_exporter when host has horde_alloy_enabled: true OR
    #     horde_alloy_collect_metrics: true
    #   - otherwise install node_exporter
    # - node_exporter: force install on all hosts
    # - alloy: force skip on all hosts
    # Prometheus node_exporter targets are generated automatically from
    # inventory into /etc/prometheus/file_sd/node_exporter.yml.
    horde_host_metrics_source: "auto"
    ansible_python_interpreter: /usr/bin/python3
