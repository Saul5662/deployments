---
# Example inventory for AI Horde monitoring deployment
#
# Groups:
#   mimir     - hosts running Mimir + Grafana + Prometheus
#   haproxy   - hosts with HAProxy (may overlap with mimir)
#   artbot    - hosts running the artbot service
#   all       - every host gets node_exporter (Play 1)

all:
  children:
    mimir:
      hosts:
        monitoring.example.com:
          ansible_host: 192.168.1.100
          ansible_user: admin
          ansible_become: true

          # Mimir + Grafana configuration
          horde_monitoring_mimir_port: 9009
          horde_monitoring_grafana_port: 3000
          horde_monitoring_grafana_admin_password: "{{ vault_grafana_admin_password }}"
          # horde_monitoring_grafana_root_url: "https://grafana.example.com"
          horde_monitoring_application_tenant_id: "ai-horde-app"
          horde_monitoring_application_retention: "0"
          horde_monitoring_infrastructure_tenant_id: "infrastructure"
          horde_monitoring_infrastructure_retention: "30d"

          # HAProxy integration
          horde_monitoring_configure_haproxy: true

          # Stats exporter
          exporter_port: 9150
          exporter_enable_downsampling: true

    haproxy:
      hosts:
        monitoring.example.com:  # same host — HAProxy co-located with monitoring

    artbot:
      hosts:
        artbot.example.com:
          ansible_host: 192.168.1.101
          ansible_user: admin
          ansible_become: true

  vars:
    ansible_python_interpreter: /usr/bin/python3
