---
# Example inventory for AI Horde monitoring deployment

all:
  children:
    monitoring:
      hosts:
        grafana.example.com:
          ansible_host: 192.168.1.100
          ansible_user: admin
          ansible_become: yes

          # Prometheus configuration
          prometheus_version: "2.45.0"
          prometheus_port: 9090
          prometheus_retention_time: "100y"  # Effectively indefinite for horde stats
          prometheus_web_external_url: "https://grafana.example.com/prometheus"

          # Grafana configuration
          grafana_port: 3000
          grafana_domain: "grafana.example.com"
          grafana_root_url: "https://grafana.example.com"

          # Stats exporter configuration
          exporter_source_dir: "/path/to/horde-grafana"
          exporter_port: 9100
          exporter_enable_downsampling: true

          # Component flags
          monitoring_install_prometheus: true
          monitoring_install_grafana: true
          monitoring_install_influxdb: false

  vars:
    # Common variables
    ansible_python_interpreter: /usr/bin/python3
