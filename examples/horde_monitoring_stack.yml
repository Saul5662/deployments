---
# Example playbook for deploying the AI Horde monitoring infrastructure
# Usage: ansible-playbook -i inventory.yml horde_monitoring_stack.yml
#
# Architecture:
#   Play 1: Deploy node_exporter only on hosts that resolve to node_exporter source
#   Play 2: Deploy Mimir + Grafana + Prometheus + stats exporter on the monitoring host
#
#   Prometheus (native) --remote_write--> Mimir (Docker) <-- Grafana (Docker)
#   All services bind to 127.0.0.1. HAProxy fronts Mimir externally with basic_auth.
#
# Prerequisites:
#   ansible-galaxy collection install -r requirements.yml
#   HAProxy is installed on each monitored host to front node_exporter
#   with basic auth. node_exporter listens on localhost only.

# ---------------------------------------------------------------------------
# Play 1: node_exporter on hosts using node_exporter as host metrics source
# ---------------------------------------------------------------------------
- name: Deploy node_exporter on all hosts
  hosts: all
  become: true

  vars:
    # Host metrics source selection (per-host):
    # - auto (default): use Alloy when host indicates Alloy metrics are configured,
    #                   otherwise use node_exporter
    # - node_exporter: always install node_exporter
    # - alloy: never install node_exporter
    #
    # Alloy indicators checked in auto mode:
    # - horde_alloy_enabled: true
    # - horde_alloy_collect_metrics: true
    horde_host_metrics_source_allowed:
      - auto
      - node_exporter
      - alloy

    # node_exporter listens on localhost only; HAProxy fronts it on the
    # public port with basic auth.  No TLS certificates or passlib required.
    node_exporter_web_listen_address: "127.0.0.1:9101"

    # HAProxy reverse proxy settings for node_exporter
    horde_node_exporter_haproxy_port: 9100
    horde_node_exporter_haproxy_config_path: "/etc/haproxy/haproxy.cfg"
    horde_node_exporter_haproxy_backup_dir: "/var/backups/haproxy"
    horde_node_exporter_haproxy_backup_retention_count: 20

  pre_tasks:
    - name: Validate host metrics source selection
      ansible.builtin.assert:
        that:
          - (horde_host_metrics_source | default('auto') | lower) in horde_host_metrics_source_allowed
        fail_msg: >-
          horde_host_metrics_source must be one of: auto, node_exporter, alloy.

    - name: Resolve whether host uses Alloy metrics
      ansible.builtin.set_fact:
        horde_host_uses_alloy_metrics: >-
          {{
            (horde_host_metrics_source | default('auto') | lower) == 'alloy'
            or (
              (horde_host_metrics_source | default('auto') | lower) == 'auto'
              and (
                (horde_alloy_enabled | default(false) | bool)
                or (
                  (horde_alloy_collect_metrics is defined)
                  and (horde_alloy_collect_metrics | bool)
                )
              )
            )
          }}

    - name: Install HAProxy for node_exporter reverse proxy
      ansible.builtin.apt:
        name: haproxy
        state: present
        update_cache: true
        cache_valid_time: 3600
      when: not (horde_host_uses_alloy_metrics | bool)

    - name: Build node_exporter HAProxy block
      ansible.builtin.set_fact:
        _horde_node_exporter_haproxy_block: |-
          userlist node_exporter_auth
              user prometheus insecure-password {{ vault_node_exporter_password }}

          frontend node_exporter_front
              bind 0.0.0.0:{{ horde_node_exporter_haproxy_port }}
              mode http
              acl authenticated http_auth(node_exporter_auth)
              http-request auth realm node_exporter unless authenticated
              default_backend node_exporter_back

          backend node_exporter_back
              mode http
              server node_exporter_local 127.0.0.1:9101 check
      when: not (horde_host_uses_alloy_metrics | bool)

    - name: Apply node_exporter HAProxy block via safe-edit pipeline  # noqa: var-naming[no-role-prefix]
      ansible.builtin.include_role:
        name: haidra.deployments._haproxy_safe_edit
      vars:
        _haproxy_safe_edit_config_path: "{{ horde_node_exporter_haproxy_config_path }}"
        _haproxy_safe_edit_backup_dir: "{{ horde_node_exporter_haproxy_backup_dir }}"
        _haproxy_safe_edit_marker: "NODE-EXPORTER PROXY"
        _haproxy_safe_edit_block: "{{ _horde_node_exporter_haproxy_block }}"
        _haproxy_safe_edit_backup_retention: "{{ horde_node_exporter_haproxy_backup_retention_count }}"
        _haproxy_safe_edit_apply: true
      when: not (horde_host_uses_alloy_metrics | bool)

    - name: Enable and start HAProxy for node_exporter
      ansible.builtin.systemd:
        name: haproxy
        enabled: true
        state: started
      when: not (horde_host_uses_alloy_metrics | bool)

  roles:
    - role: prometheus.prometheus.node_exporter
      when: not (horde_host_uses_alloy_metrics | bool)

# ---------------------------------------------------------------------------
# Play 2: Mimir + Grafana stack, Prometheus, stats exporter on monitoring host
# ---------------------------------------------------------------------------
- name: Deploy monitoring stack
  hosts: mimir
  become: true

  vars:
    # -- Mimir + Grafana (horde_monitoring role) --
    horde_monitoring_install_mimir: true
    horde_monitoring_install_grafana: true
    horde_monitoring_configure_haproxy: true
    horde_monitoring_grafana_admin_password: "{{ vault_grafana_admin_password }}"
    horde_monitoring_application_tenant_id: "ai-horde-app"
    horde_monitoring_application_retention: "0"
    horde_monitoring_infrastructure_tenant_id: "infrastructure"
    horde_monitoring_infrastructure_retention: "30d"
    horde_monitoring_public_tenant_id: "ai-horde-public"
    horde_monitoring_public_retention: "90d"
    horde_monitoring_install_host_disk_alerts: true
    horde_monitoring_grafana_anonymous_enabled: true
    horde_monitoring_grafana_provision_dashboards: true
    # horde_monitoring_grafana_root_url: "https://grafana.example.com"

    # -- Loki (log aggregation — opt-in) --
    horde_monitoring_install_loki: true
    horde_monitoring_loki_retention_period: "2160h"  # 90 days

    # -- Tempo (distributed tracing — opt-in) --
    horde_monitoring_install_tempo: true
    horde_monitoring_tempo_trace_retention: "168h"  # 7 days
    horde_monitoring_tempo_metrics_generator_enabled: true
    horde_monitoring_tempo_metrics_generator_tenant_id: "infrastructure"

    # -- Pyroscope (continuous profiling — opt-in) --
    horde_monitoring_install_pyroscope: true
    horde_monitoring_pyroscope_retention_period: "0s"  # global default (infinite)
    horde_monitoring_pyroscope_application_retention: "0"  # per-tenant: infinite
    horde_monitoring_pyroscope_infrastructure_retention: "30d"
    horde_monitoring_pyroscope_public_retention: "90d"
    horde_monitoring_pyroscope_self_profiling: true

    # -- Alertmanager datasource in Grafana --
    # Lets Grafana query alert state from Alertmanager (Alerting UI).
    # Uses host.docker.internal because Alertmanager is native on the host
    # while Grafana runs inside Docker.
    horde_monitoring_alertmanager_url: "http://host.docker.internal:9093"

    # -- Alertmanager (community role, applied directly) --
    # Receives alerts from Prometheus, deduplicates, groups, and routes to
    # notification channels. See docs/plans/011-alertmanager.md for details.
    alertmanager_version: "0.28.0"
    alertmanager_web_listen_address: "127.0.0.1:9093"
    alertmanager_resolve_timeout: "5m"
    alertmanager_receivers:
      - name: "default"
      # Configure your notification channel here. Uncomment ONE of:
      #
      # Slack:
      # slack_configs:
      #   - api_url: "{{ vault_alertmanager_slack_webhook }}"
      #     channel: '#monitoring-alerts'
      #     send_resolved: true
      #     title: '{% raw %}[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}{% endraw %}'
      #     text: >-
      #       {% raw %}{{ range .Alerts }}{{ .Annotations.description }}
      #       {{ end }}{% endraw %}
      #
      # Email:
      # email_configs:
      #   - to: 'oncall@example.com'
      #     send_resolved: true
      #
      # Webhook (generic):
      # webhook_configs:
      #   - url: 'http://your-webhook-endpoint:8080/alerts'
      #     send_resolved: true
      - name: "null"
    # Silently drops alerts. Used for Watchdog during initial setup.
    # In production, replace with a dead man's switch endpoint.
    alertmanager_route:
      group_by: ["alertname", "job"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: "default"
      routes:
        - matchers:
            - alertname="Watchdog"
          receiver: "null"
          repeat_interval: 5m
    alertmanager_inhibit_rules:
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal: ["alertname", "job"]

    # -- Prometheus (community role, applied directly) --
    prometheus_web_listen_address: "127.0.0.1:9090"
    prometheus_storage_retention: "48h"
    prometheus_global:
      scrape_interval: 15s
      evaluation_interval: 30s
    prometheus_alertmanager_config:
      - scheme: http
        static_configs:
          - targets:
              - "localhost:9093"
    prometheus_remote_write:
      - url: "http://localhost:9009/api/v1/push"
        headers:
          X-Scope-OrgID: "{{ horde_monitoring_application_tenant_id }}"
        write_relabel_configs:
          - source_labels: [job]
            regex: horde-exporter
            action: keep
      - url: "http://localhost:9009/api/v1/push"
        headers:
          X-Scope-OrgID: "{{ horde_monitoring_infrastructure_tenant_id }}"
        write_relabel_configs:
          - source_labels: [job]
            regex: horde-exportepasslibr
            action: drop
      - url: "http://localhost:9009/api/v1/push"
        headers:
          X-Scope-OrgID: "{{ horde_monitoring_public_tenant_id }}"
        write_relabel_configs:
          - source_labels: [job]
            regex: horde-exporter
            action: keep
    prometheus_scrape_configs:
      - job_name: mimir
        static_configs:
          - targets:
              - "localhost:9009"
      - job_name: node
        basic_auth:
          username: prometheus
          password: "{{ vault_node_exporter_password }}"
        file_sd_configs:
          - files:
              - /etc/prometheus/file_sd/*.yml
      - job_name: horde-exporter
        static_configs:
          - targets:
              - "localhost:9150"
      - job_name: minio
        metrics_path: /minio/v2/metrics/cluster
        static_configs:
          - targets:
              - "localhost:9000"
      - job_name: loki
        static_configs:
          - targets:
              - "localhost:3100"
      - job_name: tempo
        static_configs:
          - targets:
              - "localhost:3200"
      - job_name: pyroscope
        static_configs:
          - targets:
              - "localhost:4040"
    # Uncomment if running postgres_exporter:
    # - job_name: postgres
    #   basic_auth:
    #     username: prometheus
    #     password: "{{ vault_postgres_exporter_password }}"
    #   static_configs:
    #     - targets:
    #         - "localhost:9187"

    # -- Stats exporter --
    horde_stats_exporter_port: 9150
    horde_stats_exporter_enable_downsampling: true

  pre_tasks:
    - name: Validate node_exporter scrape password is configured
      ansible.builtin.assert:
        that:
          - vault_node_exporter_password is defined
          - (vault_node_exporter_password | string | length) > 0
          - vault_node_exporter_password != 'CHANGE_ME'
        fail_msg: >-
          vault_node_exporter_password must be set in your inventory or vault
          to scrape node_exporter over basic auth.

    - name: Ensure Prometheus file_sd directory exists for node_exporter discovery
      ansible.builtin.file:
        path: /etc/prometheus/file_sd
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Initialize node_exporter file_sd entries
      ansible.builtin.set_fact:
        horde_node_exporter_file_sd_entries: []
      run_once: true

    - name: Build node_exporter file_sd entries from inventory
      ansible.builtin.set_fact:
        horde_node_exporter_file_sd_entries: >-
          {{
            horde_node_exporter_file_sd_entries
            + [
              {
                'targets': [
                  (
                    (
                      '127.0.0.1'
                      if item == inventory_hostname
                      else (
                        hostvars[item].horde_node_exporter_scrape_address
                        | default(hostvars[item].ansible_host | default(item))
                        | string
                      )
                    )
                    ~ ':'
                    ~ (
                      hostvars[item].horde_node_exporter_scrape_port
                      | default(horde_node_exporter_scrape_port | default(9100))
                      | string
                    )
                  )
                ],
                'labels': {
                  'inventory_host': item
                }
              }
            ]
          }}
      loop: "{{ groups['all'] | sort }}"
      run_once: true
      vars:
        horde_host_metrics_source_resolved: "{{ hostvars[item].horde_host_metrics_source | default(horde_host_metrics_source | default('auto')) | lower }}"
        horde_node_exporter_target_host_uses_alloy_metrics: >-
          {{
            horde_host_metrics_source_resolved == 'alloy'
            or (
              horde_host_metrics_source_resolved == 'auto'
              and (
                (hostvars[item].horde_alloy_enabled | default(false) | bool)
                or (
                  (hostvars[item].horde_alloy_collect_metrics is defined)
                  and (hostvars[item].horde_alloy_collect_metrics | bool)
                )
              )
            )
          }}
      when: not (horde_node_exporter_target_host_uses_alloy_metrics | bool)

    - name: Render node_exporter file_sd target list
      ansible.builtin.copy:
        dest: /etc/prometheus/file_sd/node_exporter.yml
        owner: root
        group: root
        mode: "0644"
        content: "{{ horde_node_exporter_file_sd_entries | default([]) | to_nice_yaml(indent=2, sort_keys=false) }}"

  roles:
    - haidra.deployments.horde_monitoring
    - prometheus.prometheus.alertmanager
    - prometheus.prometheus.prometheus
    - haidra.deployments.horde_stats_exporter

  post_tasks:
    - name: Verify Mimir is ready
      ansible.builtin.uri:
        url: "http://localhost:9009/ready"
        return_content: true
      register: horde_monitoring_mimir_health
      retries: 10
      delay: 5
      until: horde_monitoring_mimir_health.status == 200

    - name: Verify Alertmanager is ready
      ansible.builtin.uri:
        url: "http://localhost:9093/-/ready"
        return_content: true
      register: alertmanager_health
      retries: 5
      delay: 3
      until: alertmanager_health.status == 200

    - name: Verify Grafana is running
      ansible.builtin.uri:
        url: "http://localhost:3000/api/health"
      register: horde_monitoring_grafana_health
      retries: 5
      delay: 5
      until: horde_monitoring_grafana_health.status == 200

    - name: Display monitoring stack status
      ansible.builtin.debug:
        msg:
          - "Monitoring stack deployed successfully!"
          - "Mimir: http://127.0.0.1:9009 (local only; HAProxy for external)"
          - "Grafana: http://127.0.0.1:3000 (local only)"
          - "Prometheus: http://127.0.0.1:9090 (local only)"
          - "Alertmanager: http://127.0.0.1:9093 (local only)"
          - "Loki: http://127.0.0.1:3100 (local only)"
          - "Tempo: http://127.0.0.1:3200 (local only, OTLP: 4317/4318)"
          - "Pyroscope: http://127.0.0.1:4040 (local only)"
          - "Application tenant: {{ horde_monitoring_application_tenant_id }} (retention {{ horde_monitoring_application_retention }})"
          - "Infrastructure tenant: {{ horde_monitoring_infrastructure_tenant_id }} (retention {{ horde_monitoring_infrastructure_retention }})"
          - "Stats Exporter: http://localhost:9150/metrics"
