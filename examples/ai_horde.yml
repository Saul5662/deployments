---
# Example: Deploy AI-Horde backend (Docker-only role)
#
# Usage:
#   ansible-playbook examples/ai_horde.yml -i inventory.yml
#
# Required variables (set via inventory, group_vars, or vault):
#   ai_horde_postgres_password  — PostgreSQL password (no default, fail-fast)
#   ai_horde_secret_key         — Flask secret key (no default, fail-fast)
#
# PRODUCTION NOTE:
#   For production deployments, set ai_horde_embedded_postgres_enabled and
#   ai_horde_embedded_redis_enabled to false, then configure
#   ai_horde_postgres_host and ai_horde_redis_host to point at your
#   independently managed PostgreSQL and Redis instances.
#   See roles/ai_horde/README.md#production-deployments for full guidance.
#
# Notes:
# - This role is Docker-only and does not manage HAProxy/Nginx.
# - For single-host/dev usage keep `ai_horde_listen: "127.0.0.1"`.
# - For cross-host consumers (workers/exporter on other hosts), set
#   `ai_horde_listen: "0.0.0.0"` and restrict access with firewall rules.

- name: Deploy AI-Horde backend
  hosts: horde_server
  become: true
  roles:
    - role: ai_horde
      vars:
        # Recommended for deterministic deployments:
        # ai_horde_image: "ghcr.io/haidra-org/ai-horde@sha256:<digest>"
        ai_horde_image: "ghcr.io/haidra-org/ai-horde:main"
        ai_horde_postgres_image: "ghcr.io/haidra-org/ai-horde-postgres@sha256:25984d05fdb328d3283166222efd569303c0221736fc332b8f4be1b8ff37e1e4"
        ai_horde_postgres_password: "{{ vault_ai_horde_pg_password }}"
        ai_horde_secret_key: "{{ vault_ai_horde_secret_key }}"
        ai_horde_port: 7001
        ai_horde_listen: "127.0.0.1"
        ai_horde_replicas: 1
        ai_horde_admins: ["admin_user#1"]
        ai_horde_otel_service_name: "ai-horde"
        # -----------------------------------------------------------------
        # PRODUCTION: disable embedded datastores and point at external
        # PostgreSQL and Redis.  These defaults (true) are for single-host
        # dev/local-deploy convenience only.
        # ai_horde_embedded_postgres_enabled: false
        # ai_horde_embedded_redis_enabled: false
        # ai_horde_postgres_host: "db.internal.example.com"
        # ai_horde_redis_host: "redis.internal.example.com"
        # -----------------------------------------------------------------
