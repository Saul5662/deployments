---
# Example playbook for deploying Grafana Alloy on application hosts
# Usage: ansible-playbook -i inventory.yml horde_alloy_app_host.yml
#
# Architecture:
#   Alloy runs as a native systemd service on each app host. It:
#     - Can collect host metrics via prometheus.exporter.unix
#     - Collects systemd journal logs and forwards to Loki
#     - Receives OTLP traces from local apps and forwards to Tempo
#
# Prerequisites:
#   ansible-galaxy collection install -r requirements.yml
#   A running monitoring stack with Mimir, Loki, and Tempo endpoints reachable.
#   If using TLS, place your CA certificate in files/tls/ca.crt.

- name: Deploy Grafana Alloy on application hosts
  hosts: app_workers
  become: true

  vars:
    # --- Alloy version ---
    horde_alloy_version: "1.8.1"

    # --- Central stack endpoints (required) ---
    # Replace with your actual monitoring host URL.
    horde_alloy_mimir_endpoint: "https://mimir.example.com/api/v1/push"
    horde_alloy_loki_endpoint: "https://loki.example.com/loki/api/v1/push"
    horde_alloy_tempo_endpoint: "https://tempo.example.com:4318"

    # --- Tenant ---
    horde_alloy_tenant_id: "infrastructure"

    # --- Host metrics source ---
    # "node_exporter" keeps host metrics in Prometheus scrape path.
    # "alloy" enables host metrics from Alloy prometheus.exporter.unix.
    # When using examples/horde_monitoring_stack.yml with
    # horde_host_metrics_source: auto, set horde_alloy_enabled: true
    # in inventory for these hosts so node_exporter is skipped implicitly.
    horde_host_metrics_source: "node_exporter"

    # --- Authentication ---
    horde_alloy_basic_auth_username: "alloy"
    horde_alloy_basic_auth_password: "{{ vault_alloy_basic_auth_password }}"

    # --- TLS ---
    # Path on the Ansible controller to the CA certificate used to sign
    # the monitoring stack's TLS certificates.
    horde_alloy_tls_ca_cert: "tls/ca.crt"

    # --- Metrics ---
    horde_alloy_collect_metrics: "{{ (horde_host_metrics_source | lower) == 'alloy' }}"
    horde_alloy_scrape_interval: "15s"
    horde_alloy_external_labels:
      environment: "production"

    # Optional collector tuning when using Alloy for host metrics.
    # horde_alloy_unix_exporter_enable_collectors:
    #   - systemd
    # horde_alloy_unix_exporter_textfile_directory: "/var/lib/node_exporter/textfile_collector"

    # Extra scrape targets for local application metrics:
    # horde_alloy_extra_scrape_targets:
    #   - job: "myapp"
    #     address: "127.0.0.1:8080"
    #     metrics_path: "/metrics"

    # --- Logs ---
    horde_alloy_collect_logs: true
    horde_alloy_collect_journal: true
    horde_alloy_journal_max_age: "24h"
    # Collect specific log files:
    # horde_alloy_collect_log_files:
    #   - "/var/log/myapp/*.log"
    horde_alloy_collect_docker_logs: false

    # --- Traces ---
    horde_alloy_collect_traces: true
    # OTLP receiver listens on localhost — apps send traces here.
    horde_alloy_otlp_listen_address: "127.0.0.1"
    horde_alloy_otlp_grpc_port: 4317
    horde_alloy_otlp_http_port: 4318

  roles:
    - haidra.deployments.horde_alloy

  post_tasks:
    - name: Verify Alloy is healthy
      ansible.builtin.uri:
        url: "http://{{ horde_alloy_http_listen_address }}:{{ horde_alloy_http_port }}/-/healthy"
        return_content: true
      register: horde_alloy_health
      retries: 5
      delay: 3
      until: horde_alloy_health.status == 200

    - name: Display Alloy status
      ansible.builtin.debug:
        msg:
          - "Alloy deployed successfully on {{ inventory_hostname }}!"
          - "Health UI: http://{{ horde_alloy_http_listen_address }}:{{ horde_alloy_http_port }}/graph"
          - "OTLP gRPC: {{ horde_alloy_otlp_listen_address }}:{{ horde_alloy_otlp_grpc_port }}"
          - "OTLP HTTP: {{ horde_alloy_otlp_listen_address }}:{{ horde_alloy_otlp_http_port }}"
          - "Tenant: {{ horde_alloy_tenant_id }}"
          - "Host metrics source: {{ horde_host_metrics_source }}"
          - "Metrics enabled in Alloy: {{ horde_alloy_collect_metrics }}"
          - "Logs: {{ horde_alloy_collect_logs }} → {{ horde_alloy_loki_endpoint }}"
          - "Traces: {{ horde_alloy_collect_traces }} → {{ horde_alloy_tempo_endpoint }}"
