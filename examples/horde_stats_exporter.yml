---
# Example playbook for deploying AI Horde stats exporter
# Usage: ansible-playbook -i inventory.yml horde_stats_exporter.yml

- name: Deploy AI Horde Stats Exporter
  hosts: monitoring
  become: true

  vars:
    # Git ref to install (branch, tag, or commit hash)
    # exporter_repo_ref: main

    # Exporter configuration
    exporter_port: 9150
    exporter_api_base_url: "https://aihorde.net/api/v2"

    # Enable downsampling
    exporter_enable_downsampling: true
    exporter_prometheus_url: "http://localhost:9090"

  roles:
    - haidra.deployments.horde_stats_exporter

  post_tasks:
    - name: Verify exporter is running
      uri:
        url: "http://localhost:{{ exporter_port }}/metrics"
        return_content: yes
      register: metrics
      retries: 5
      delay: 5
      until: metrics.status == 200

    - name: Display exporter status
      debug:
        msg: "AI Horde Stats Exporter is running on port {{ exporter_port }}"
