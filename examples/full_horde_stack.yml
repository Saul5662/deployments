---
# Example playbook: full AI Horde stack (backend + frontpage + monitoring + worker + exporter)
#
# Usage:
#   ansible-playbook -i inventory.yml full_horde_stack.yml -K
#
# This deploys:
#   Play 1 — AI-Horde backend  (Docker mode, direct ingress)
#   Play 2 — AiHordeFrontpage  (Angular SSR website, port 8006)
#   Play 3 — Monitoring stack  (Mimir + Grafana + Prometheus + stats exporter)
#   Play 4 — Regen worker      (connects to AI-Horde via horde_regen_worker_horde_url)
#
# Baseline ingress in this example uses port 7001.
# If you front this with an external reverse proxy/LB, point it at
# horde_server:7001 and keep worker/exporter URLs aligned.
#
# Prerequisites:
#   ansible-galaxy collection install -r requirements.yml
#   Vault file or --ask-vault-pass for secrets
#
# Inventory groups:
#   [horde_server]   — host running the AI-Horde backend + frontpage + monitoring
#   [regen_workers]  — GPU-equipped hosts running image generation workers

# ---------------------------------------------------------------------------
# Play 1: AI-Horde backend (Docker mode)
# ---------------------------------------------------------------------------
- name: Deploy AI-Horde backend
  hosts: horde_server
  become: true
  vars:
    horde_api_ingress_port: 7001

  roles:
    - role: haidra.deployments.ai_horde
      vars:
        # Recommended for deterministic deployments:
        # ai_horde_image: "ghcr.io/haidra-org/ai-horde@sha256:<digest>"
        ai_horde_image: "ghcr.io/haidra-org/ai-horde:main"
        ai_horde_replicas: 2
        ai_horde_port: "{{ horde_api_ingress_port }}"
        # Expose to other hosts (workers/exporter). Restrict at firewall level.
        # With replicas > 1, Docker maps consecutive ports (7001, 7002, ...).
        # Front these with a reverse proxy that load-balances across the range.
        # See the BYOP section in roles/ai_horde/README.md for examples.
        ai_horde_listen: "0.0.0.0"
        ai_horde_postgres_password: "{{ vault_ai_horde_pg_password }}"
        ai_horde_secret_key: "{{ vault_ai_horde_secret_key }}"
        ai_horde_admins: ["admin_user#1"]
        ai_horde_otel_service_name: "ai-horde"
        # -----------------------------------------------------------------
        # PRODUCTION: disable embedded datastores and point at external
        # PostgreSQL and Redis.  These defaults (true) are for single-host
        # dev/local-deploy convenience only.  ai_horde_replicas > 1 requires
        # an external shared PostgreSQL endpoint.
        # ai_horde_embedded_postgres_enabled: false
        # ai_horde_embedded_redis_enabled: false
        # ai_horde_postgres_host: "db.internal.example.com"
        # ai_horde_redis_host: "redis.internal.example.com"
        # -----------------------------------------------------------------
      tags: [horde]

# ---------------------------------------------------------------------------
# Play 2: AiHordeFrontpage (depends on backend being reachable)
# ---------------------------------------------------------------------------
- name: Deploy AiHordeFrontpage
  hosts: horde_server
  become: true

  roles:
    - role: haidra.deployments.aihorde_frontpage
      vars:
        aihorde_frontpage_build_config: production
      tags: [frontpage]

# ---------------------------------------------------------------------------
# Play 3: Monitoring stack (Mimir + Grafana + Prometheus + stats exporter)
# ---------------------------------------------------------------------------
- name: Deploy monitoring stack
  hosts: horde_server
  become: true
  vars:
    horde_api_ingress_port: 7001
    horde_api_host: "{{ hostvars[groups['horde_server'][0]].ansible_host | default(groups['horde_server'][0]) }}"

  roles:
    - role: haidra.deployments.horde_monitoring
      vars:
        horde_monitoring_install_mimir: true
        horde_monitoring_install_grafana: true
        # Loki is enabled by default.  To collect Docker container logs
        # (monitoring stack + apps), deploy the horde_alloy role on each
        # host with horde_alloy_collect_docker_logs: true (host daemon
        # topology).  See examples/alloy_app_host.yml for the full pattern.
        horde_monitoring_grafana_admin_password: "{{ vault_grafana_admin_password }}"
      tags: [monitoring]

    - role: haidra.deployments.horde_stats_exporter
      vars:
        # Cross-host-safe endpoint derivation from inventory addressing.
        # Use localhost only when exporter runs on the same host namespace
        # as AI-Horde ingress.
        horde_stats_exporter_api_base_url: "http://{{ horde_api_host }}:{{ horde_api_ingress_port }}/api/v2"
      tags: [exporter]

# ---------------------------------------------------------------------------
# Play 4: Regen worker (deploys to GPU hosts)
# ---------------------------------------------------------------------------
- name: Deploy regen worker
  hosts: regen_workers
  become: true
  vars:
    horde_api_ingress_port: 7001
    horde_api_host: "{{ hostvars[groups['horde_server'][0]].ansible_host | default(groups['horde_server'][0]) }}"

  roles:
    - role: haidra.deployments.horde_regen_worker
      vars:
        # Point workers at AI-Horde ingress using inventory-derived address.
        # Use localhost only for same-host-only deployments.
        horde_regen_worker_horde_url: "http://{{ horde_api_host }}:{{ horde_api_ingress_port }}"
        horde_regen_worker_api_key: "{{ vault_worker_api_key }}"
        horde_regen_worker_dreamer_name: "{{ inventory_hostname }}-dreamer"
        horde_regen_worker_max_power: 32
        horde_regen_worker_models_to_load:
          - TOP 5
      tags: [worker]
